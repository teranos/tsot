syntax = "proto3";

package tsot;

enum Color {
  COLORLESS = 0;
  WHITE = 1;
  BLUE = 2;
  BLACK = 3;
  RED = 4;
  GREEN = 5;
}

enum CardType {
  TYPE_UNSPECIFIED = 0;
  CREATURE = 1;
  INSTANT = 2;
  SPELL = 3;
  ARTIFACT = 4;
  ENVIRONMENT = 5;
}

enum CostSource {
  HAND = 0;
  DECK = 1;
  GRAVEYARD = 2;
  SACRIFICE = 3;
  SELF = 4;
}

message CostComponent {
  int32 amount = 1;
  CostSource source = 2;
}

message Stats {
  int32 x = 1;
  int32 y = 2;
}

message Card {
  string id = 1;
  string name = 2;
  repeated Color colors = 3;
  CardType type = 4;
  repeated string subtypes = 5;
  string symbol = 6;
  repeated CostComponent cost = 7;
  repeated string abilities = 8;
  Stats stats = 9;
}
