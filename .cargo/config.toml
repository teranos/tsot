# Cargo config — currently only used for the WASM build's emscripten
# linker flags. Native builds use Cargo's defaults.

[target.wasm32-unknown-emscripten]
# Retain the FFI symbols + expose emscripten runtime helpers JS needs
# to call into them. Output is a single combined .wasm + .js loader
# (Modularize mode lets the embedding HTML name the module factory).
rustflags = [
  "-C", "link-args=-sEXPORTED_FUNCTIONS=_main,_tsot_hello,_tsot_echo,_tsot_free_string,_tsot_start_game,_tsot_apply_action",
  "-C", "link-args=-sEXPORTED_RUNTIME_METHODS=ccall,cwrap,UTF8ToString,stringToUTF8,lengthBytesUTF8",
  "-C", "link-args=-sMODULARIZE=1",
  "-C", "link-args=-sEXPORT_NAME=createTsotModule",
  "-C", "link-args=-sALLOW_MEMORY_GROWTH=1",
  # Exception-ABI is resolved at the source: Cargo.toml's
  # `panic = "abort"` keeps Rust's panic_unwind out of the link, and
  # the `[unstable]` block below rebuilds std under panic_abort so
  # the precompiled-stdlib legacy `__cxa_find_matching_catch_*`
  # references go away on the Rust side. Lua's setjmp/longjmp paths
  # still need the matching wasm-native runtime — paired with
  # CFLAGS_wasm32_unknown_emscripten in the flake's shellHook.
  "-C", "link-args=-sSUPPORT_LONGJMP=wasm",
  # The engine is single-threaded in the wasm build — disable pthread
  # codepaths to keep the binary lean. (Native uses rayon, but the
  # tsot_wasm bin doesn't touch it.)
  "-C", "link-args=-sUSE_PTHREADS=0",
]

# build-std rebuilds the standard library from source against the
# current toolchain + flags, so std's wasm-exception ABI matches
# emcc's `-fwasm-exceptions` instead of the legacy ABI baked into the
# precompiled stable std. Requires nightly + `rust-src` (both
# provided by the flake's `pkgs.rust-bin.nightly.latest.default`
# override). Paired with `panic = "abort"` in Cargo.toml so
# panic_unwind isn't pulled in at all.
[unstable]
build-std = ["std", "panic_abort"]
