name: seer

# Two jobs. game-native runs the game as a native binary (fast dev
# cycle, Rust backtraces). seer-host builds game.wasm and runs it
# under wasmtime, recording every boundary crossing. Both upload
# stdout as artifacts.

# seer runs regardless — every push to any branch, plus nightly even
# when nothing is pushed. No paths gate: perf is measured continuously,
# not only when game/ changes, so a regression anywhere is caught.
on:
  push:
    branches: ['**']
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  game-native:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: game

      - name: Install Mesa software Vulkan (lavapipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers libvulkan1

      # CDDA map corpus — pinned dependency, realised hash-verified via
      # the flake; $CDDA_SRC hands the store path to build.rs.
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Realise CDDA corpus (pinned, hash-verified)
        working-directory: game
        run: echo "CDDA_SRC=$(nix build .#cdda-src --no-link --print-out-paths)" >> "$GITHUB_ENV"

      - name: Build game-native
        working-directory: game
        env:
          SEER_BUILD_COMMIT: ${{ github.sha }}
          SEER_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: cargo build --release --bin game-native

      - name: Run game-native
        working-directory: game
        env:
          RUST_BACKTRACE: full
          SEER_FRAMES: '180'
          SEER_FRAME_PATH: out/frame.png
          # 4-frame render at 25/50/75/100% of the tick loop.
          SEER_MULTI_FRAME_DIR: out
        run: |
          mkdir -p out
          cargo run --release --bin game-native 2>&1 | tee out/game-native.log
          ls -la out/

      - name: Assume deploy role
        if: success() && vars.SEER_DISTRIBUTION_ID != ''
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::548351057127:role/seer-github-deploy
          aws-region: eu-central-1

      - name: Upload frame.png
        if: success() && vars.SEER_DISTRIBUTION_ID != ''
        run: |
          if [ ! -f game/out/frame.png ]; then exit 0; fi
          for prefix in "perf/${{ github.sha }}" "perf/latest"; do
            aws s3 cp game/out/frame.png "s3://seer-sbvh-static/$prefix/frame.png" \
              --cache-control "public, max-age=300" \
              --content-type "image/png"
          done

      - name: Upload multi-frame render (one frame per tour stop)
        if: success() && vars.SEER_DISTRIBUTION_ID != ''
        run: |
          # One frame per tour stop (school/house/orchard/campsite/forest)
          # — glob so it scales with however many the tour produced.
          for f in game/out/frame-*.png; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            for prefix in "perf/${{ github.sha }}" "perf/latest"; do
              aws s3 cp "$f" "s3://seer-sbvh-static/$prefix/$name" \
                --cache-control "public, max-age=300" \
                --content-type "image/png"
            done
          done

      - name: Upload native log to seer
        # Publishes the game-native run's log — including its
        # [perf.frame] lines — to the seer site so real live
        # performance is visible on seer.sbvh.nl next to the wasm
        # summary. Previously log lived only in CI upload-artifact,
        # so the measurement Brandon cares about was invisible.
        if: success() && vars.SEER_DISTRIBUTION_ID != ''
        run: |
          if [ ! -f game/out/game-native.log ]; then exit 0; fi
          for prefix in "perf/${{ github.sha }}" "perf/latest"; do
            aws s3 cp game/out/game-native.log \
              "s3://seer-sbvh-static/$prefix/game-native.log" \
              --cache-control "public, max-age=300" \
              --content-type "text/plain; charset=utf-8"
          done

      - name: Invalidate CloudFront (frames)
        if: success() && vars.SEER_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.SEER_DISTRIBUTION_ID }}" \
            --paths '/perf/latest/frame.png' '/perf/latest/frame-*.png' '/perf/latest/game-native.log' \
            --query 'Invalidation.Id' --output text

      - name: Upload native log (CI artifact)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: game-native-${{ github.sha }}
          path: game/out/
          retention-days: 30

  seer-p2p-test:
    # Proves the seer-summary/v1 topic round-trips: publisher +
    # subscriber swarms on loopback, no relayer.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/seer-p2p-test
      - name: Run seer-p2p integration test
        working-directory: crates/seer-p2p-test
        run: cargo test --release -- --nocapture

  seer-host:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Realise CDDA corpus (pinned, hash-verified)
        working-directory: game
        run: echo "CDDA_SRC=$(nix build .#cdda-src --no-link --print-out-paths)" >> "$GITHUB_ENV"

      - name: Build game.wasm
        working-directory: game
        env:
          SEER_BUILD_COMMIT: ${{ github.sha }}
          SEER_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: cargo build --release --lib --target wasm32-unknown-unknown

      - name: Build seer-imports-check
        working-directory: crates/seer-imports-check
        run: cargo build --release

      - name: Boundary — check game.wasm imports against allow list
        working-directory: crates/seer-imports-check
        run: |
          ./target/release/seer-imports-check \
            ../../game/target/wasm32-unknown-unknown/release/game.wasm \
            ../../game/imports.allow

      - name: Build seer-host
        working-directory: crates/seer-host
        run: cargo build --release

      - name: Fetch prior history from S3
        if: vars.SEER_DISTRIBUTION_ID != ''
        continue-on-error: true
        run: |
          mkdir -p out
          # Public GET against CloudFront — no auth needed. seer-host
          # reads this file, appends this run's summary, and writes
          # out the updated history.json for upload back to S3.
          curl -sSf -o out/history-in.json https://seer.sbvh.nl/perf/history.json || echo '[]' > out/history-in.json
          echo "prior history entries: $(python3 -c 'import json,sys;print(len(json.load(open("out/history-in.json"))))' 2>/dev/null || echo 0)"

      - name: Run seer-host on game.wasm
        env:
          SEER_FRAMES: '180'
          SEER_HISTORY_IN_PATH: out/history-in.json
          SEER_HISTORY_OUT_PATH: out/history.json
          SEER_SUMMARY_OUT_PATH: out/summary.json
          SEER_VERDICT_OUT_PATH: out/verdict.json
          SEER_METRICS_OUT_PATH: out/metrics.json
          SEER_COMMIT_REPORT_OUT_PATH: out/report.json
          SEER_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          mkdir -p out
          [ -f out/history-in.json ] || echo '[]' > out/history-in.json
          # `| tee` returns tee's exit status (0), so a seer-host crash —
          # e.g. `unknown import: env::…` when a boundary crossing wasn't
          # mirrored into the host — used to leave this step green while
          # seer measured NOTHING and the stale S3 data rotted silently.
          # Errors are sacred: preserve seer-host's own exit code and turn
          # the job red so the failure lands in front of us.
          ./crates/seer-host/target/release/seer-host \
            game/target/wasm32-unknown-unknown/release/game.wasm \
            2>&1 | tee out/seer-host.log
          status=${PIPESTATUS[0]}
          ls -la out/
          if [ "$status" -ne 0 ]; then
            echo "::error::seer-host exited $status — game.wasm failed to run under wasmtime; seer measured nothing this run"
            exit "$status"
          fi

      - name: Upload host log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: seer-host-${{ github.sha }}
          path: out/
          retention-days: 30

      - name: Assume deploy role
        if: success() && vars.SEER_DISTRIBUTION_ID != ''
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::548351057127:role/seer-github-deploy
          aws-region: eu-central-1

      - name: Upload per-sha diagnostic artifacts
        if: success() && vars.SEER_DISTRIBUTION_ID != ''
        run: |
          # Two prefixes per artifact — /perf/<sha>/ is permalink,
          # /perf/latest/ is always-current head.
          for prefix in "perf/${{ github.sha }}" "perf/latest"; do
            aws s3 cp out/seer-host.log "s3://seer-sbvh-static/$prefix/seer-host.log" \
              --cache-control "public, max-age=300" \
              --content-type "text/plain; charset=utf-8"
            for f in summary.json metrics.json report.json; do
              [ -f "out/$f" ] || continue
              aws s3 cp "out/$f" "s3://seer-sbvh-static/$prefix/$f" \
                --cache-control "public, max-age=300" \
                --content-type "application/json"
            done
          done

      - name: Upload rolling history.json
        if: success() && vars.SEER_DISTRIBUTION_ID != ''
        run: |
          [ -f out/history.json ] || exit 0
          aws s3 cp out/history.json "s3://seer-sbvh-static/perf/history.json" \
            --cache-control "public, max-age=60" \
            --content-type "application/json"

      - name: Upload game.wasm to /perf/<sha>/
        if: success() && vars.SEER_DISTRIBUTION_ID != ''
        run: |
          # Per-commit wasm for the viewer's LiveRun panel. Same binary
          # seer-host just ran under wasmtime; LiveRun re-instantiates
          # it in the browser with the same env.* imports. Was in
          # seer-browser.yml — moved here so viewer changes don't
          # trigger a game.wasm rebuild.
          aws s3 cp \
            game/target/wasm32-unknown-unknown/release/game.wasm \
            "s3://seer-sbvh-static/perf/${{ github.sha }}/game.wasm" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/wasm"

      - name: GC — compute keep set (newest 4 shas + this run)
        id: gc_plan
        if: success() && vars.SEER_DISTRIBUTION_ID != ''
        run: |
          curl -sSf https://seer.sbvh.nl/perf/history.json -o /tmp/history.json || echo '[]' > /tmp/history.json
          KEEP=$(python3 -c "
          import json
          h = json.load(open('/tmp/history.json'))
          h.sort(key=lambda e: e.get('when_unix', 0), reverse=True)
          shas = set()
          for entry in h[:4]:
              url = entry.get('report_url', '')
              u = url.replace('/report.html', '').rstrip('/')
              parts = [p for p in u.split('/') if p]
              if parts:
                  shas.add(parts[-1])
              shas.add(entry.get('sha', ''))
          shas.add('${{ github.sha }}')
          shas.discard('')
          print(' '.join(shas))
          ")
          echo "keep shas: $KEEP"
          echo "keep=$KEEP" >> "$GITHUB_OUTPUT"

      - name: GC — delete old game.wasm blobs
        if: success() && vars.SEER_DISTRIBUTION_ID != '' && steps.gc_plan.outputs.keep != ''
        run: |
          KEEP="${{ steps.gc_plan.outputs.keep }}"
          aws s3 ls "s3://seer-sbvh-static/perf/" --recursive \
            | awk '{print $4}' \
            | while read -r path; do
                case "$path" in
                  perf/*/game.wasm) : ;;
                  *) continue ;;
                esac
                sha=$(echo "$path" | cut -d/ -f2)
                case " $KEEP " in
                  *" $sha "*) echo "keep $path" ;;
                  *) echo "gc   $path"
                     aws s3 rm "s3://seer-sbvh-static/$path" ;;
                esac
              done

      - name: Invalidate CloudFront (diagnostic)
        if: success() && vars.SEER_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.SEER_DISTRIBUTION_ID }}" \
            --paths '/perf/latest/*' '/perf/history.json' "/perf/${{ github.sha }}/game.wasm" \
            --query 'Invalidation.Id' \
            --output text

      - name: Enforce verdict
        if: always()
        run: |
          # Check verdict AFTER upload — a failing report is still a
          # useful report and needs to be visible. This step is what
          # actually turns the job red on threshold violation.
          if [ -f out/verdict.json ]; then
            PASSED=$(python3 -c 'import json,sys;print(json.load(open("out/verdict.json"))["passed"])')
            echo "verdict.passed = $PASSED"
            if [ "$PASSED" != "True" ]; then
              echo "::error::seer threshold violated — see report + verdict.json artifact"
              cat out/verdict.json
              exit 1
            fi
          fi
