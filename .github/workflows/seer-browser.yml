name: seer-browser

# Browser deploy for seer. Two outputs to S3, both behind CloudFront
# at https://seer.sbvh.nl/:
#
#   1. viewer/dist/ syncs to the bucket root — this is the seer
#      reporting UI itself. Loads /perf/history.json, renders one
#      column per commit, each column pulls its per-sha JSONs from
#      /perf/<sha>/*.
#
#   2. game.wasm uploads to /perf/<sha>/game.wasm — the exact binary
#      seer-host just ran under wasmtime. The viewer's LiveRun panel
#      per column fetches this and re-instantiates it in the browser
#      with the same four env.* imports, so the reader can run the
#      historical commit's wasm directly.
#
# GC keeps only the newest 4 shas' game.wasm on S3 — older commits
# retain their JSONs (small, forever) but lose the wasm blob. LiveRun
# for those columns surfaces the honest 404.
#
# No wasm-bindgen, no npm/wasm-pack. The 4 imports are hand-wired in
# LiveRun.svelte; imports.allow enforces the boundary.

on:
  push:
    branches: ['**']
    paths:
      - 'game/**'
      - 'viewer/**'
      - '.github/workflows/seer-browser.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: seer-browser
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  STATIC_BUCKET: seer-sbvh-static
  STATIC_DISTRIBUTION_ID: ${{ vars.SEER_DISTRIBUTION_ID }}
  DEPLOY_ROLE_ARN: arn:aws:iam::548351057127:role/seer-github-deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: seer

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Build game.wasm
        working-directory: game
        env:
          SEER_BUILD_COMMIT: ${{ github.sha }}
          SEER_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: cargo build --release --lib --target wasm32-unknown-unknown

      - name: Build seer-imports-check
        working-directory: crates/seer-imports-check
        run: cargo build --release

      - name: Boundary — check game.wasm imports against allow list
        working-directory: crates/seer-imports-check
        run: |
          ./target/release/seer-imports-check \
            ../../game/target/wasm32-unknown-unknown/release/game.wasm \
            ../../game/imports.allow

      - name: Install viewer deps (bun)
        working-directory: viewer
        run: bun install --frozen-lockfile

      - name: Build viewer bundle
        working-directory: viewer
        run: bun run build.ts

      - name: Report bundle sizes
        run: |
          echo "== viewer dist =="
          ls -la viewer/dist/
          echo "== wasm size =="
          wc -c game/target/wasm32-unknown-unknown/release/game.wasm

      - name: Upload viewer dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: seer-viewer-${{ github.sha }}
          path: viewer/dist/
          retention-days: 30

      - name: Assume deploy role
        if: env.STATIC_DISTRIBUTION_ID != ''
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync viewer bundle to S3 root
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          # --exclude "perf/*" keeps per-commit diagnostic artifacts untouched.
          aws s3 sync viewer/dist/ "s3://${{ env.STATIC_BUCKET }}/" \
            --delete \
            --exclude "perf/*" \
            --cache-control "public, max-age=300"

      - name: Overwrite index.html with no-store cache
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          aws s3 cp viewer/dist/index.html "s3://${{ env.STATIC_BUCKET }}/index.html" \
            --cache-control "no-store, no-cache, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Upload game.wasm to /perf/<sha>/
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          # Per-commit wasm. Named the same at every prefix so the
          # LiveRun component composes its URL from just the sha.
          aws s3 cp \
            game/target/wasm32-unknown-unknown/release/game.wasm \
            "s3://${{ env.STATIC_BUCKET }}/perf/${{ github.sha }}/game.wasm" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/wasm"

      - name: GC — compute keep set (newest 4 shas + this run)
        id: gc_plan
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          curl -sSf https://seer.sbvh.nl/perf/history.json -o history.json || echo '[]' > history.json
          KEEP=$(python3 -c "
          import json
          h = json.load(open('history.json'))
          h.sort(key=lambda e: e.get('when_unix', 0), reverse=True)
          shas = set()
          for entry in h[:4]:
              # older history entries embed the full sha in report_url;
              # newer entries carry it directly in .sha.
              url = entry.get('report_url', '')
              u = url.replace('/report.html', '').rstrip('/')
              parts = [p for p in u.split('/') if p]
              if parts:
                  shas.add(parts[-1])
              shas.add(entry.get('sha', ''))
          shas.add('${{ github.sha }}')
          shas.discard('')
          print(' '.join(shas))
          ")
          echo "keep shas: $KEEP"
          echo "keep=$KEEP" >> "$GITHUB_OUTPUT"

      - name: GC — delete old game.wasm blobs
        if: env.STATIC_DISTRIBUTION_ID != '' && steps.gc_plan.outputs.keep != ''
        run: |
          KEEP="${{ steps.gc_plan.outputs.keep }}"
          aws s3 ls "s3://${{ env.STATIC_BUCKET }}/perf/" --recursive \
            | awk '{print $4}' \
            | while read -r path; do
                case "$path" in
                  perf/*/game.wasm) : ;;
                  *) continue ;;
                esac
                sha=$(echo "$path" | cut -d/ -f2)
                case " $KEEP " in
                  *" $sha "*) echo "keep $path" ;;
                  *) echo "gc   $path"
                     aws s3 rm "s3://${{ env.STATIC_BUCKET }}/$path" ;;
                esac
              done

      - name: Invalidate CloudFront
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          # Root paths (viewer) + this commit's wasm. Per-sha JSONs
          # invalidate via seer.yml's own step; they're that workflow's
          # responsibility.
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ env.STATIC_DISTRIBUTION_ID }}" \
            --paths '/index.html' '/main.js' '/tokens.css' '/font.css' "/perf/${{ github.sha }}/game.wasm" \
            --query 'Invalidation.Id' \
            --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ env.STATIC_DISTRIBUTION_ID }}" \
            --id "$INVALIDATION_ID"

      - name: Summarize
        run: |
          {
            echo "## seer-browser"
            echo ""
            if [ -n "${{ env.STATIC_DISTRIBUTION_ID }}" ]; then
              echo "- Live at: https://seer.sbvh.nl/"
              echo "- This commit's wasm: /perf/${{ github.sha }}/game.wasm"
            else
              echo "- SEER_DISTRIBUTION_ID not set → skipped S3 deploy."
            fi
            echo ""
            echo "- Artifact: \`seer-viewer-${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
