name: deploy-rave

on:
  push:
    branches: ['**']
    paths:
      - 'rave/**'
      - '.github/workflows/deploy-rave.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-rave
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  STATIC_BUCKET: rave-sbvh-static
  STATIC_DISTRIBUTION_ID: EY1IQ1DX4OK4A
  DEPLOY_ROLE_ARN: arn:aws:iam::548351057127:role/rave-github-deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rave

      - name: Type-check tests (TDD gate)
        working-directory: rave
        run: nix develop -c cargo check --tests --lib --target wasm32-unknown-unknown

      # Two-browser equivalent — native libp2p clients meshing through
      # the real relayer binary on loopback. Lives in its own crate so
      # cargo never builds rave's wasm-only Bevy lib on Linux. Proves
      # the gossipsub mesh forms and rave-positions round-trip
      # end-to-end. Replaces the manual R11 browser verification.
      #
      # Runs cargo directly (no nix develop) because this crate only
      # needs stable rust + cargo, which the runner image provides.
      # No wasm-bindgen-cli, no nix flake required.
      - name: Integration test — positions via relayer
        working-directory: crates/rave-positions-test
        run: cargo test --release -- --nocapture

      # Pure Health primitives — durable-condition upsert/resolve
      # logic used by rave/src/health.rs. Lives in its own crate so
      # this step compiles + runs on Linux without dragging rave's
      # wasm-only Bevy renderer deps.
      - name: Unit tests — rave-health
        working-directory: crates/rave-health
        run: cargo test --release -- --nocapture

      - name: Build wasm bundle
        working-directory: rave
        run: nix develop -c make wasm

      - name: Verify dist contents
        working-directory: rave
        run: |
          # Top-level shim — picks a backend at load time.
          test -f dist/index.html || { echo "dist/index.html missing"; exit 1; }
          grep -q "navigator.gpu" dist/index.html || { echo "dist/index.html isn't the shim (no navigator.gpu picker)"; exit 1; }
          # Both backend bundles must exist. Bevy 0.19 shader defines
          # are compile-time gated per backend (see rave/Cargo.toml
          # comment on `default = ["backend-webgpu"]`); shipping one
          # bundle breaks the other class of client.
          for backend in webgpu webgl2; do
            test -f dist/$backend/index.html                 || { echo "dist/$backend/index.html missing"; exit 1; }
            ls dist/$backend/rave_bg.*.wasm >/dev/null 2>&1  || { echo "dist/$backend/rave_bg.*.wasm missing"; exit 1; }
            ls dist/$backend/rave.*.js      >/dev/null 2>&1  || { echo "dist/$backend/rave.*.js missing"; exit 1; }
            # index.html must point at the hashed asset that exists on
            # disk — the matched-pair guarantee is only worth anything
            # if it holds. Checked per backend subdir.
            grep -oE 'rave\.[0-9a-f]+\.js' dist/$backend/index.html | while read -r js; do
              test -f "dist/$backend/$js" || { echo "dist/$backend/index.html references missing $js"; exit 1; }
            done
          done
          ls -R dist/

      - name: Assume deploy role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync dist to S3
        working-directory: rave
        run: |
          # Hashed assets are content-addressed, so they can cache forever
          # — a new build emits a new filename rather than mutating one.
          # `--exclude "*index.html"` skips index.html at any depth so the
          # three index.html files (shim + one per backend) get uploaded
          # separately with must-revalidate cache-control below.
          aws s3 sync dist/ "s3://${{ env.STATIC_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*index.html"
          # index.html files must revalidate — they're the version-pinning
          # references to the hashed assets. The shim also swaps between
          # backends based on `navigator.gpu`, so a stale shim would send
          # WebGL2 clients to a broken WebGPU build (or vice versa).
          for html in dist/index.html dist/webgpu/index.html dist/webgl2/index.html; do
            key="${html#dist/}"
            aws s3 cp "$html" "s3://${{ env.STATIC_BUCKET }}/$key" \
              --cache-control "public, max-age=60, must-revalidate" \
              --content-type "text/html; charset=utf-8"
          done

      - name: Invalidate CloudFront
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ env.STATIC_DISTRIBUTION_ID }}" \
            --paths '/*' \
            --query 'Invalidation.Id' \
            --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ env.STATIC_DISTRIBUTION_ID }}" \
            --id "$INVALIDATION_ID"

      - name: Summarize
        run: |
          {
            echo "## Deploy complete"
            echo ""
            echo "- Live at: https://rave.sbvh.nl/"
          } >> "$GITHUB_STEP_SUMMARY"
