name: deploy-rave

on:
  push:
    branches: ['**']
    paths:
      - 'rave/**'
      - '.github/workflows/deploy-rave.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-rave
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  STATIC_BUCKET: rave-sbvh-static
  STATIC_DISTRIBUTION_ID: EY1IQ1DX4OK4A
  DEPLOY_ROLE_ARN: arn:aws:iam::548351057127:role/rave-github-deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rave

      - name: Type-check tests (TDD gate)
        working-directory: rave
        run: nix develop -c cargo check --tests --lib --target wasm32-unknown-unknown

      # Two-browser equivalent — native libp2p clients meshing through
      # the real relayer binary on loopback. Lives in its own crate so
      # cargo never builds rave's wasm-only Bevy lib on Linux. Proves
      # the gossipsub mesh forms and rave-positions round-trip
      # end-to-end. Replaces the manual R11 browser verification.
      #
      # Runs cargo directly (no nix develop) because this crate only
      # needs stable rust + cargo, which the runner image provides.
      # No wasm-bindgen-cli, no nix flake required.
      - name: Integration test — positions via relayer
        working-directory: crates/rave-positions-test
        run: cargo test --release -- --nocapture

      # Pure Health primitives — durable-condition upsert/resolve
      # logic used by rave/src/health.rs. Lives in its own crate so
      # this step compiles + runs on Linux without dragging rave's
      # wasm-only Bevy renderer deps.
      - name: Unit tests — rave-health
        working-directory: crates/rave-health
        run: cargo test --release -- --nocapture

      - name: Build wasm bundle
        working-directory: rave
        run: nix develop -c make wasm

      - name: Verify dist contents
        working-directory: rave
        run: |
          # Single canonical index.html at root. Contains the bootstrap
          # that picks the backend at load time based on navigator.gpu.
          test -f dist/index.html || { echo "dist/index.html missing"; exit 1; }
          grep -q "navigator" dist/index.html || { echo "dist/index.html has no bootstrap (navigator check missing)"; exit 1; }
          # Both backend bundles must exist flat in dist/. Bevy 0.19
          # shader defines are compile-time gated per backend (see
          # rave/Cargo.toml comment on `default = ["backend-webgpu"]`);
          # shipping one bundle breaks the other class of client.
          for backend in webgpu webgl2; do
            ls dist/main-$backend.*.js         >/dev/null 2>&1 || { echo "dist/main-$backend.*.js missing"; exit 1; }
            ls dist/rave-$backend.*.js         >/dev/null 2>&1 || { echo "dist/rave-$backend.*.js missing"; exit 1; }
            ls dist/rave-$backend-bg.*.wasm    >/dev/null 2>&1 || { echo "dist/rave-$backend-bg.*.wasm missing"; exit 1; }
            # Bootstrap must reference an actual per-backend main file
            # that exists on disk — matched-pair guarantee.
            main_hashed=$(ls -1 dist/main-$backend.*.js | head -1 | xargs basename)
            grep -q "./$main_hashed" dist/index.html || { echo "dist/index.html doesn't reference $main_hashed"; exit 1; }
          done
          ls -la dist/

      - name: Assume deploy role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync dist to S3
        working-directory: rave
        run: |
          # Hashed assets are content-addressed, so they can cache forever
          # — a new build emits a new filename rather than mutating one.
          aws s3 sync dist/ "s3://${{ env.STATIC_BUCKET }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          # `no-store` on index.html: any cache layer holding a stale
          # copy breaks the cascade to new content-hashed imports.
          aws s3 cp dist/index.html "s3://${{ env.STATIC_BUCKET }}/index.html" \
            --cache-control "no-store, no-cache, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ env.STATIC_DISTRIBUTION_ID }}" \
            --paths '/*' \
            --query 'Invalidation.Id' \
            --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ env.STATIC_DISTRIBUTION_ID }}" \
            --id "$INVALIDATION_ID"

      - name: Summarize
        run: |
          {
            echo "## Deploy complete"
            echo ""
            echo "- Live at: https://rave.sbvh.nl/"
          } >> "$GITHUB_STEP_SUMMARY"

  mobile-screenshot:
    needs: build-and-deploy
    runs-on: macos-26
    timeout-minutes: 25
    steps:
      - name: Environment inventory
        run: |
          echo "== Xcode =="
          xcrun --version
          xcode-select -p
          echo "== Available iOS runtimes =="
          xcrun simctl list runtimes | grep iOS || true
          echo "== Available iPhone devices =="
          xcrun simctl list devices available | grep -E "iPhone" | head -20

      - name: Boot iPhone simulator
        id: boot
        run: |
          set -e
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          candidates = []
          for runtime, devices in sorted(data['devices'].items(), reverse=True):
              if 'iOS' not in runtime: continue
              for d in devices:
                  if not d.get('isAvailable', False): continue
                  name = d.get('name', '')
                  if 'iPhone' in name and 'Pro' not in name:
                      candidates.append((0, d['udid'], name))
                  elif 'iPhone' in name:
                      candidates.append((1, d['udid'], name))
                  elif 'iPad' in name:
                      candidates.append((2, d['udid'], name))
          if not candidates:
              sys.exit(1)
          candidates.sort()
          rank, udid, name = candidates[0]
          print(udid, file=sys.stderr)
          print(name, file=sys.stderr)
          print(udid)
          ")
          echo "Booting device UDID: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b
          # Disable Safari's first-launch onboarding tooltip
          # ("View Bookmarks, Share Menu, and Open Tabs") which
          # otherwise covers the bottom half of every screenshot. Keys
          # come from Safari's plist; setting them all covers the
          # different iOS Safari onboarding variants across versions.
          xcrun simctl spawn "$DEVICE_ID" defaults write com.apple.mobilesafari \
              DidShowContinuityMigrationExperience -bool YES || true
          xcrun simctl spawn "$DEVICE_ID" defaults write com.apple.mobilesafari \
              TutorialHasBeenShown -bool YES || true
          xcrun simctl spawn "$DEVICE_ID" defaults write com.apple.mobilesafari \
              SBFirstLaunchCompleted -bool YES || true
          xcrun simctl spawn "$DEVICE_ID" defaults write com.apple.mobilesafari \
              SafariBaselinesOnboardingComplete -bool YES || true
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Start OS RSS sampler
        run: |
          mkdir -p screenshots
          (
            while true; do
              ts=$(date +%s)
              ps -A -o pid,rss,command 2>/dev/null | \
                grep -E 'WebContent|MobileSafari|com\.apple\.WebKit\.GPU|com\.apple\.WebKit\.Networking' | \
                grep -v grep | \
                awk -v ts=$ts '{printf "%s\t%s\t%s\t", ts, $1, $2; for (i=3; i<=NF; i++) printf "%s ", $i; printf "\n"}' \
                >> screenshots/rss.log
              sleep 2
            done
          ) &
          echo $! > /tmp/rss.pid

      - name: Capture screenshots — auto backend
        run: |
          xcrun simctl launch "${{ steps.boot.outputs.device_id }}" com.apple.mobilesafari
          sleep 2
          xcrun simctl openurl "${{ steps.boot.outputs.device_id }}" 'https://rave.sbvh.nl/?verbose=1'
          mkdir -p screenshots/auto
          shoot() {
              xcrun simctl io "${{ steps.boot.outputs.device_id }}" screenshot "screenshots/auto/t${1}s.png"
              echo "auto t=${1}s"
          }
          sleep 3;  shoot 3
          sleep 2;  shoot 5
          sleep 5;  shoot 10
          sleep 10; shoot 20
          sleep 15; shoot 35
          sleep 20; shoot 55

      - name: Capture screenshots — forced webgpu
        run: |
          # Fresh URL bypasses in-page cache; ?backend=webgpu forces the
          # bootstrap to pick that bundle regardless of navigator.gpu.
          xcrun simctl openurl "${{ steps.boot.outputs.device_id }}" 'https://rave.sbvh.nl/?backend=webgpu&verbose=1'
          mkdir -p screenshots/webgpu
          shoot() {
              xcrun simctl io "${{ steps.boot.outputs.device_id }}" screenshot "screenshots/webgpu/t${1}s.png"
              echo "webgpu t=${1}s"
          }
          sleep 3;  shoot 3
          sleep 2;  shoot 5
          sleep 5;  shoot 10
          sleep 10; shoot 20
          sleep 15; shoot 35
          sleep 20; shoot 55

      - name: Capture screenshots — forced webgl2
        run: |
          xcrun simctl openurl "${{ steps.boot.outputs.device_id }}" 'https://rave.sbvh.nl/?backend=webgl2&verbose=1'
          mkdir -p screenshots/webgl2
          shoot() {
              xcrun simctl io "${{ steps.boot.outputs.device_id }}" screenshot "screenshots/webgl2/t${1}s.png"
              echo "webgl2 t=${1}s"
          }
          sleep 3;  shoot 3
          sleep 2;  shoot 5
          sleep 5;  shoot 10
          sleep 10; shoot 20
          sleep 15; shoot 35
          sleep 20; shoot 55

      - name: Stop OS RSS sampler
        if: always()
        run: |
          if [ -f /tmp/rss.pid ]; then
            kill "$(cat /tmp/rss.pid)" 2>/dev/null || true
          fi
          echo "== rss.log tail =="
          tail -50 screenshots/rss.log || true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-screenshots-${{ github.sha }}
          path: screenshots/
          retention-days: 30

      - name: Summarize
        if: always()
        run: |
          {
            echo "## Mobile screenshots"
            echo ""
            echo "Mobile Safari on iOS Simulator at https://rave.sbvh.nl"
            echo ""
            echo "Download the \`mobile-screenshots-${{ github.sha }}\` artifact for the full timeline."
          } >> "$GITHUB_STEP_SUMMARY"
