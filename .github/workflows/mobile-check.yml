name: mobile-check

# Auto-runs after every successful deploy-rave and captures a series of
# screenshots of rave.sbvh.nl loaded in Mobile Safari on the iOS
# Simulator. Solves "the developer keeps having to reload their phone
# and screenshot the drawer" by making mobile screenshots a CI artifact
# on every push. Same WebKit engine iOS Firefox uses.

on:
  workflow_run:
    workflows: ["deploy-rave"]
    types: [completed]
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mobile-screenshot:
    # Only auto-fire when deploy-rave actually succeeded; manual dispatch
    # is unconditional.
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Environment inventory
        run: |
          echo "== Xcode =="
          xcrun --version
          xcode-select -p
          echo "== Available iOS runtimes =="
          xcrun simctl list runtimes | grep iOS || true
          echo "== Available iPhone devices =="
          xcrun simctl list devices available | grep -E "iPhone" | head -20

      - name: Boot iPhone simulator
        id: boot
        run: |
          set -e
          # Pick the first iPhone device with a recent iOS runtime.
          DEVICE_ID=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in sorted(data['devices'].items(), reverse=True):
              if 'iOS' not in runtime: continue
              for d in devices:
                  if 'iPhone' in d.get('name', '') and d.get('isAvailable', False):
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          echo "Booting device UDID: $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID"
          xcrun simctl bootstatus "$DEVICE_ID" -b
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Open rave.sbvh.nl in Mobile Safari
        run: |
          xcrun simctl launch "${{ steps.boot.outputs.device_id }}" com.apple.mobilesafari
          sleep 2
          xcrun simctl openurl "${{ steps.boot.outputs.device_id }}" https://rave.sbvh.nl

      - name: Capture screenshots over time
        run: |
          mkdir -p screenshots
          shoot() {
              xcrun simctl io "${{ steps.boot.outputs.device_id }}" screenshot "screenshots/t${1}s.png"
              echo "captured t=${1}s → screenshots/t${1}s.png"
          }
          # Sample cadence: dense early to catch init-through-first-throw,
          # sparser later to catch reload cycles + longer-running errors.
          sleep 3;   shoot 3
          sleep 2;   shoot 5
          sleep 5;   shoot 10
          sleep 5;   shoot 15
          sleep 10;  shoot 25
          sleep 10;  shoot 35
          sleep 15;  shoot 50
          sleep 20;  shoot 70

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-screenshots-${{ github.sha }}
          path: screenshots/
          retention-days: 30

      - name: Summarize
        if: always()
        run: |
          {
            echo "## Mobile screenshots"
            echo ""
            echo "iOS Simulator on macos-15, Mobile Safari at https://rave.sbvh.nl"
            echo ""
            echo "Download the \`mobile-screenshots-${{ github.sha }}\` artifact for the full timeline."
          } >> "$GITHUB_STEP_SUMMARY"
