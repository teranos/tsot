name: mem-diagnostic

# Native GPU-memory diagnostic — runs on plain Ubuntu with Mesa's lavapipe
# (software Vulkan), no browser, no simulator, no wasm. Instruments
# wgpu::Device::create_buffer from inside the same Rust process, captures
# std::backtrace::Backtrace::force_capture() per allocation, emits a
# per-buffer live inventory with full Rust source paths to stdout.
#
# Uploaded as an artifact per commit. Replaces the "boot iOS Simulator,
# open Safari, screenshot at intervals" pipeline for the class of
# question "where is GPU memory going" — the browser was never necessary
# for that; it was just where we happened to be looking.

on:
  push:
    branches: ['**']
    paths:
      - 'crates/rave-mem-diagnostic/**'
      - '.github/workflows/mem-diagnostic.yml'
  workflow_dispatch:

jobs:
  mem-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/rave-mem-diagnostic

      - name: Install Mesa software Vulkan (lavapipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mesa-vulkan-drivers \
            libvulkan1 \
            vulkan-tools
          echo "== vulkaninfo (summary) =="
          vulkaninfo --summary || true

      - name: Build diagnostic
        working-directory: crates/rave-mem-diagnostic
        run: cargo build --release

      - name: Run diagnostic
        working-directory: crates/rave-mem-diagnostic
        env:
          RUST_BACKTRACE: full
          MEM_DIAG_SECS: 30
        run: |
          mkdir -p out
          # Tee stdout so we can inspect in the step log AND upload as artifact.
          cargo run --release 2>&1 | tee out/mem-diagnostic.log

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mem-diagnostic-${{ github.sha }}
          path: crates/rave-mem-diagnostic/out/
          retention-days: 30

      - name: Summarize
        if: always()
        run: |
          {
            echo "## mem-diagnostic"
            echo ""
            echo "Native wgpu diagnostic run on Ubuntu with Mesa lavapipe."
            echo "Full log in artifact \`mem-diagnostic-${{ github.sha }}\`."
          } >> "$GITHUB_STEP_SUMMARY"
