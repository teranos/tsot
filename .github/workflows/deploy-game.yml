name: deploy-game

# Deploys game.sbvh.nl — the browser bootstrap + game.wasm at the root
# of the game static bucket. Separate from seer-browser.yml which
# ships game.wasm to /perf/<sha>/ for the seer LiveRun diagnostic path.

on:
  push:
    branches: ['**']
    paths:
      - 'game/**'
      - 'crates/cdda/**'
      - '.github/workflows/deploy-game.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-game
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  STATIC_BUCKET: game-sbvh-static
  STATIC_DISTRIBUTION_ID: ${{ vars.GAME_DISTRIBUTION_ID }}
  DEPLOY_ROLE_ARN: arn:aws:iam::548351057127:role/game-github-deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: game

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      # CDDA map corpus is a pinned dependency, not vendored. Realise it
      # via the flake's hash-verified fetch and hand the store path to
      # build.rs through $CDDA_SRC.
      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Realise CDDA corpus (pinned, hash-verified)
        working-directory: game
        run: echo "CDDA_SRC=$(nix build .#cdda-src --no-link --print-out-paths)" >> "$GITHUB_ENV"

      - name: Build game.wasm
        working-directory: game
        env:
          SEER_BUILD_COMMIT: ${{ github.sha }}
          SEER_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: cargo build --release --lib --target wasm32-unknown-unknown

      - name: Build seer-imports-check
        working-directory: crates/seer-imports-check
        run: cargo build --release

      - name: Boundary — check game.wasm imports against allow list
        working-directory: crates/seer-imports-check
        run: |
          ./target/release/seer-imports-check \
            ../../game/target/wasm32-unknown-unknown/release/game.wasm \
            ../../game/imports.allow

      - name: Install ffmpeg (for OGG encoding)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate music.ogg
        working-directory: game
        run: make music

      - name: Install game/web deps (bun)
        working-directory: game/web
        run: bun install --frozen-lockfile

      - name: Build web bundle
        working-directory: game/web
        env:
          # Same commit the wasm build embeds, so the bundle bakes the
          # matching value and the boot-time build-loop check passes on a
          # coherent deploy (and fails loud on a skewed one).
          SEER_BUILD_COMMIT: ${{ github.sha }}
        run: bun run build.ts

      - name: Generate build-info.json
        run: |
          SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          cat > game/web/dist/build-info.json <<EOF
          {"short":"$SHORT","built_at":"${{ github.event.head_commit.timestamp }}"}
          EOF
          cat game/web/dist/build-info.json

      - name: Report bundle sizes
        run: |
          echo "== game web dist =="
          ls -la game/web/dist/
          echo "== wasm size =="
          wc -c game/target/wasm32-unknown-unknown/release/game.wasm

      - name: Assume deploy role
        if: env.STATIC_DISTRIBUTION_ID != ''
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync web bundle to S3 root
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          aws s3 sync game/web/dist/ "s3://${{ env.STATIC_BUCKET }}/" \
            --delete \
            --exclude "game.wasm" \
            --cache-control "public, max-age=300"

      - name: Overwrite index.html with no-store cache
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          aws s3 cp game/web/dist/index.html "s3://${{ env.STATIC_BUCKET }}/index.html" \
            --cache-control "no-store, no-cache, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Overwrite build-info.json with no-store cache
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          aws s3 cp game/web/dist/build-info.json "s3://${{ env.STATIC_BUCKET }}/build-info.json" \
            --cache-control "no-store, no-cache, must-revalidate" \
            --content-type "application/json"

      - name: Upload game.wasm
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          aws s3 cp \
            game/target/wasm32-unknown-unknown/release/game.wasm \
            "s3://${{ env.STATIC_BUCKET }}/game.wasm" \
            --cache-control "public, max-age=300" \
            --content-type "application/wasm"

      - name: Invalidate CloudFront
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          # The JS bundle is content-hashed (main-<hash>.js) and served
          # from a fresh name each deploy, so it never needs invalidating
          # — index.html (no-store) references the new name directly.
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ env.STATIC_DISTRIBUTION_ID }}" \
            --paths '/index.html' '/game.wasm' '/build-info.json' \
            --query 'Invalidation.Id' \
            --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ env.STATIC_DISTRIBUTION_ID }}" \
            --id "$INVALIDATION_ID"

      - name: Summarize
        run: |
          {
            echo "## deploy-game"
            echo ""
            if [ -n "${{ env.STATIC_DISTRIBUTION_ID }}" ]; then
              echo "- Live at: https://game.sbvh.nl/"
            else
              echo "- GAME_DISTRIBUTION_ID not set → skipped S3 deploy."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
