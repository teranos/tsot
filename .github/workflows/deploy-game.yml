name: deploy-game

# Deploys game.sbvh.nl — the browser bootstrap + game.wasm at the root
# of the game static bucket. Separate from seer-browser.yml which
# ships game.wasm to /perf/<sha>/ for the seer LiveRun diagnostic path.

on:
  push:
    branches: ['**']
    paths:
      - 'game/**'
      - '.github/workflows/deploy-game.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-game
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  STATIC_BUCKET: game-sbvh-static
  STATIC_DISTRIBUTION_ID: ${{ vars.GAME_DISTRIBUTION_ID }}
  DEPLOY_ROLE_ARN: arn:aws:iam::548351057127:role/game-github-deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: game

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Build game.wasm
        working-directory: game
        env:
          SEER_BUILD_COMMIT: ${{ github.sha }}
          SEER_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: cargo build --release --lib --target wasm32-unknown-unknown

      - name: Build seer-imports-check
        working-directory: crates/seer-imports-check
        run: cargo build --release

      - name: Boundary — check game.wasm imports against allow list
        working-directory: crates/seer-imports-check
        run: |
          ./target/release/seer-imports-check \
            ../../game/target/wasm32-unknown-unknown/release/game.wasm \
            ../../game/imports.allow

      - name: Install game/web deps (bun)
        working-directory: game/web
        run: bun install --frozen-lockfile

      - name: Build web bundle
        working-directory: game/web
        run: bun run build.ts

      - name: Report bundle sizes
        run: |
          echo "== game web dist =="
          ls -la game/web/dist/
          echo "== wasm size =="
          wc -c game/target/wasm32-unknown-unknown/release/game.wasm

      - name: Assume deploy role
        if: env.STATIC_DISTRIBUTION_ID != ''
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync web bundle to S3 root
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          aws s3 sync game/web/dist/ "s3://${{ env.STATIC_BUCKET }}/" \
            --delete \
            --exclude "game.wasm" \
            --cache-control "public, max-age=300"

      - name: Overwrite index.html with no-store cache
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          aws s3 cp game/web/dist/index.html "s3://${{ env.STATIC_BUCKET }}/index.html" \
            --cache-control "no-store, no-cache, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Upload game.wasm
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          aws s3 cp \
            game/target/wasm32-unknown-unknown/release/game.wasm \
            "s3://${{ env.STATIC_BUCKET }}/game.wasm" \
            --cache-control "public, max-age=300" \
            --content-type "application/wasm"

      - name: Invalidate CloudFront
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ env.STATIC_DISTRIBUTION_ID }}" \
            --paths '/index.html' '/main.js' '/game.wasm' \
            --query 'Invalidation.Id' \
            --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ env.STATIC_DISTRIBUTION_ID }}" \
            --id "$INVALIDATION_ID"

      - name: Summarize
        run: |
          {
            echo "## deploy-game"
            echo ""
            if [ -n "${{ env.STATIC_DISTRIBUTION_ID }}" ]; then
              echo "- Live at: https://game.sbvh.nl/"
            else
              echo "- GAME_DISTRIBUTION_ID not set → skipped S3 deploy."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
