name: deploy-game

# Deploys game.sbvh.nl — the browser bootstrap + game.wasm at the root
# of the game static bucket. Separate from seer-browser.yml which
# ships game.wasm to /perf/<sha>/ for the seer LiveRun diagnostic path.

on:
  push:
    branches: ['**']
    paths:
      - 'game/**'
      - '.github/workflows/deploy-game.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-game
  cancel-in-progress: true

env:
  AWS_REGION: eu-central-1
  STATIC_BUCKET: game-sbvh-static
  STATIC_DISTRIBUTION_ID: ${{ vars.GAME_DISTRIBUTION_ID }}
  DEPLOY_ROLE_ARN: arn:aws:iam::548351057127:role/game-github-deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: game

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Build game.wasm
        working-directory: game
        env:
          SEER_BUILD_COMMIT: ${{ github.sha }}
          SEER_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: cargo build --release --lib --target wasm32-unknown-unknown

      - name: Build seer-imports-check
        working-directory: crates/seer-imports-check
        run: cargo build --release

      - name: Boundary — check game.wasm imports against allow list
        working-directory: crates/seer-imports-check
        run: |
          ./target/release/seer-imports-check \
            ../../game/target/wasm32-unknown-unknown/release/game.wasm \
            ../../game/imports.allow

      - name: Install ffmpeg (for OGG encoding)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate music.ogg
        working-directory: game
        run: make music

      - name: Install game/web deps (bun)
        working-directory: game/web
        run: bun install --frozen-lockfile

      - name: Build web bundle
        working-directory: game/web
        run: bun run build.ts

      # Fetch laye-p2p artifacts from laye.sbvh.nl and drop them
      # into the game dist so the browser loads them same-origin.
      # wasm-bindgen's streaming instantiate + CORS interaction is
      # flaky cross-origin; mirroring laye/bevy-starter's pattern —
      # laye_p2p.js + laye_p2p_bg.wasm served from the same host as
      # index.html — is the reliable route.
      - name: Fetch laye-p2p artifacts
        working-directory: game/web/dist
        run: |
          curl -fsSL -o laye_p2p.js https://laye.sbvh.nl/laye_p2p.js
          curl -fsSL -o laye_p2p_bg.wasm https://laye.sbvh.nl/laye_p2p_bg.wasm
          ls -la laye_p2p*

      - name: Generate build-info.json
        run: |
          SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          cat > game/web/dist/build-info.json <<EOF
          {"short":"$SHORT","built_at":"${{ github.event.head_commit.timestamp }}"}
          EOF
          cat game/web/dist/build-info.json

      - name: Report bundle sizes
        run: |
          echo "== game web dist =="
          ls -la game/web/dist/
          echo "== wasm size =="
          wc -c game/target/wasm32-unknown-unknown/release/game.wasm

      - name: Assume deploy role
        if: env.STATIC_DISTRIBUTION_ID != ''
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Branch → S3 prefix routing. master lands at bucket root
      # (game.sbvh.nl/); any other branch lands under
      # game.sbvh.nl/<branch>/. Only branch deploys pass --delete so
      # master syncs never touch the branch subdirs sitting next to
      # them. Mirrors laye's deploy-bevy-starter pattern.
      - name: Compute deploy target
        if: env.STATIC_DISTRIBUTION_ID != ''
        id: target
        run: |
          REF="${{ github.ref_name }}"
          if [ "$REF" = "master" ]; then
            {
              echo "prefix="
              echo "delete_flag="
              echo "invalidation_path=/*"
              echo "url=https://game.sbvh.nl/"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "prefix=${REF}/"
              echo "delete_flag=--delete"
              echo "invalidation_path=/${REF}/*"
              echo "url=https://game.sbvh.nl/${REF}/"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Sync web bundle to S3
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          PREFIX="${{ steps.target.outputs.prefix }}"
          DELETE="${{ steps.target.outputs.delete_flag }}"
          aws s3 sync game/web/dist/ "s3://${{ env.STATIC_BUCKET }}/${PREFIX}" \
            $DELETE \
            --exclude "game.wasm" \
            --exclude "index.html" \
            --exclude "build-info.json" \
            --cache-control "public, max-age=300"

      - name: Overwrite index.html with no-store cache
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          PREFIX="${{ steps.target.outputs.prefix }}"
          aws s3 cp game/web/dist/index.html "s3://${{ env.STATIC_BUCKET }}/${PREFIX}index.html" \
            --cache-control "no-store, no-cache, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Overwrite build-info.json with no-store cache
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          PREFIX="${{ steps.target.outputs.prefix }}"
          aws s3 cp game/web/dist/build-info.json "s3://${{ env.STATIC_BUCKET }}/${PREFIX}build-info.json" \
            --cache-control "no-store, no-cache, must-revalidate" \
            --content-type "application/json"

      - name: Upload game.wasm
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          PREFIX="${{ steps.target.outputs.prefix }}"
          aws s3 cp \
            game/target/wasm32-unknown-unknown/release/game.wasm \
            "s3://${{ env.STATIC_BUCKET }}/${PREFIX}game.wasm" \
            --cache-control "public, max-age=300" \
            --content-type "application/wasm"

      # Regenerate the branch-index versions.json read by the in-game
      # picker (press 9 to open). CommonPrefixes on a delimited
      # list-objects returns every top-level "dir/" — strip the
      # trailing slash and reject known non-branch prefixes so the
      # picker only sees actual branch deploys. Master is not a
      # prefix (it sits at the root), synthesised client-side.
      - name: Regenerate versions.json
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          aws s3api list-objects-v2 --bucket "${{ env.STATIC_BUCKET }}" \
            --delimiter '/' \
            --query 'CommonPrefixes[].Prefix' \
            --output json \
            | jq '(. // []) | map(rtrimstr("/")) | map(select(. != "assets"))' > versions.json
          aws s3 cp versions.json "s3://${{ env.STATIC_BUCKET }}/versions.json" \
            --cache-control "no-store, no-cache, must-revalidate" \
            --content-type "application/json"

      - name: Invalidate CloudFront
        if: env.STATIC_DISTRIBUTION_ID != ''
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "${{ env.STATIC_DISTRIBUTION_ID }}" \
            --paths "${{ steps.target.outputs.invalidation_path }}" "/versions.json" \
            --query 'Invalidation.Id' \
            --output text)
          aws cloudfront wait invalidation-completed \
            --distribution-id "${{ env.STATIC_DISTRIBUTION_ID }}" \
            --id "$INVALIDATION_ID"

      - name: Summarize
        run: |
          {
            echo "## deploy-game"
            echo ""
            if [ -n "${{ env.STATIC_DISTRIBUTION_ID }}" ]; then
              echo "- Live at: ${{ steps.target.outputs.url }}"
            else
              echo "- GAME_DISTRIBUTION_ID not set → skipped S3 deploy."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
