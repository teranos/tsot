<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>rave</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #111; overflow: hidden; overscroll-behavior: none; }
      canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
      #bevy-error {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        max-height: 60vh;
        overflow: auto;
        background: #2a0a0a;
        color: #ffb0b0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        line-height: 1.4;
        padding: 8px 12px;
        white-space: pre-wrap;
        z-index: 9999;
        display: none;
        border-bottom: 1px solid #5a1010;
      }
      #rave-loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: #aaa;
        text-align: center;
        z-index: 9998;
        user-select: none;
      }
      #rave-loading progress {
        display: block;
        width: 240px;
        height: 6px;
        margin: 8px auto 0;
        appearance: none;
        background: #222;
        border: none;
      }
      #rave-loading progress::-webkit-progress-bar { background: #222; }
      #rave-loading progress::-webkit-progress-value { background: #6f9; }
      #rave-loading progress::-moz-progress-bar { background: #6f9; }
      body.loaded #rave-loading { display: none; }

/* Chat overlay — bottom-left, always-on, translucent. Container
         is pointer-events: none so canvas drag/touch outside the panel
         is unaffected; the log + input opt back in. */
      #rave-chat {
        position: fixed;
        left: 12px;
        bottom: 12px;
        width: min(380px, calc(100vw - 24px));
        max-height: 38vh;
        display: flex;
        flex-direction: column;
        pointer-events: none;
        z-index: 9997;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: #eaeaea;
      }
      #rave-chat-log {
        flex: 1 1 auto;
        overflow-y: auto;
        background: rgba(10, 12, 20, 0.45);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 6px 6px 0 0;
        padding: 6px 8px;
        line-height: 1.35;
        pointer-events: auto;
      }
      #rave-chat-log .row { word-break: break-word; }
      #rave-chat-log .peer { color: #9bd5ff; margin-right: 6px; }
      #rave-chat-log .self .peer { color: #9bff9b; }
      #rave-chat-input {
        flex: 0 0 auto;
        background: rgba(0, 0, 0, 0.55);
        border: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 0 0 6px 6px;
        color: #eaeaea;
        font: inherit;
        padding: 6px 8px;
        outline: none;
        pointer-events: auto;
      }
      #rave-chat-input::placeholder { color: #6a7080; }
      #rave-chat-input:focus { background: rgba(0, 0, 0, 0.75); }
    </style>
  </head>
  <body>
    <canvas id="bevy"></canvas>
    <div id="bevy-error"></div>
    <div id="rave-loading">
      <div id="rave-loading-text">loading rave · 0%</div>
      <progress value="0" max="1"></progress>
    </div>
    <div id="rave-chat">
      <div id="rave-chat-log"></div>
      <input
        id="rave-chat-input"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="press Enter to chat"
        maxlength="512"
      />
    </div>
    <script>
      // Two build variants ship flat in the same dist/: one for WebGPU,
      // one for WebGL2. Bevy 0.19 gates its shader-fallback defines at
      // compile time on the wgpu feature set (bevy_render
      // pipeline_cache.rs:237 → `not(feature = "webgpu")` unlocks
      // NO_CUBE_ARRAY_TEXTURES_SUPPORT + friends), so we can't cover
      // both backends in one wasm. The bootstrap picks at load-time
      // based on `navigator.gpu`. URL stays at root — no /webgpu/,
      // no /webgl2/, no /index.html leak.
      var main = ('gpu' in navigator)
        ? 'MAIN_WEBGPU_URL_PLACEHOLDER'
        : 'MAIN_WEBGL2_URL_PLACEHOLDER';
      var s = document.createElement('script');
      s.type = 'module';
      s.crossOrigin = 'anonymous';
      s.src = main;
      document.head.appendChild(s);
    </script>
  </body>
</html>
