<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>rave</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #111; overflow: hidden; overscroll-behavior: none; }
      canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
      #bevy-error {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        max-height: 60vh;
        overflow: auto;
        /* Semi-transparent so the Bevy scene stays visible behind
           the drawer — errors are sacred but they shouldn't hide the
           game rendering to the point the developer can't see if the
           scene is up. rgba over hex to get the alpha. */
        background: rgba(42, 10, 10, 0.75);
        color: #ffb0b0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        line-height: 1.4;
        padding: 8px 12px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        z-index: 9999;
        display: none;
        border-bottom: 1px solid #5a1010;
        /* text-shadow keeps error text readable on top of whatever
           the scene renders underneath. */
        text-shadow: 0 0 3px rgba(0, 0, 0, 0.9);
      }
      #rave-loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: #aaa;
        text-align: center;
        z-index: 9998;
        user-select: none;
      }
      #rave-loading progress {
        display: block;
        width: 240px;
        height: 6px;
        margin: 8px auto 0;
        appearance: none;
        background: #222;
        border: none;
      }
      #rave-loading progress::-webkit-progress-bar { background: #222; }
      #rave-loading progress::-webkit-progress-value { background: #6f9; }
      #rave-loading progress::-moz-progress-bar { background: #6f9; }
      body.loaded #rave-loading { display: none; }
    </style>
  </head>
  <body>
    <canvas id="bevy"></canvas>
    <div id="bevy-error"></div>
    <div id="rave-loading">
      <div id="rave-loading-text">loading rave · 0%</div>
      <progress value="0" max="1"></progress>
    </div>
    <script>
      // Two build variants ship flat in the same dist/: one for WebGPU,
      // one for WebGL2. Bevy 0.19 gates its shader-fallback defines at
      // compile time on the wgpu feature set (bevy_render
      // pipeline_cache.rs:237 → `not(feature = "webgpu")` unlocks
      // NO_CUBE_ARRAY_TEXTURES_SUPPORT + friends), so we can't cover
      // both backends in one wasm. The bootstrap picks at load-time
      // based on `navigator.gpu`. URL stays at root — no /webgpu/,
      // no /webgl2/, no /index.html leak.
      // `?backend=webgpu` or `?backend=webgl2` forces the bundle for
      // that backend regardless of the runtime GPU check. Used by CI
      // mobile-screenshot to exercise both codepaths and by developers
      // debugging a specific backend on hardware where the other one
      // would win the auto-select.
      var params = new URLSearchParams(window.location.search);
      // `?verbose=1` lifts the drawer's max-height cap so every line
      // is visible in a single screenshot. CI uses this so the mobile
      // artifact captures the full drawer state, not just the top of
      // it under the 60vh clip.
      if (params.get('verbose') === '1') {
        var errEl = document.getElementById('bevy-error');
        if (errEl) errEl.style.maxHeight = 'none';
      }
      // Honest bundle picker: presence of `navigator.gpu` is API
      // surface only — some environments (iOS Simulator via Metal
      // emulation) expose the surface but `requestAdapter()` returns
      // null, meaning WebGPU is not actually usable. The previous
      // shim `'gpu' in navigator ? ... : ...` picked the WebGPU bundle
      // in that case and failed at device init. Await `requestAdapter`
      // and let the answer be based on reality, not on presence.
      async function pickMain() {
        var override = params.get('backend');
        if (override === 'webgpu') return 'MAIN_WEBGPU_URL_PLACEHOLDER';
        if (override === 'webgl2') return 'MAIN_WEBGL2_URL_PLACEHOLDER';
        if (!('gpu' in navigator)) return 'MAIN_WEBGL2_URL_PLACEHOLDER';
        try {
          var adapter = await navigator.gpu.requestAdapter();
          return adapter
            ? 'MAIN_WEBGPU_URL_PLACEHOLDER'
            : 'MAIN_WEBGL2_URL_PLACEHOLDER';
        } catch (e) {
          return 'MAIN_WEBGL2_URL_PLACEHOLDER';
        }
      }
      pickMain().then(function(main) {
        var s = document.createElement('script');
        s.type = 'module';
        // NO crossorigin attribute — see git history + ERROR.md for
        // the CORB-sanitisation trap that setting it re-enables.
        s.src = main;
        document.head.appendChild(s);
      });
    </script>
  </body>
</html>
