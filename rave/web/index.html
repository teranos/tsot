<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>rave</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #111; overflow: hidden; overscroll-behavior: none; }
      canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
      #bevy-error {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        max-height: 60vh;
        overflow: auto;
        background: #2a0a0a;
        color: #ffb0b0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        line-height: 1.4;
        padding: 8px 12px;
        white-space: pre-wrap;
        z-index: 9999;
        display: none;
        border-bottom: 1px solid #5a1010;
      }
      #rave-loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: #aaa;
        text-align: center;
        z-index: 9998;
        user-select: none;
      }
      #rave-loading progress {
        display: block;
        width: 240px;
        height: 6px;
        margin: 8px auto 0;
        appearance: none;
        background: #222;
        border: none;
      }
      #rave-loading progress::-webkit-progress-bar { background: #222; }
      #rave-loading progress::-webkit-progress-value { background: #6f9; }
      #rave-loading progress::-moz-progress-bar { background: #6f9; }
      body.loaded #rave-loading { display: none; }
    </style>
  </head>
  <body>
    <canvas id="bevy"></canvas>
    <div id="bevy-error"></div>
    <div id="rave-loading">
      <div id="rave-loading-text">loading rave · 0%</div>
      <progress value="0" max="1"></progress>
    </div>
    <script>
      // Two build variants ship flat in the same dist/: one for WebGPU,
      // one for WebGL2. Bevy 0.19 gates its shader-fallback defines at
      // compile time on the wgpu feature set (bevy_render
      // pipeline_cache.rs:237 → `not(feature = "webgpu")` unlocks
      // NO_CUBE_ARRAY_TEXTURES_SUPPORT + friends), so we can't cover
      // both backends in one wasm. The bootstrap picks at load-time
      // based on `navigator.gpu`. URL stays at root — no /webgpu/,
      // no /webgl2/, no /index.html leak.
      // `?backend=webgpu` or `?backend=webgl2` forces the bundle for
      // that backend regardless of `navigator.gpu`. Used by the CI
      // mobile-screenshot job to exercise both paths and by developers
      // debugging a specific backend on hardware where the other one
      // would win the auto-select.
      var params = new URLSearchParams(window.location.search);
      var backendOverride = params.get('backend');
      var main;
      if (backendOverride === 'webgpu') {
        main = 'MAIN_WEBGPU_URL_PLACEHOLDER';
      } else if (backendOverride === 'webgl2') {
        main = 'MAIN_WEBGL2_URL_PLACEHOLDER';
      } else {
        main = ('gpu' in navigator)
          ? 'MAIN_WEBGPU_URL_PLACEHOLDER'
          : 'MAIN_WEBGL2_URL_PLACEHOLDER';
      }
      var s = document.createElement('script');
      s.type = 'module';
      // NO crossorigin attribute. Verified empirically via `curl -I`
      // on the deployed main-webgpu.*.js: response has no
      // `access-control-allow-origin` header (S3 + CloudFront serve
      // without ACAO here). Setting `s.crossOrigin = 'anonymous'`
      // would flip the browser into CORS mode for the fetch; missing
      // ACAO in the response is then treated as opaque, and
      // `window.onerror` receives the CORB-sanitized "Script error."
      // with `event.error` null instead of the real error + stack.
      // Without the attribute the load is plain same-origin — full
      // error details land in `window.onerror`. See ERROR.md; errors
      // are first-class primitives, sanitization violates the axiom.
      s.src = main;
      document.head.appendChild(s);
    </script>
  </body>
</html>
