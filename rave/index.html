<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>rave</title>
    <style>
      /* overflow:hidden + overscroll-behavior:none stop the page itself
         from scrolling or pull-to-refreshing on a vertical touch-drag. */
      html, body { margin: 0; padding: 0; height: 100%; background: #111; overflow: hidden; overscroll-behavior: none; }
      /* touch-action:none hands every touch on the canvas to the game
         instead of the browser's scroll/zoom gestures — without it a
         vertical drag scrolls the viewport (and gets cancelled before it
         can drive movement) instead of steering the player. */
      canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
      /* Loading indicator — shown until the wasm bytes finish streaming
         and wasm-bindgen's init() resolves. Replaces the black screen
         that previously made users think the page was broken. */
      #rave-loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: #aaa;
        text-align: center;
        z-index: 9998;
        user-select: none;
      }
      #rave-loading progress {
        display: block;
        width: 240px;
        height: 6px;
        margin: 8px auto 0;
        appearance: none;
        background: #222;
        border: none;
      }
      #rave-loading progress::-webkit-progress-bar { background: #222; }
      #rave-loading progress::-webkit-progress-value { background: #6f9; }
      #rave-loading progress::-moz-progress-bar { background: #6f9; }
      body.loaded #rave-loading { display: none; }
      /* Out-of-Bevy error surface — visible even when wasm fails to
         instantiate or Bevy panics before its first Update tick.
         The in-canvas drawer only works if Bevy's render loop is
         alive; this is the catch-all that doesn't depend on it. */
      #bevy-error {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        max-height: 60vh;
        overflow: auto;
        background: #2a0a0a;
        color: #ffb0b0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        line-height: 1.4;
        padding: 8px 12px;
        white-space: pre-wrap;
        z-index: 9999;
        display: none;
        border-bottom: 1px solid #5a1010;
      }
    </style>
  </head>
  <body>
    <canvas id="bevy"></canvas>
    <div id="bevy-error"></div>
    <div id="rave-loading">
      <div id="rave-loading-text">loading rave · 0%</div>
      <progress value="0" max="1"></progress>
    </div>
    <script type="module">
      const el = document.getElementById('bevy-error');
      function showErr(line) {
        el.style.display = 'block';
        el.textContent += line + '\n';
      }
      // Exposed for wasm to call directly through wasm-bindgen extern.
      window.__raveError = showErr;

      // Typed Error surface (sacred-error pipeline). Wasm calls this
      // with a JSON-serialized sacred_error::Error. The rendered line
      // carries severity, surface, region, title, why — the
      // contextual fields ERROR.md's axiom requires.
      window.__raveErrorTyped = function(json) {
        try {
          const e = JSON.parse(json);
          const region = (e.context && e.context.region) ? '/' + e.context.region : '';
          const surface = (e.context && e.context.surface) ? e.context.surface : '?';
          showErr(`[${e.severity}@${surface}${region}] ${e.title || ''} — ${e.why || ''}`);
        } catch (parseErr) {
          showErr(`[__raveErrorTyped parse failed] ${parseErr}: ${json}`);
        }
      };

      // Screenshot — wasm fires this on 'P' press. Grabs the canvas as a
      // PNG and writes it to the system clipboard via navigator.clipboard.
      // Sacred-error path on every failure so the user sees what went wrong.
      window.__raveScreenshot = function(_filename) {
        const canvas = document.getElementById('bevy');
        if (!canvas) { showErr('[screenshot] #bevy canvas not found'); return; }
        if (!navigator.clipboard || !window.ClipboardItem) {
          showErr('[screenshot] clipboard API unavailable in this browser');
          return;
        }
        canvas.toBlob(function(blob) {
          if (!blob) { showErr('[screenshot] canvas.toBlob returned null'); return; }
          navigator.clipboard.write([
            new ClipboardItem({ 'image/png': blob })
          ]).catch(function(err) {
            showErr(`[screenshot] clipboard.write failed: ${err}`);
          });
        }, 'image/png');
      };

      // Identity persistence — IndexedDB-backed. Database 'rave', store
      // 'identity', key 'self'. The Rust side calls these via
      // wasm-bindgen externs declared in identity.rs. Errors route
      // through showErr() so a failure is visible, not silent.
      function openRaveDb() {
        return new Promise(function(resolve, reject) {
          const req = indexedDB.open('rave', 1);
          req.onupgradeneeded = function(ev) {
            const db = ev.target.result;
            if (!db.objectStoreNames.contains('identity')) {
              db.createObjectStore('identity');
            }
          };
          req.onsuccess = function() { resolve(req.result); };
          req.onerror = function() { reject(req.error); };
        });
      }

      window.__raveLoadIdentity = async function() {
        try {
          const db = await openRaveDb();
          return await new Promise(function(resolve, reject) {
            const tx = db.transaction('identity', 'readonly');
            const store = tx.objectStore('identity');
            const req = store.get('self');
            req.onsuccess = function() { resolve(req.result || null); };
            req.onerror = function() { reject(req.error); };
          });
        } catch (e) {
          showErr(`[__raveLoadIdentity] ${e}`);
          return null;
        }
      };

      window.__raveSaveIdentity = async function(bytes) {
        try {
          const db = await openRaveDb();
          await new Promise(function(resolve, reject) {
            const tx = db.transaction('identity', 'readwrite');
            const store = tx.objectStore('identity');
            const req = store.put(bytes, 'self');
            req.onsuccess = function() { resolve(); };
            req.onerror = function() { reject(req.error); };
          });
        } catch (e) {
          showErr(`[__raveSaveIdentity] ${e}`);
        }
      };

      window.addEventListener('error', (ev) => {
        const where = ev.filename ? ` @ ${ev.filename}:${ev.lineno}:${ev.colno}` : '';
        showErr(`[window.error] ${ev.message}${where}`);
        if (ev.error?.stack) showErr(ev.error.stack);
      });
      window.addEventListener('unhandledrejection', (ev) => {
        showErr(`[unhandledrejection] ${ev.reason}`);
        if (ev.reason?.stack) showErr(ev.reason.stack);
      });

      // Stream-fetch the hashed wasm so we can show real load
      // progress instead of a black screen. WASM_URL_PLACEHOLDER is
      // substituted by the Makefile after content-hashing so the URL
      // matches the deployed asset.
      const wasmUrl = 'WASM_URL_PLACEHOLDER';
      const loadingText = document.getElementById('rave-loading-text');
      const loadingBar = document.querySelector('#rave-loading progress');

      function fmtMB(bytes) {
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      }
      function updateProgress(loaded, total) {
        if (total > 0) {
          const pct = Math.floor((loaded / total) * 100);
          loadingBar.value = loaded;
          loadingBar.max = total;
          loadingText.textContent = `loading rave · ${pct}% · ${fmtMB(loaded)}/${fmtMB(total)}`;
        } else {
          loadingText.textContent = `loading rave · ${fmtMB(loaded)}`;
        }
      }

      async function streamWasmBytes(url) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`fetch ${url} → HTTP ${response.status}`);
        }
        const total = parseInt(response.headers.get('content-length') || '0', 10);
        const reader = response.body.getReader();
        const chunks = [];
        let loaded = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
          loaded += value.length;
          updateProgress(loaded, total);
        }
        const bytes = new Uint8Array(loaded);
        let offset = 0;
        for (const chunk of chunks) {
          bytes.set(chunk, offset);
          offset += chunk.length;
        }
        return bytes;
      }

      import init from './rave.js';
      try {
        const wasmBytes = await streamWasmBytes(wasmUrl);
        await init({ module_or_path: wasmBytes });
        // wasm-bindgen has instantiated and the Bevy app has started its
        // render loop. Hide the indicator; Bevy paints to #bevy from
        // here on.
        document.body.classList.add('loaded');
      } catch (e) {
        showErr(`[init failed] ${e}`);
        if (e?.stack) showErr(e.stack);
      }
    </script>
  </body>
</html>
