[package]
name = "rave"
version = "0.1.0"
edition = "2024"
publish = false
exclude = ["dist"]

[lib]
crate-type = ["cdylib", "rlib"]

[profile.dev.package."*"]
opt-level = 3

[profile.dev]
opt-level = 1

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true

[features]
dev = [
    "bevy/dynamic_linking",
]

[dependencies]
bevy = { version = "=0.19.0", default-features = false, features = [
    "default_app",
    "2d_api",
    "2d_bevy_render",
    "3d_api",
    "3d_bevy_render",
    "tonemapping_luts",
    "ui_api",
    "ui_bevy_render",
    "scene",
    "bevy_winit",
    "default_font",
    "webgpu",
    "webgl2",
    "debug",
    # R23 forest rave — spatial music at the speakers, listener on the
    # camera. `bevy_audio` is the audio plugin; `vorbis` decodes the
    # bundled .ogg track. Drop them if rave ever moves to a streaming-
    # only audio path (libp2p music sharing).
    "bevy_audio",
    "vorbis",
] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.143"
sacred-error = { path = "../crates/sacred-error" }
bevy-libp2p = { git = "https://github.com/teranos/laye.git", rev = "06224ee1063afa456beef21deac2eb7ff5f627eb" }
bevy-observability = { git = "https://github.com/teranos/laye.git", rev = "06224ee1063afa456beef21deac2eb7ff5f627eb" }
bevy-drawer = { git = "https://github.com/teranos/laye.git", rev = "06224ee1063afa456beef21deac2eb7ff5f627eb" }
bevy-chat = { git = "https://github.com/teranos/laye.git", rev = "06224ee1063afa456beef21deac2eb7ff5f627eb" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "=0.3.4", features = ["wasm_js"] }
js-sys = "=0.3.98"
wasm-bindgen = "=0.2.121"
wasm-bindgen-futures = "=0.4.71"

# The native integration test for rave-positions/v1 lives at
# `crates/rave-positions-test/` so the Linux CI runner never builds
# the rave wasm-only Bevy lib. See that crate's Cargo.toml for the
# native libp2p / tokio pins.
