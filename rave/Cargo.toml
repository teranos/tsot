[package]
name = "rave"
version = "0.1.0"
edition = "2024"
publish = false
exclude = ["dist"]

[lib]
crate-type = ["cdylib", "rlib"]

[profile.dev.package."*"]
opt-level = 3

[profile.dev]
opt-level = 1

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true

[features]
dev = [
    "bevy/dynamic_linking",
]

[dependencies]
bevy = { version = "=0.19.0", default-features = false, features = [
    "default_app",
    "2d_api",
    "2d_bevy_render",
    "3d_api",
    "3d_bevy_render",
    "tonemapping_luts",
    "ui_api",
    "ui_bevy_render",
    "scene",
    "bevy_winit",
    "default_font",
    "webgpu",
    "debug",
] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.143"
sacred-error = { path = "../crates/sacred-error" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "=0.3.4", features = ["wasm_js"] }
js-sys = "=0.3.98"
wasm-bindgen = "=0.2.121"
wasm-bindgen-futures = "=0.4.71"
# libp2p substrate. Mirrors roam/Cargo.toml's pinned versions and the
# browser-only feature set (no tokio runtime, no tcp sockets, no
# default noise+yamux — explicit picks only). See rave/CLAUDE.md
# "libp2p slice" for the wire shape this enables.
libp2p = { version = "=0.56.0", default-features = false, features = [
    "websocket-websys",
    "noise",
    "yamux",
    "gossipsub",
    "ping",
    "identify",
    "macros",
    "wasm-bindgen",
] }
# Architectural cap — "only the relay" topology. Without this, libp2p
# auto-dials identify-discovered peers that browsers can't reach,
# producing a high-rate provider_error stream that drowns every other
# signal in the drawer. See roam/src/net/rust_libp2p.rs for the same
# decision recorded in production.
libp2p-connection-limits = "=0.6.0"
futures = "=0.3.32"
futures-timer = "=3.0.4"

# Native dev-dependencies for the integration test that spawns the
# relayer binary and two native libp2p clients. Mirrors roam's pin set
# in roam/Cargo.toml (same =0.56.0, native features include tcp +
# websocket + tokio so the test client talks the same wire the deployed
# relayer + browser bundle speak).
[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
libp2p = { version = "=0.56.0", default-features = false, features = [
    "tokio",
    "websocket",
    "tcp",
    "dns",
    "noise",
    "yamux",
    "gossipsub",
    "ping",
    "identify",
    "macros",
] }
tokio = { version = "=1.47.1", features = ["full"] }
futures = "=0.3.32"
