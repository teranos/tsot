  if (entry.symbols && entry.symbols.length) metaParts.push(entry.symbols.map(symbolTag).join(''));
  if (entry.subtypes && entry.subtypes.length) {
    metaParts.push(`<span style="color:#888;">${entry.subtypes.join('·')}</span>`);
  }
  if (metaParts.length) {
    const m = document.createElement('div');
    m.className = 'meta-line';
    m.innerHTML = metaParts.join(' ');
    div.appendChild(m);
  }
  if (entry.abilities && entry.abilities.length) {
    const a = document.createElement('div');
    a.className = 'abilities';
    a.innerHTML = entry.abilities.map(s => `<div>${s}</div>`).join('');
    div.appendChild(a);
  }
  div.title = entry.id;
  div.onclick = () => {
    state.deck.push(entry.id);
    renderDeckbuilder();
  };
  return div;
}

function poolMatchesFilters(entry) {
  if (state.poolFilterColor && !(entry.colors || []).includes(state.poolFilterColor)) {
    return false;
  }
  if (state.poolFilterKind && entry.kind !== state.poolFilterKind) {
    return false;
  }
  return true;
}

function renderDeckbuilder() {
  document.getElementById('prompt').textContent =
    'Pre-game — build your deck. Click cards on the left to add; click [-] to remove. Mirror match: your opponent uses the same deck.';
  document.getElementById('meta').textContent = '';
  document.getElementById('game-screen').style.display = 'none';
  const root = document.getElementById('deckbuilder');
  root.style.display = 'grid';
  root.innerHTML = '';

  // Pool side.
  const poolSide = document.createElement('div');
  poolSide.className = 'pool';
  poolSide.innerHTML = `<h2>Card pool (${state.cardPool.length})</h2>`;

  const filters = document.createElement('div');
  filters.className = 'filters';
  // Color filter — only show colors that actually appear in the pool.
  const allColors = new Set();
  for (const c of state.cardPool) for (const col of (c.colors || [])) allColors.add(col);
  const colorSel = document.createElement('select');
  colorSel.innerHTML = `<option value="">all colors</option>` +
    [...allColors].sort().map(c => `<option value="${c}">${c}</option>`).join('');
  colorSel.value = state.poolFilterColor;
  colorSel.onchange = () => { state.poolFilterColor = colorSel.value; renderDeckbuilder(); };
  filters.appendChild(colorSel);
  // Kind filter.
  const kindSel = document.createElement('select');
  kindSel.innerHTML = `
    <option value="">all kinds</option>
    <option value="Creature">Creatures</option>
    <option value="Spell">Spells</option>
    <option value="Artifact">Artifacts</option>
    <option value="Environment">Environments</option>
    <option value="Mutation">Mutations</option>
  `;
  kindSel.value = state.poolFilterKind;
  kindSel.onchange = () => { state.poolFilterKind = kindSel.value; renderDeckbuilder(); };
  filters.appendChild(kindSel);
  poolSide.appendChild(filters);

  const grid = document.createElement('div');
  grid.className = 'pool-grid';
  for (const entry of state.cardPool) {
    if (!poolMatchesFilters(entry)) continue;
    grid.appendChild(poolCardEl(entry));
  }
  poolSide.appendChild(grid);
  root.appendChild(poolSide);

  // Deck side.
  const deckSide = document.createElement('div');
  deckSide.className = 'deck';
  deckSide.innerHTML = `<h2>Your deck</h2>`;
  const summary = document.createElement('div');
  summary.className = 'deck-summary';
  summary.textContent = `${state.deck.length} cards`;
  deckSide.appendChild(summary);

  // Preset dropdown + clear.
  const controls = document.createElement('div');
  controls.className = 'deck-controls';
  const presetLabel = document.createElement('label');
  presetLabel.textContent = 'Load preset:';
  const presetSel = document.createElement('select');
  presetSel.innerHTML = `<option value="">(choose…)</option>` +
    state.presets.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  presetSel.onchange = () => {
    const choice = state.presets.find(p => p.id === presetSel.value);
    if (choice) {
      state.deck = choice.cards.slice();
      renderDeckbuilder();
    }
  };
  presetLabel.appendChild(presetSel);
  controls.appendChild(presetLabel);

  const clearBtn = document.createElement('button');
  clearBtn.className = 'danger';
  clearBtn.textContent = 'Clear deck';
  clearBtn.onclick = () => { state.deck = []; renderDeckbuilder(); };
  controls.appendChild(clearBtn);

  // Opponent AI.
  const oppLabel = document.createElement('label');
  oppLabel.textContent = 'Opponent AI:';
  const oppSel = document.createElement('select');
  oppSel.innerHTML = `
    <option value="heuristic">Heuristic (fast)</option>
    <option value="uct">UCT (search)</option>
    <option value="mcts">MCTS (search)</option>
  `;
  oppSel.value = state.oppAi;
  oppSel.onchange = () => { state.oppAi = oppSel.value; };
  oppLabel.appendChild(oppSel);
  controls.appendChild(oppLabel);

  deckSide.appendChild(controls);

  // Deck rows, grouped by id and sorted by count desc then name asc.
  const counts = deckCounts();
  const idToEntry = new Map(state.cardPool.map(e => [e.id, e]));
  const rows = [...counts.entries()].sort((a, b) => {
    if (b[1] !== a[1]) return b[1] - a[1];
    const an = (idToEntry.get(a[0])?.name) || a[0];
    const bn = (idToEntry.get(b[0])?.name) || b[0];
    return an.localeCompare(bn);
  });
  const list = document.createElement('div');
  for (const [id, qty] of rows) {
    const row = document.createElement('div');
    row.className = 'deck-row';
    const entry = idToEntry.get(id);
    const name = entry ? entry.name : id;
    row.innerHTML = `<span class="qty">${qty}×</span><span class="name">${name}</span>`;
    const rm = document.createElement('button');
    rm.textContent = '-';
    rm.onclick = () => {
      const idx = state.deck.indexOf(id);
      if (idx >= 0) state.deck.splice(idx, 1);
      renderDeckbuilder();
    };
    row.appendChild(rm);
    list.appendChild(row);
  }
  deckSide.appendChild(list);

  // Start button.
  const startBtn = document.createElement('button');
  startBtn.className = 'start';
  startBtn.textContent = 'Start game';
  startBtn.disabled = state.deck.length === 0;
  startBtn.onclick = startGameFromDeckbuilder;
  deckSide.appendChild(startBtn);

  // Spectate (both-AI) block. Pickers for A + B + a Spectate button.
  // Runs the whole game in wasm and returns the snapshot timeline
  // for the scrubber UI (H6). Mirror always: both sides use the
  // deck you've built.
  const specWrap = document.createElement('div');
  specWrap.style.cssText = 'margin-top:1.2rem; padding-top:0.6rem; border-top:1px solid #333; display:flex; flex-direction:column; gap:0.4rem;';
  specWrap.innerHTML = `<div style="color:#888; font-size:0.7rem;">Spectate (both AI, watch with scrubber)</div>`;
  const mkAiPicker = (key, label) => {
    const wrap = document.createElement('label');
    wrap.style.cssText = 'color:#888; font-size:0.7rem; display:flex; align-items:center; gap:0.4rem;';
    wrap.textContent = label;
    const sel = document.createElement('select');
    sel.innerHTML = `
      <option value="heuristic">Heuristic</option>
      <option value="uct">UCT</option>
      <option value="mcts">MCTS</option>
    `;
    sel.style.cssText = 'background:#1c1c20; color:#ddd; border:1px solid #444; padding:0.2rem 0.4rem; font-family:inherit; font-size:0.7rem; flex:1;';
    sel.value = state[key];
    sel.onchange = () => { state[key] = sel.value; };
    wrap.appendChild(sel);
    return wrap;
  };
  specWrap.appendChild(mkAiPicker('specAiA', 'A:'));
  specWrap.appendChild(mkAiPicker('specAiB', 'B:'));
  const specBtn = document.createElement('button');
  specBtn.className = 'start';
  specBtn.style.cssText = 'border-color:#cf6;';
  specBtn.textContent = 'Spectate (both AI)';
  specBtn.disabled = state.deck.length === 0;
  specBtn.onclick = startSpectate;
  specWrap.appendChild(specBtn);
  deckSide.appendChild(specWrap);

  root.appendChild(deckSide);
}

// Generate a fresh game id for the decision log. Falls back to a
// timestamp-based id if crypto.randomUUID isn't available.
function freshGameId() {
  if (window.crypto && typeof window.crypto.randomUUID === 'function') {
    return window.crypto.randomUUID();
  }
  return 'g-' + Date.now() + '-' + Math.floor(Math.random() * 1e9).toString(36);
}

// ============== Spectate (H6) ==============

async function startSpectate() {
  if (state.deck.length === 0) return;
  state.phase = 'spectating';
  state.gameId = null;       // spectated games aren't in the human decision log
  state.gameOverRecorded = false;
  state.preview = null;      // no preview in spectate mode
  document.getElementById('deckbuilder').style.display = 'none';
  document.getElementById('game-screen').style.display = '';
  document.getElementById('spectator-bar').style.display = '';
  document.getElementById('prompt').textContent = 'Running game… (both AIs play to completion)';
  const args = {
    seed: Math.floor(Math.random() * 0xFFFFFFFF),
    deck_a_ids: state.deck.slice(),
    deck_b_ids: state.deck.slice(),
    ai_a: state.specAiA,
    ai_b: state.specAiB,
  };
  try {
    const raw = await workerCall('run_auto_game', { autoArgs: args });
    const env = JSON.parse(raw);
    if (!env || env.ok === false) {
      throw new Error('run_auto_game returned an error envelope');
    }
    // Surface log + trace just like a normal envelope so the LOG
    // panel shows what UCT was doing during the run.
    if (env.log) appendLog(env.log);
    if (env.trace) appendTrace(env.trace);
    state.spectate = {
      snapshots: env.snapshots || [],
      winner: env.winner,
      total_turns: env.total_turns,
      index: 0,
      playing: false,
      intervalId: null,
      msPerStep: parseInt(document.getElementById('spec-speed').value, 10) || 500,
    };
    // Initialize the slider range to match snapshot count.
    const slider = document.getElementById('spec-slider');
    slider.min = '0';
    slider.max = String(Math.max(0, state.spectate.snapshots.length - 1));
    slider.value = '0';
    spectateRenderCurrent();
  } catch (e) {
    document.getElementById('prompt').textContent =
      'Spectate failed: ' + (e?.message || e);
  }
}

function spectateRenderCurrent() {
  const sp = state.spectate;
  if (!sp || !sp.snapshots[sp.index]) return;
  const snap = sp.snapshots[sp.index];
  const view = snap.state;
  // Wrap in the same shape render() expects, with a synthesized
  // Spectate prompt that _renderInner handles distinctly.
  state.current = {
    state: view,
    prompt: {
      kind: 'Spectate',
      state: view,
      turn: snap.turn,
      phase: snap.phase,
      active_player: snap.active_player,
      at_end: sp.index === sp.snapshots.length - 1,
      winner: sp.winner,
    },
  };
  render(state.current);
  // Sync slider + readout.
  const slider = document.getElementById('spec-slider');
  if (slider && parseInt(slider.value, 10) !== sp.index) slider.value = String(sp.index);
  const readout = document.getElementById('spec-readout');
  if (readout) {
    const w = sp.winner ? sp.winner.toUpperCase() : null;
    const endTag = (sp.index === sp.snapshots.length - 1 && w)
      ? `  · GAME OVER · ${w} wins`
      : '';
    readout.textContent = `snapshot ${sp.index + 1}/${sp.snapshots.length}  · turn ${snap.turn} · ${snap.phase} · ${String(snap.active_player).toUpperCase()} acts${endTag}`;
  }
  // Play/pause label.
  const playBtn = document.getElementById('spec-play');
  if (playBtn) playBtn.textContent = sp.playing ? '⏸' : '⏵';
}

function spectateSeek(i) {
  const sp = state.spectate;
  if (!sp) return;
  sp.index = Math.max(0, Math.min(sp.snapshots.length - 1, i));
  spectateRenderCurrent();
}

function spectateStep(delta) {
  const sp = state.spectate;
  if (!sp) return;
  spectateSeek(sp.index + delta);
}

function spectatePlay() {
  const sp = state.spectate;
  if (!sp || sp.playing) return;
  sp.playing = true;
  sp.intervalId = setInterval(() => {
    if (!state.spectate) return spectatePause();
    if (state.spectate.index >= state.spectate.snapshots.length - 1) {
      return spectatePause();
    }
    spectateStep(1);
  }, sp.msPerStep);
  spectateRenderCurrent();
}

function spectatePause() {
  const sp = state.spectate;
  if (!sp) return;
  if (sp.intervalId !== null) clearInterval(sp.intervalId);
  sp.intervalId = null;
  sp.playing = false;
  spectateRenderCurrent();
}

function spectateExit() {
  if (state.spectate) spectatePause();
  state.spectate = null;
  state.phase = 'deckbuilding';
  document.getElementById('spectator-bar').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  renderDeckbuilder();
}

function wireSpectatorBar() {
  const $ = (id) => document.getElementById(id);
  $('spec-back-end').onclick = () => spectateSeek(0);
  $('spec-step-back').onclick = () => spectateStep(-1);
  $('spec-step-fwd').onclick = () => spectateStep(1);
  $('spec-fwd-end').onclick = () => {
    if (state.spectate) spectateSeek(state.spectate.snapshots.length - 1);
  };
  $('spec-play').onclick = () => {
    const sp = state.spectate;
    if (!sp) return;
    if (sp.playing) spectatePause(); else spectatePlay();
  };
  $('spec-slider').oninput = (ev) => {
    const i = parseInt(ev.target.value, 10);
    if (!Number.isNaN(i)) spectateSeek(i);
  };
  $('spec-speed').onchange = (ev) => {
    const sp = state.spectate;
    if (!sp) return;
    sp.msPerStep = parseInt(ev.target.value, 10) || 500;
    // If currently playing, restart the interval with the new pace.
    if (sp.playing) { spectatePause(); spectatePlay(); }
  };
  $('spec-exit').onclick = spectateExit;
}

// ============================================

async function startGameFromDeckbuilder() {
  if (state.deck.length === 0) return;
  state.phase = 'playing';
  state.gameId = freshGameId();
  state.gameOverRecorded = false;
  document.getElementById('deckbuilder').style.display = 'none';
  document.getElementById('game-screen').style.display = '';
  document.getElementById('prompt').textContent = 'Starting game…';
  updateSaveButtonsEnabled();
  try {
    const initial = await fetchState();
    state.current = { state: initial.state, prompt: initial };
    render(state.current);
  } catch (e) {
    document.getElementById('prompt').textContent =
      'Engine error: ' + (e && e.message ? e.message : e);
  }
}

(async () => {
  wireSaveControls();
  wireSpectatorBar();
  updateSaveButtonsEnabled();
  // Bootstrap: spawn the worker, await its `{kind:'ready'}`. The wasm
  // lives in worker scope from here on; the main thread only sees
  // postMessage envelopes. tsot_wasm.js is loaded by the worker via
  // importScripts (see assets/tsot-worker.js), not by a <script> tag
  // here — that keeps the heavy compile off the main thread.
  try {
    bootWorker();
    await wasmReady;
  } catch (e) {
    document.getElementById('prompt').textContent =
      'Failed to load wasm worker: ' + (e && e.message ? e.message : e);
    return;
  }
  try {
    // Deckbuilder pre-game: load the card pool + shipped preset decks
    // sequentially (the worker enforces one inflight FFI at a time via
    // `pendingFfi`), seed the working deck with the Starter preset,
    // and render the builder. start_game doesn't fire until the user
    // clicks Start.
    const poolJson = await workerCall('list_card_pool', {});
    state.cardPool = JSON.parse(poolJson);
    const presetsJson = await workerCall('list_preset_decks', {});
    state.presets = JSON.parse(presetsJson);
    const starter = state.presets.find(p => p.id === 'starter') || state.presets[0];
    state.deck = starter ? starter.cards.slice() : [];
    renderDeckbuilder();
  } catch (e) {
    document.getElementById('prompt').textContent =
      'Failed to load deckbuilder data: ' + (e && e.message ? e.message : e);
  }
})();
</script>
