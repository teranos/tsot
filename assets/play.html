<style>
  body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #111; color: #ddd; margin: 0; padding: 1rem; font-size: 0.8rem; }
  h1 { font-size: 0.9rem; margin: 0 0 0.5rem 0; color: #888; font-weight: normal; }
  .row { display: flex; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .zone { border: 1px solid #333; padding: 0.5rem; min-width: 8rem; flex: 1; }
  .zone h2 { font-size: 0.7rem; margin: 0 0 0.4rem 0; color: #888; font-weight: normal; text-transform: uppercase; letter-spacing: 0.05em; }
  /* The card primitive's CSS lives in Card.elm (Card.styles); it
     owns .card + .head + .cost + .meta-line + .symbol + .color-* +
     .stats + .abilities + state variants. What lives here is just
     the caller-side surface: container layout for the in-game zone
     (.cards) and the opponent-zone contextual tint. The .pool-grid
     + .pool-card decorations live further down with the deckbuilder. */
  .cards { display: flex; flex-wrap: wrap; gap: 0.25rem; align-items: flex-start; }
  .opponent .card { background: #221818; border-color: #533; }
  .opponent .card.clickable { border-color: #f88; }
  .counts { color: #888; font-size: 0.7rem; margin-left: 0.5rem; }
  #prompt { padding: 0.5rem; background: #1a2030; border: 1px solid #335; margin-bottom: 0.75rem; }
  #buttons { margin-top: 0.5rem; }
  button { background: #234; color: #ddd; border: 1px solid #4af; padding: 0.35rem 0.8rem; cursor: pointer; font-family: inherit; font-size: 0.75rem; margin-right: 0.5rem; }
  button:hover { background: #345; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.danger { border-color: #f66; }
  .game-over { color: #ff4; font-weight: bold; }
  .empty-note { color: #666; font-style: italic; font-size: 0.7rem; }
  .meta { color: #888; font-size: 0.75rem; margin-bottom: 0.5rem; }
  .deck-top { color: #6cf; }
  /* .card.uct-recommended + .uct-badge live in Card.elm's styles
     (they decorate the card itself). .uct-thinking is the spectator
     status text outside the card, so it stays here. */
  .uct-thinking { color: #6f9; font-size: 0.7rem; margin-left: 0.5rem; }
  /* Error block: errors-as-first-class. Distinct red treatment so a
     captured failure (Rust panic, FFI Err, worker exception) is
     impossible to miss when scrolling the LOG. Multi-line, no
     truncation — the whole envelope is visible. */
  .log-error { border: 1px solid #f44; background: rgba(255, 68, 68, 0.06); padding: 0.4rem 0.6rem; margin: 0.3rem 0; }
  .log-error-header { color: #f88; font-weight: bold; white-space: pre-wrap; word-break: break-word; }
  .log-error-meta { color: #b66; font-size: 0.7rem; margin-top: 0.1rem; }
  .log-error-trail { color: #888; font-size: 0.7rem; margin-top: 0.3rem; }
  .log-error-trail-line { color: #bbb; font-size: 0.7rem; padding-left: 1rem; }
  /* Deckbuilder layout — two-column grid: pool left, current deck right. */
  #deckbuilder { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; }
  #deckbuilder .pool, #deckbuilder .deck { border: 1px solid #333; padding: 0.5rem; }
  #deckbuilder h2 { font-size: 0.7rem; margin: 0 0 0.4rem 0; color: #888; font-weight: normal; text-transform: uppercase; letter-spacing: 0.05em; }
  #deckbuilder .filters { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
  #deckbuilder .filters select { background: #1c1c20; color: #ddd; border: 1px solid #444; padding: 0.2rem 0.4rem; font-family: inherit; font-size: 0.7rem; }
  #deckbuilder .pool-grid { display: flex; flex-wrap: wrap; gap: 0.3rem; max-height: calc(100vh - 16rem); overflow-y: auto; align-items: flex-start; }
  /* Pool cards: same look as in-game cards, with a + badge in the corner. */
  #deckbuilder .pool-card { position: relative; cursor: pointer; }
  #deckbuilder .pool-card:hover { background: #234; }
  #deckbuilder .pool-card::after { content: '+'; position: absolute; top: 2px; right: 4px; color: #6f9; font-size: 0.9rem; font-weight: bold; }
  #deckbuilder .deck-controls { margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem; }
  #deckbuilder .deck-controls label { color: #888; font-size: 0.7rem; display: flex; align-items: center; gap: 0.4rem; }
  #deckbuilder .deck-controls select { background: #1c1c20; color: #ddd; border: 1px solid #444; padding: 0.2rem 0.4rem; font-family: inherit; font-size: 0.7rem; flex: 1; }
  #deckbuilder .deck-summary { color: #888; font-size: 0.7rem; margin-bottom: 0.4rem; }
  #deckbuilder .start { margin-top: 0.8rem; padding: 0.5rem 1rem; font-size: 0.85rem; border-color: #6f9; }
</style>

<body>
<h1>tsot — play</h1>
<!-- Stage 11e: Elm mount moved up to here. Elm renders save-controls,

<div id="elm-root"></div>

<!-- Stage 11c: #prompt moved into Elm. Main.elm's viewPromptText
     renders the prompt line into its view tree (above the LOG zone).

<!-- Save / load controls. Visible in both phases; Save + Download

     attach the JSON to a message so it can be loaded on another
     machine. -->
<!-- H7-Elm Stage 6: the entire save-controls bar (Save / Load saved… /
     Download / Load file… / Decision report / Export / Clear /
     Trigger test panic + #save-status span + the hidden file input)
     is now rendered by Elm — see Main.elm's viewSaveControls. JS
     still owns the actions themselves (window.tsotSaveGame /
     tsotDownloadGame / tsotTestPanic shims for the ones that touch
     live game state; tsotLoadSaveJson for the file-input path). -->
<!-- H7-Elm Stage 4: the decision-report panel is rendered by Elm
     (see Main.elm's viewDecisionPanel) — it appears at the top of

     Decision report button.
     H7-Elm Stage 5: the saved-list panel is also Elm-rendered (see
     Main.elm's viewSavedListPanel) — it appears above the

<!-- Stage 11b: #meta moved into Elm. Main.elm's viewGameMeta renders

<!-- Stage 10: deckbuilder is rendered by Elm (viewDeckbuilder), shown
     only when gamePhase == Deckbuilding; the existing #deckbuilder
     .pool / .deck-row CSS in <style> above keeps matching since Elm

<!-- Stage 12: spectator bar moved into Elm's SpectatorBar module —
     the bar's DOM (scrubber + play/pause/step/back-end/fwd-end/speed
     dropdown + Exit) is rendered by Elm, gated on
     Model.spectatorBar.active. JS still owns the snapshots array +

<!-- Stage 11f/g/h: the `#game-screen` scaffold + per-player counts +
     deck-top backs moved into Main.elm's `viewGameScreen`. Card
     containers (opp/your board, opp/your graveyard, your-hand) keep

     only when `Model.gamePhase` is Playing or Spectating. -->


<!-- Stage 11e: the LOG zone wrapper + the second elm-root that lived
     here are gone. Elm's mount moved up to right after the <h1>. -->

<!-- Build info generated by `make wasm` / `make wasm-dev`. Reads
     `window.__TSOT_BUILD__ = {profile, builtAt, commit}`. H7-Elm
     Stage 2: the Elm app reads this through the `buildInfoIn` port
     (set up by `js-bridge.js`) and renders the bottom-right footer.
     The previous inline `renderBuildFooter` script + `#build-footer`
     div are gone — the Elm app owns the footer now. -->
<script src="build-info.js" onerror="window.__TSOT_BUILD__=null"></script>
<!-- H7-Elm: Elm bundle + the JS bridge that boots it. bundle.js
     defines `Elm.Main`; js-bridge.js calls `Elm.Main.init` and pumps
     `window.__TSOT_BUILD__` into the `buildInfoIn` port. -->
<script src="bundle.js"></script>
<script src="js-bridge.js"></script>

<script>
const state = { current: null, selectedAttackers: new Set(), selectedBlocks: {}, blockerPickFor: null };

// Web Worker hosts the wasm engine. The worker spawns tsot_wasm.js,
// which is linked against assets/wasm-worker-lib.js — that JS lib
// resolves the `tsot_emit_iteration_event` Rust extern declared in
// src/sim/uct.rs. The extern is called inside the UCT iteration
// loop and postMessages a `{kind:'uct_iter'}` envelope to main
// scope. Those messages arrive WHILE the outer FFI call is still
// blocked in worker scope — that's how live progress lands on the
// UI thread without Asyncify.
let wasmWorker = null;
let wasmReady = null;       // Promise resolved on worker's `{kind:'ready'}`
let pendingFfi = null;      // { resolve, reject } — at most one inflight
// Path 1: shared-memory cancellation handle. After the worker
// reports ready, sharedHeapI32 is an Int32Array over the SAME
// SharedArrayBuffer the wasm uses as its heap, and cancelFlagOffset
// is the wasm-side byte address of `static UCT_CANCEL_FLAG`. Writing
// to `sharedHeapI32[cancelFlagOffset >> 2]` via `Atomics.store`
// flips the flag synchronously — the running UCT search reads the
// same atomic and breaks at the next iteration boundary. No
// postMessage round-trip; main thread can interrupt a wasm ccall
// that's mid-execution.
let sharedHeapI32 = null;
let cancelFlagOffset = null;

function cancelUct() {
  if (sharedHeapI32 !== null && cancelFlagOffset !== null) {
    Atomics.store(sharedHeapI32, cancelFlagOffset >> 2, 1);
  }
}

function clearUctCancel() {
  if (sharedHeapI32 !== null && cancelFlagOffset !== null) {
    Atomics.store(sharedHeapI32, cancelFlagOffset >> 2, 0);
  }
}

function bootWorker() {
  wasmWorker = new Worker('tsot-worker.js');
  wasmReady = new Promise((resolve, reject) => {
    const initHandler = (ev) => {
      const m = ev.data;
      if (m.kind === 'ready') {
        // Capture the shared-heap handle if the worker supplied one
        // (requires SharedArrayBuffer / cross-origin isolation). If
        // not available, we fall back to no-op cancel — preview
        // still runs but blocks like before.
        if (m.sharedHeap && typeof m.cancelFlagOffset === 'number') {
          try {
            sharedHeapI32 = new Int32Array(m.sharedHeap);
            cancelFlagOffset = m.cancelFlagOffset;
          } catch (e) {
            sharedHeapI32 = null;
            cancelFlagOffset = null;
            try { tsotPushError({
              stage: 'shared-heap-init',
              surface: 'bridge',
              severity: 'warn',
              title: 'SharedArrayBuffer init failed — UCT cancel disabled',
              why: String(e && e.message || e),
            }); } catch (_) {}
          }
        }
        wasmWorker.removeEventListener('message', initHandler);
        resolve();
      } else if (m.kind === 'error') {
        wasmWorker.removeEventListener('message', initHandler);
        reject(new Error(m.error));
      }
    };
    wasmWorker.addEventListener('message', initHandler);
  });
  wasmWorker.addEventListener('message', (ev) => {
    const m = ev.data;
    if (m.kind === 'uct_iter') {
      appendLiveUctIter(m.line);
    } else if (m.kind === 'envelope') {
      const p = pendingFfi;
      pendingFfi = null;
      if (p) p.resolve(m.json);
    } else if (m.kind === 'error') {
      // Worker-caught JS exception inside `callWasm`. Wrap as a
      // first-class TraceEvent::Error so it lands in the LOG (audit
      // trail) AND can be rendered inline at the failing click.
      const errEvent = {
        kind: 'Error', at_us: 0, source: 'wasm-trap',
        ffi_call: null, message: m.error || 'worker exception',
        location: null, recent_trace: [],
      };
      appendErrorEvent(errEvent);
      const p = pendingFfi;
      pendingFfi = null;
      if (p) {
        const err = new Error(errEvent.message);
        err.errorEvent = errEvent;
        p.reject(err);
      }
    } else if (m.kind === 'panic') {
      // Rust panic captured by the panic hook BEFORE the wasm trap.
      // The line IS a TraceEvent::Error envelope already. Render it
      // in the LOG and reject any inflight FFI with the rich event
      // attached so the inline renderer can show the same context.
      // The wasm module is dead after this — a reload is needed to
      // continue.
      let errEvent;
      try { errEvent = JSON.parse(m.line); } catch (_) { errEvent = null; }
      if (!errEvent) {
        errEvent = {
          kind: 'Error', at_us: 0, source: 'rust-panic',
          ffi_call: null,
          message: 'unparseable panic envelope: ' + m.line,
          location: null, recent_trace: [],
        };
      }
      appendErrorEvent(errEvent);
      const p = pendingFfi;
      pendingFfi = null;
      if (p) {
        const err = new Error(errEvent.message || 'wasm panic');
        err.errorEvent = errEvent;
        p.reject(err);
      }
    } else if (m.kind === 'ready') {
      // Bootstrap signal — handled by the init promise above. Reach
      // here on the persistent handler too; no-op.
    } else if (m.kind === 'info') {
      // "I am alive" signals from the wasm side — used by
      // `install_panic_hook` to confirm in the LOG that the hook
      // actually ran, and by `tsot_wasm::main` to confirm main()
      // was invoked. Visible event in the LOG with a distinct
      // prefix so we can see the bootstrap chain.
      let info;
      try { info = JSON.parse(m.line); } catch (_) { info = { message: m.line }; }
      // H7-Elm Stage 3: LOG rendering moved into Elm. The original
      // info-event color hint (#6f9) is dropped during this port;
      // the [info] prefix remains for visual scanning.
      window.tsotLogPushText(`[info] ${info.message || m.line}`);
    } else {
      // Unknown message kind — surface it so it isn't silently
      // swallowed. Errors are sacred.
      appendErrorEvent({
        kind: 'Error', at_us: 0, source: 'worker',
        ffi_call: null,
        message: 'unknown worker message kind: ' + (m && m.kind),
        location: null, recent_trace: [],
      });
    }
  });
}

// Round-trip a command to the worker. The protocol is `{cmd, ...payload}`
// outbound, `{kind:'envelope', json}` inbound.
//
// Queued: multiple workerCall invocations are serviced in arrival
// order, one at a time. The wasm worker is single-threaded — only one
// ccall can run at a time — so concurrency on the JS side becomes a
// queue, not parallelism. The motivation is the UCT preview slice:
// preview fires on every prompt; if the user clicks a card while
// preview is mid-search, the click queues and fires after, instead
// of bouncing.
//
// Errors-as-first-class: when the wasm side returns an envelope with
// `ok: false`, the queued job pushes the trace (which carries a
// TraceEvent::Error) to the LOG via appendTrace, then rejects with
// an Error whose `.errorEvent` carries the rich Rust-side event so
// the inline renderer at the click site can use it.
const ffiQueue = [];

function workerCall(cmd, payload) {
  // Path 1 cancel: when a non-preview FFI call arrives (game action,
  // save, load, etc.), flip the wasm-side UCT_CANCEL_FLAG atomic so
  // any preview that's currently mid-ccall on the worker breaks out
  // at its next iteration boundary instead of making the user wait.
  // No-op on browsers without cross-origin isolation (sharedHeapI32
  // is null); in that case preview still blocks like before.
  if (cmd !== 'preview_uct' && cmd !== 'cancel_uct') {
    cancelUct();
  }
  return new Promise((resolve, reject) => {
    ffiQueue.push({ cmd, payload, resolve, reject });
    pumpFfiQueue();
  });
}

function pumpFfiQueue() {
  if (pendingFfi || ffiQueue.length === 0) return;
  const job = ffiQueue.shift();
  pendingFfi = {
    resolve: (raw) => {
      pendingFfi = null;
      let env;
      let parseErr = null;
      try { env = JSON.parse(raw); } catch (pe) { env = null; parseErr = pe; }
      if (parseErr) {
        try { tsotPushError({
          stage: 'ffi-envelope-parse',
          surface: 'bridge',
          severity: 'error',
          title: 'FFI envelope JSON.parse failed',
          why: String(parseErr && parseErr.message || parseErr),
          raw: typeof raw === 'string' ? raw.slice(0, 512) : null,
        }); } catch (_) {}
      }
      if (env && env.ok === false) {
        const trace = env.trace || [];
        appendTrace(trace);
        // ERROR.md Slice 4: Rust err_envelope pushes typed Errors
        // into envelope.errors. Forward through tsotPushError so
        // they reach the cursor-anchored overlay just like the
        // ok:true path. The string `env.error` legacy field is
        // still wrapped into an errorEvent below for the existing
        // withInlineError pipeline (belt-and-suspenders).
        if (Array.isArray(env.errors)) {
          for (const e of env.errors) {
            try { tsotPushError(e); } catch (_) {}
          }
        }
        const errEvent =
          trace.find((e) => e && e.kind === 'Error') || {
            kind: 'Error',
            at_us: 0,
            source: 'rust-ffi',
            ffi_call: job.cmd,
            message: env.error || 'unknown error',
            location: null,
            recent_trace: [],
          };
        const err = new Error(errEvent.message);
        err.errorEvent = errEvent;
        job.reject(err);
      } else {
        job.resolve(raw);
      }
      pumpFfiQueue();
    },
    reject: (err) => {
      pendingFfi = null;
      job.reject(err);
      pumpFfiQueue();
    },
  };
  wasmWorker.postMessage({ cmd: job.cmd, ...job.payload });
}

// Mid-flight live UCT iteration event — arrives from worker's
// tsot_emit_iteration_event while the FFI call is still blocked.
// Rendered with a distinct `[live UctIter]` prefix so it's visually
// distinguishable from the post-envelope `[UctIter]` lines emitted
// by appendTrace once the call returns.
// appendLiveUctIter moved to assets/js-bridge.js (top-level, global scope).

// LOG + inline-error infrastructure (appendLiveUctIter,
// buildErrorBlock, appendErrorEvent, renderErrorAt,
// clearInlineErrorAt, jsErrorEnvelope) moved to
// assets/js-bridge.js as top-level functions on the global scope.
// Call sites in this file keep working unchanged.

// Wrap a click handler so any failure renders inline at the
// clicked element AND in the LOG. The handler receives the event;
// if it returns a Promise we await it. Successful runs clear any
// stale inline error at that anchor.
//
// If the caught exception carries an `errorEvent` (set by workerCall
// when the wasm returned an Err envelope, or by the worker error /
// panic message handlers), we use that rich Rust-side event for the
// inline display — and skip adding to the LOG a second time because
// the rich event has already been appended there. Otherwise we
// synthesize a `source:"js"` envelope and add it to both surfaces.
function withInlineError(label, fn) {
  return async function(ev) {
    const anchor = ev?.currentTarget || ev?.target || null;
    clearInlineErrorAt(anchor);
    // Capture the cursor position from the click event so the typed
    // Error pipeline (ERROR.md primary case) can anchor the overlay
    // AT the cursor — not at the button's bounding box. clientX/Y
    // come straight from the MouseEvent the browser delivered.
    const cursor =
      ev && typeof ev.clientX === 'number' && typeof ev.clientY === 'number'
        ? { x: ev.clientX, y: ev.clientY }
        : null;
    try {
      await fn(ev);
    } catch (e) {
      let env;
      if (e && e.errorEvent) {
        env = e.errorEvent;
      } else {
        env = jsErrorEnvelope(label, e);
        appendErrorEvent(env);
      }
      if (anchor) renderErrorAt(anchor, env);
      // Sacred error pipeline (ERROR.md): route a typed Error to Elm
      // anchored at the cursor of the click that triggered this
      // failure. The legacy `renderErrorAt` above stays as a JS-side
      // belt-and-suspenders during the migration.
      try {
        const title = (env && (env.summary || env.title)) || String(label);
        const why = (env && (env.detail || env.message || env.stack)) || String(e);
        tsotPushError({
          stage: label,
          surface: 'click-action',
          title: title,
          why: why,
          anchor: cursor,
          severity: 'error',
        });
      } catch (_) { /* tsotPushError is best-effort; the JS surface above is the floor */ }
    }
  };
}

// Pre-game phase: the deckbuilder. The wasm returns the playable
// card pool + shipped preset decks via two one-shot FFI calls
// (tsot_list_card_pool / tsot_list_preset_decks); the user assembles
// a deck before the first `tsot_start_game` fires. Once the user
// clicks Start, `state.phase` flips to 'playing' and the existing
// game-render path takes over.
//
// Mirror always for v1: opponent uses the same deck the user built.
// Persistence is G1's job — decks live only in memory for now.
// H7-Elm Stage 6: every state.phase assignment goes through setPhase
// so Elm's gamePhaseIn port hears about it — that's how the
// Save/Download buttons (now rendered by Elm) enable/disable. Reading
// state.phase still works the same way; only the write side changes.
function setPhase(p) {
  state.phase = p;
  if (window.tsotSetPhase) window.tsotSetPhase(p);
}
setPhase('deckbuilding');
state.cardPool = [];      // [{id, name, kind, cost_text, colors, symbols, subtypes, power, toughness, timing, abilities}, …]
state.presets = [];       // [{id, name, cards: [card_id, …]}, …] — starter + 7 gauntlet
state.deck = [];          // current working deck, flat array of card_ids with repetition
state.oppAi = 'uct';      // 'heuristic' | 'mcts' | 'uct'
state.specAiA = 'uct';    // both-AI spectate: AI for side A
state.specAiB = 'uct';    // both-AI spectate: AI for side B
state.spectate = null;    // { snapshots, index, playing, intervalId, msPerStep, winner, total_turns }

// Filter state for the pool browser. Empty = no filter.
state.poolFilterColor = '';
state.poolFilterKind = '';

// Build the start_game args from the user's deckbuilder choices.
// Mirror always — opponent uses your deck.
function startArgsFromDeckbuilder() {
  return {
    seed: Math.floor(Math.random() * 0xFFFFFFFF),
    deck_a_ids: state.deck.slice(),
    deck_b_ids: state.deck.slice(),
    opp_ai: state.oppAi,
  };
}

// First call drives the engine through to its first NeedHuman /
// GameOver. Subsequent calls would re-run `tsot_start_game` and
// reset the game — so this is one-shot, guarded by `wasmStarted`.
let wasmStarted = false;

// appendLog / fmtTraceEvent / appendTrace / jsPushSummary moved to
// assets/js-bridge.js as top-level functions on the global scope.
// Call sites here (parseEnvelope below + the worker message handler
// above) use them unchanged.

// Parse the `{prompt, log, trace}` envelope the Rust FFI returns
// on success. (Err envelopes — `{ok:false, …}` — are caught inside
// workerCall, never reach this function.)
// Side effects: push `log` lines + `trace` events into the LOG
// panel. Returns the prompt object the rest of the UI consumes.
function parseEnvelope(out) {
  const t0 = performance.now();
  const env = JSON.parse(out);
  const t_parse = performance.now();
  appendLog(env.log);
  const t_appendLog = performance.now();
  appendTrace(env.trace);
  const t_appendTrace = performance.now();
  // ERROR.md Slice 4: Rust pushes typed Errors into the envelope's
  // `errors` array. Forward each through the sacred-error pipeline
  // (`tsotPushError`) so the overlay anchors at the cursor (or
  // surface fallback when there's no in-flight click). The Rust-
  // emitted Error's wire shape is byte-compatible with Error.elm's
  // decoder, so no transformation is needed — just hand it to the
  // helper which posts to the `errorIn` port.
  if (Array.isArray(env.errors)) {
    for (const e of env.errors) {
      try { tsotPushError(e); } catch (_) {}
    }
  }
  return {
    prompt: env.prompt,
    measurements: {
      parse: t_parse - t0,
      appendLog: t_appendLog - t_parse,
      appendTrace: t_appendTrace - t_appendLog,
      trace_n: env.trace ? env.trace.length : 0,
      log_n: env.log ? env.log.length : 0,
      errors_n: env.errors ? env.errors.length : 0,
    },
  };
}

async function fetchState() {
  if (!wasmStarted) {
    wasmStarted = true;
    const args = startArgsFromDeckbuilder();
    const prompt = await ffiCall('start_game', { args }, 'start_game');
    return { ...prompt, state: prompt.state };
  }
  // The HTTP shim used to support arbitrary GET /state polls; in the
  // wasm model the engine only advances via tsot_apply_action, so a
  // bare re-fetch isn't meaningful. Return the last known prompt the
  // caller has — render code stashes it in `state.current`.
  return state.current;
}

// O5+: every FFI call goes through here so the wall-clock
// breakdown lands in the LOG panel. `label` is the short name that
// appears in the summary line; pass something specific like
// `apply_action(Pass)` so different actions are distinguishable.
//
// Worker path: `cmd` is the worker protocol command ('start_game' /
// 'apply_action'), `payload` is the object spread into the postMessage
// envelope alongside `cmd`. Synchronous wasmCallString is gone — the
// engine lives in worker scope and we await a `{kind:'envelope'}`
// reply.
async function ffiCall(cmd, payload, label) {
  const t0 = performance.now();
  const raw = await workerCall(cmd, payload);
  const t_wasm = performance.now();
  const { prompt, measurements } = parseEnvelope(raw);
  const t_done = performance.now();
  jsPushSummary(label, {
    wasm: t_wasm - t0,
    parse: measurements.parse,
    appendLog: measurements.appendLog,
    appendTrace: measurements.appendTrace,
    total: t_done - t0,
    trace_n: measurements.trace_n,
    log_n: measurements.log_n,
  });
  return prompt;
}

const _send = async (action) => {
  return await ffiCall(
    'apply_action',
    { action },
    `apply_action(${action.kind})`,
  );
};
const sendAction = async (action) => {
  // Decision log: snapshot the prompt the human is about to answer
  // along with UCT's belief about it (if a preview landed), so we
  // can later compare what UCT thought vs what the human picked vs
  // who actually won. Fire-and-forget — IDB failure doesn't block
  // the action.
  recordDecision(action);
  const next = await _send(action);
  // Server gave us a new prompt — reset all transient selection state
  // before rendering. Local click-only re-renders don't go through here,
  // so they keep the user's accumulating selection intact.
  state.selectedAttackers.clear();
  state.selectedBlocks = {};
  state.blockerPickFor = null;
  const view = { state: next.state, prompt: next };
  // Stash so a downstream `fetchState()` poll (no-op in the wasm
  // path, but the render code may surface state.current elsewhere)
  // reads the freshest prompt.
  state.current = view;
  return view;
};

// Decision log: per-prompt snapshot of what UCT thought + what the
// human picked. Persisted to IndexedDB.decision_log. The summary
// record at game-end ties these together with the eventual outcome.
function recordDecision(action) {
  if (!state.gameId) return; // not in an active session
  const cur = state.current;
  const prompt = cur && cur.prompt;
  if (!prompt) return;
  const view = cur.state || {};
  let uct = null;
  if (state.preview && !state.preview.inFlight && Array.isArray(state.preview.candidates)) {
    uct = {
      chosen: state.preview.chosen || null,
      candidates: state.preview.candidates,
      iterations_completed: state.preview.iterations_completed,
    };
  }
  // Agreement only well-defined for PickCard/Main2Pick where UCT runs.
  // For other prompt kinds (PickAttackers, PickBlocks, ChooseCard, …)
  // uct is null and agreement is null.
  let agreement = null;
  if (uct && uct.chosen) {
    agreement = (action && action.kind === 'PlayCard' && action.iid === uct.chosen);
  }
  const record = {
    type: 'prompt',
    gameId: state.gameId,
    turn: view.turn,
    phase: view.phase,
    active_player: view.active_player,
    promptKind: prompt.kind,
    candidates: prompt.candidates || prompt.eligible || null,
    uct,
    human_action: action,
    agreement,
    ts: new Date().toISOString(),
  };
  dbAppendDecision(record).catch((e) => {
    // IDB write failure for the decision log. Non-fatal for the
    // game in progress, but per ERROR.md axiom never silent —
    // surface as warn-level so the developer sees the data loss.
    try { tsotPushError({
      stage: 'idb-append-decision',
      surface: 'bridge',
      severity: 'warn',
      title: 'IDB append (decision log) failed',
      why: String(e && e.message || e),
    }); } catch (_) {}
  });
}

// H7-Elm Stage 4: the inline `renderDecisionReport` aggregator +
// HTML template was here. It moved into Main.elm (functions
// `aggregate` + `viewDecisionReport`); js-bridge.js does the IDB
// read and hands the records to Elm via the `decisionLogIn` port.

function recordGameSummary(view) {
  if (!state.gameId) return;
  const record = {
    type: 'summary',
    gameId: state.gameId,
    winner: view && view.winner,
    turns: view && view.turn,
    opp_ai: state.oppAi,
    deck: state.deck ? state.deck.slice() : null,
    ts: new Date().toISOString(),
  };
  dbAppendDecision(record).catch((e) => {
    // IDB write failure for the decision log. Non-fatal for the
    // game in progress, but per ERROR.md axiom never silent —
    // surface as warn-level so the developer sees the data loss.
    try { tsotPushError({
      stage: 'idb-append-decision',
      surface: 'bridge',
      severity: 'warn',
      title: 'IDB append (decision log) failed',
      why: String(e && e.message || e),
    }); } catch (_) {}
  });
}

// Wave 2: cardEl + colorTag + symbolTag deleted — Elm's
// GameScreen.viewCard / colorTagEl / symbolTagEl own this render
// path now. UCT-preview-badge-on-card logic moves with it (Wave 5
// will wire the uctPreviewIn port through CardOpts.uctBadge).

function render(s) {
  // O5+: render() is the single per-click DOM-rebuild path. We
  // bracket it with `performance.now()` so the summary line lands
  // in the LOG panel alongside the ffi/parse/appendTrace
  // breakdown. The summary is appended AFTER render finishes — by
  // then the new prompt is already on screen, so emitting one
  // extra text node is amortized over the full update.
  const _render_t0 = performance.now();
  _renderInner(s);
  const _render_dt = performance.now() - _render_t0;
  jsPushSummary('render', { render: _render_dt });
  // UCT preview kickoff (slice 3+4): on every render of a
  // PickCard/Main2Pick prompt with ≥2 candidates, fire a UCT
  // search on a clone of the session state. When it returns,
  // state.preview gets populated and we re-render with badges.
  // The queue inside workerCall serializes preview behind any
  // already-pending FFI; clicks during the search wait their turn.
  maybeFireUctPreview(s);
}

// Wave 2: uctStatusHtml deleted — it had no remaining callers
// after the Stage 11c prompt port; the UCT preview status moves
// into Elm in Wave 5 (uctPreviewIn → CardOpts.uctBadge per card).

// Stale-promise guard for UCT preview: every new preview kickoff
// bumps this counter; only the most recent fire's result is allowed
// to populate state.preview. Stops a slow preview's result from
// landing on a different prompt (e.g., the user passed and we're
// now in combat — old preview's candidates would be misleading).
let _previewGeneration = 0;

// Identity of the prompt a preview was fired for. Lets us skip
// re-firing preview when render() is called purely to update badges
// (which would otherwise loop: preview returns → render → re-fire
// preview → ...). When the prompt actually changes (user clicked
// and a new prompt arrived) the key changes and we re-fire.
function previewPromptKey(prompt) {
  if (!prompt) return '';
  if (prompt.kind !== 'PickCard' && prompt.kind !== 'Main2Pick') return '';
  return prompt.kind + ':' + (prompt.candidates || []).join(',');
}

function maybeFireUctPreview(s) {
  const prompt = s && s.prompt;
  const key = previewPromptKey(prompt);
  if (!key) {
    state.preview = null;
    return;
  }
  if (!Array.isArray(prompt.candidates) || prompt.candidates.length < 2) {
    state.preview = null;
    return;
  }
  // Already firing or have a result for THIS exact prompt — don't
  // re-fire. The render(state.current) call inside the preview
  // success path would otherwise loop forever.
  if (state.preview && state.preview.promptKey === key) return;
  const gen = ++_previewGeneration;
  state.preview = { inFlight: true, gen, promptKey: key };
  (async () => {
    try {
      // Make sure the cancel atomic is 0 before kicking off so a
      // previously-cancelled search doesn't kill this one. Game-action
      // FFI entry points also clear on the Rust side, but doing it here
      // means preview-after-preview chains stay clean too.
      clearUctCancel();
      // Budget is now generous — when the user clicks during preview,
      // cancelUct() in workerCall flips the atomic and the search
      // returns within one iteration (~75ms wasm-dev / ~10–30ms
      // release). Without cancellation, 200 iters were ~15s; with
      // cancellation, we don't care how big the budget is.
      const previewArgs = { iterations: 200, max_candidates: 8 };
      const raw = await workerCall('preview_uct', { previewArgs });
      const env = JSON.parse(raw);
      if (gen !== _previewGeneration) return; // stale, drop
      if (env && env.ok) {
        state.preview = {
          inFlight: false,
          gen,
          promptKey: key,
          candidates: env.candidates,
          chosen: env.chosen,
          iterations_completed: env.iterations_completed,
        };
        render(state.current);
      } else {
        state.preview = null;
      }
    } catch (e) {
      if (gen === _previewGeneration) state.preview = null;
      // Preview failure is non-fatal — but per ERROR.md axiom even
      // non-fatal failures surface. The {ok:false} path already
      // pushed via workerCall, so this catches everything else
      // (render exception, preview-state mutation drift, etc.).
      try { tsotPushError({
        stage: 'preview-uct',
        surface: 'bridge',
        severity: 'warn',
        title: 'UCT preview failed (non-fatal)',
        why: String(e && e.message || e),
      }); } catch (_) {}
    }
  })();
}

function _renderInner(s) {
  state.current = s;
  // Stage 11d: push the full envelope to Elm. Subsequent 11
  // substages decode slices for view functions; for now Elm just
  // stores Model.gameState = Just value.
  window.tsotPushGameState(s);
  const prompt = s.prompt || { kind: 'Loading' };
  const view = s.state;
  if (!view || !view.players) {
    setPrompt(JSON.stringify(s));
    return;
  }
  // Remove any prior casting-banner before re-rendering.
  const oldBanner = document.getElementById('casting-banner');
  if (oldBanner) oldBanner.remove();

  const you = view.players.find(p => p.side === view.viewer);
  const opp = view.players.find(p => p.side !== view.viewer);

  // Stage 11b: Elm's viewGameMeta is the sole meta renderer.
  // Stage 11g: per-player count spans (opp-counts, opp-gy-count,
  // your-gy-count, your-hand-counts) are rendered by Elm out of the
  // gameStateIn envelope — the previous four direct writes are gone.
  // Stage 11h: deck-top backs likewise rendered by Elm's
  // viewDeckTop — the previous `renderDeckTop` calls are gone.
  window.tsotPushGameMeta({
    turn: view.turn,
    phase: view.phase,
    activePlayer: view.active_player,
    viewer: view.viewer,
  });

  // Wave 2: all five card containers (opp/your board, opp/your
  // graveyard, your hand) are Elm-rendered via viewCard. JS no
  // longer touches them — no innerHTML, no appendChild, no inline
  // overlays. Until Waves 3+ port the click handlers, the cards
  // render read-only; interactive prompt-kinds (PickCard /
  // PickAttackers / PickBlocks / ChooseCard) keep their buttons
  // here but the per-card click surface is dormant. Pass /
  // No-attack / No-blocks / Skip still work for advancing the game.
  // Confirm / ChoosePlayer / ChooseInt buttons live in Elm's
  // #elm-prompt-buttons (Wave 1).
  const buttons = document.getElementById('buttons');
  buttons.innerHTML = '';

  // Stage 13: prompt-text per kind is Elm-derived now — promptToText
  // in GameScreen.elm runs inside GameStateReceived's update branch
  // and matches the JS strings byte-exactly (44 elm-test assertions
  // pin them). The only thing JS still does on GameOver is fire the
  // decision-log side effect; everything else returns.
  if (prompt.kind === 'GameOver') {
    if (!state.gameOverRecorded) {
      state.gameOverRecorded = true;
      recordGameSummary({ winner: prompt.winner, turn: view.turn });
    }
  }
}

// Wave 2: activateAbility + fireActivation deleted — they were
// only called from PickCard's per-card click handlers (now dormant
// pending Wave 3). When Wave 3 ports PickCard, both move into the
// PickCard branch's Elm-side Msg handlers as ActivateAbilityClicked
// + FireActivation (with the X-prompt routed through Elm's
// ChooseInt instead of native browser prompt()).

// Stage 13: findCardsByIids + labelFor deleted — both were used only
// by the JS-side prompt-text construction (ChooseCard hostCard lookup,
// PickBlocks attacker labels). Elm's GameScreen.promptToText + the
// Main.labelForIid helper do the same lookups now.

// ---------------- Save / Load ----------------

// IndexedDB wrapper. One object store keyed by auto-increment id;
// records carry { id, name, savedAt: ISO string, json }. Schema is
// tiny on purpose — Save/Load is for development right now (bug
// reports + quick "go back 3 turns") not a full slot-list product.

const DB_NAME = 'tsot';
const STORE = 'saves';
// Decision log store — per-prompt records of {what was offered, what
// UCT thought, what the human chose, the eventual game outcome}.
// Lets us answer the "is UCT actually a good adviser, or just
// confabulating from heuristic rollouts?" question across many played
// games. Same DB as `saves` so it gets a free Export tied to the
// existing save/load surface.
const DECISION_STORE = 'decision_log';

function openDb() {
  return new Promise((resolve, reject) => {
    // v2 adds DECISION_STORE; the upgrade handler is run only on a
    // version mismatch so existing browsers with a v1 DB get the new
    // store auto-created without losing their `saves`.
    const req = indexedDB.open(DB_NAME, 2);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => resolve(req.result);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
      }
      if (!db.objectStoreNames.contains(DECISION_STORE)) {
        db.createObjectStore(DECISION_STORE, { keyPath: 'id', autoIncrement: true });
      }
    };
  });
}

async function dbPut(record) {
  const db = await openDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    const req = tx.objectStore(STORE).put(record);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// H7-Elm Stage 5: `dbGetAll` + `dbDelete` (saves-store read + delete)
// moved into assets/js-bridge.js (as `tsotDbGetAllSaves` /
// `tsotDbDeleteSave` / `tsotDbGetSaveById`). The write side (`dbPut`)
// stays here — it's still called by `onSaveClick` whose button +
// flow haven't been ported to Elm yet (Stage 6).

// ---- decision log helpers (read/write `DECISION_STORE`) ----

async function dbAppendDecision(record) {
  const db = await openDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DECISION_STORE, 'readwrite');
    const req = tx.objectStore(DECISION_STORE).add(record);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// H7-Elm Stage 4: `dbGetAllDecisions` + `dbClearDecisions` moved
// into assets/js-bridge.js (as `tsotDbGetAllDecisions` /
// `tsotDbClearDecisions`) — read-side IDB ownership goes to the
// Elm port boundary; the write side (`dbAppendDecision`, called by
// `recordDecision` + `recordGameSummary`) stays here for now and
// will move when the prompt-recording flow itself ports to Elm.

// Stage 11c: #prompt is Elm-rendered. Every prior
// `document.getElementById('prompt').textContent = X` site now calls
// setPrompt(X); the port shim in js-bridge forwards through
// promptTextIn so viewPromptText paints it.
function setPrompt(text) {
  if (window.tsotSetPrompt) window.tsotSetPrompt(text);
}

function setSaveStatus(msg) {
  // H7-Elm Stage 6: #save-status is rendered by Elm. Forward to the
  // saveStatusIn port via the shim; falls through silently if the
  // port wiring drifted (the bridge logs a warning in that case).
  if (window.tsotSetSaveStatus) window.tsotSetSaveStatus(msg);
}

// Returns the SaveFile JSON for the current session. Throws on
// "no game in progress" (worker returns an error envelope).
async function fetchCurrentSaveJson() {
  const json = await workerCall('save_game', {});
  if (json.startsWith('error:')) throw new Error(json);
  return json;
}

// Inner-handler shape: throws on failure so `withInlineError` wraps
// catch + render. Status text is only used for SUCCESS notifications;
// errors flow through the inline + LOG paths.
async function onSaveClick() {
  const json = await fetchCurrentSaveJson();
  const name = window.prompt('Save name', `turn ${state.current?.state?.turn ?? '?'}`) || `save-${Date.now()}`;
  await dbPut({ name, savedAt: new Date().toISOString(), json });
  setSaveStatus(`saved "${name}"`);
  // H7-Elm Stage 5: ask Elm's saved-list panel to refresh. If the
  // panel is hidden, Elm ignores the update (see SavedListReceived);
  // if shown, it re-renders with the new save included.
  if (window.tsotSavedListRefresh) window.tsotSavedListRefresh();
}

async function onDownloadClick() {
  const json = await fetchCurrentSaveJson();
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tsot-save-${new Date().toISOString().replace(/[:.]/g, '-')}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setSaveStatus('downloaded');
}

async function loadSaveJson(saveJson) {
  // Treat a load as a fresh game for log purposes — the decisions
  // about to be made start clean. The saved-from session's earlier
  // decisions stay in the log under their old gameId.
  state.gameId = freshGameId();
  state.gameOverRecorded = false;
  // The opp_ai picked in the deckbuilder is reused; user can change
  // it before saving (H1 only persists it in-memory). Fresh seed per
  // load — SaveFile doesn't preserve rng state, see ADR notes.
  // workerCall throws (with `.errorEvent`) on `{ok:false}` envelopes,
  // so by the time we get a string here, the wasm succeeded.
  const loadArgs = {
    save_json: saveJson,
    opp_ai: state.oppAi || 'uct',
    seed: Math.floor(Math.random() * 0xFFFFFFFF),
  };
  const rawEnvelope = await workerCall('load_game', { loadArgs });
  setPhase('playing');
  // Stage 11f: Elm's viewGameScreen shows itself on gamePhase=Playing.
  // H7-Elm Stage 5: the saved-list panel is Elm-owned. After a
  // successful load we want it closed in case the user opened it to
  // pick this save; Elm hides it via window.tsotSavedListToggle if
  // currently shown.
  const { prompt } = parseEnvelope(rawEnvelope);
  state.current = { state: prompt.state, prompt };
  render(state.current);
  wasmStarted = true;
  setSaveStatus('loaded');
}

// H7-Elm Stage 5: the saved-list panel + its per-row Load / Download /
// Delete buttons moved into Elm (Main.elm's viewSavedListPanel +
// viewSaveRow). The inline `renderSavedList` here was REMOVED — JS
// now just exposes `window.tsotLoadSaveJson` for the Load action and
// the IDB read/delete sides moved into assets/js-bridge.js.
window.tsotLoadSaveJson = loadSaveJson;

// H7-Elm Stage 6: save-controls bar moved into Elm. The four
// JS-owned actions (Save / Download / Load file / Test panic) get
// exposed here as window.tsot* shims that js-bridge.js's port
// subscribers call. The Decision report / Export / Clear buttons
// route entirely through Elm now (no JS shim needed). The Load
// saved… button fires SavedListToggleClicked directly in Elm. The
// previous `wireSaveControls` and `updateSaveButtonsEnabled`
// functions are gone — Elm renders the bar, Elm tracks enabled
// state from `Model.gamePhase` via the gamePhaseIn port. The
// previous `onLoadFileChange` is gone — js-bridge.js owns the
// transient file input.
window.tsotSaveGame = () =>
  withInlineError('save_game', () => onSaveClick())();
window.tsotDownloadGame = () =>
  withInlineError('save_game (download)', () => onDownloadClick())();
window.tsotTestPanic = () =>
  withInlineError('test_panic', async () => {
    await workerCall('test_panic', {});
  })();

// Stage 10: deckbuilder UI (`deckCounts`, `poolCardEl`,
// `poolMatchesFilters`, `renderDeckbuilder`) moved into Main.elm.
// `viewDeckbuilder` + helpers in Elm own the render path; the
// `bootDataIn` port seeds the card pool + presets from the bootstrap
// fetch below. The functions below are gone — only the headstone
// remains.
// Generate a fresh game id for the decision log. Falls back to a
// timestamp-based id if crypto.randomUUID isn't available.
function freshGameId() {
  if (window.crypto && typeof window.crypto.randomUUID === 'function') {
    return window.crypto.randomUUID();
  }
  return 'g-' + Date.now() + '-' + Math.floor(Math.random() * 1e9).toString(36);
}

// ============== Spectate (H6) ==============

// Stage 10: Elm's Spectate button fires `workerCmdOut { cmd:
// "start_spectate", payload: { deckIds, aiA, aiB } }`. js-bridge
// dispatches to this. Payload mirrors into state.* so the rest of
// the codebase (save flow, snapshot index) keeps reading the same
// values.
window.tsotStartSpectate = async function (payload) {
  const deckIds = (payload && payload.deckIds) || [];
  if (deckIds.length === 0) return;
  state.deck = deckIds.slice();
  state.specAiA = (payload && payload.aiA) || state.specAiA;
  state.specAiB = (payload && payload.aiB) || state.specAiB;
  // Stage 12: Elm's SpectatorBar.Model owns msPerStep; payload carries
  // the dropdown's current value (default 500) so JS-side state.spectate
  // gets seeded without reading a now-gone #spec-speed DOM element.
  const msPerStep = (payload && Number.isFinite(payload.msPerStep)) ? payload.msPerStep : 500;
  setPhase('spectating');
  state.gameId = null;       // spectated games aren't in the human decision log
  state.gameOverRecorded = false;
  state.preview = null;      // no preview in spectate mode
  // Stage 11f: Elm's viewGameScreen shows itself on gamePhase=Spectating.
  // Stage 12: Elm's SpectatorBar shows itself on the active=true push
  //          fired by pushSpectatorState() in spectateRenderCurrent.
  setPrompt('Running game… (both AIs play to completion)');
  const args = {
    seed: Math.floor(Math.random() * 0xFFFFFFFF),
    deck_a_ids: state.deck.slice(),
    deck_b_ids: state.deck.slice(),
    ai_a: state.specAiA,
    ai_b: state.specAiB,
  };
  try {
    const raw = await workerCall('run_auto_game', { autoArgs: args });
    const env = JSON.parse(raw);
    if (!env || env.ok === false) {
      throw new Error('run_auto_game returned an error envelope');
    }
    // Surface log + trace just like a normal envelope so the LOG
    // panel shows what UCT was doing during the run.
    if (env.log) appendLog(env.log);
    if (env.trace) appendTrace(env.trace);
    state.spectate = {
      snapshots: env.snapshots || [],
      winner: env.winner,
      total_turns: env.total_turns,
      index: 0,
      playing: false,
      intervalId: null,
      msPerStep,
    };
    spectateRenderCurrent();
  } catch (e) {
    setPrompt('Spectate failed: ' + (e?.message || e));
    try { tsotPushError({
      stage: 'spectate',
      surface: 'spectator-bar',
      severity: 'error',
      title: 'Spectate failed',
      why: String(e && e.message || e),
    }); } catch (_) {}
  }
}

function spectateRenderCurrent() {
  const sp = state.spectate;
  if (!sp || !sp.snapshots[sp.index]) return;
  const snap = sp.snapshots[sp.index];
  const view = snap.state;
  // Wrap in the same shape render() expects, with a synthesized
  // Spectate prompt that _renderInner handles distinctly.
  state.current = {
    state: view,
    prompt: {
      kind: 'Spectate',
      state: view,
      turn: snap.turn,
      phase: snap.phase,
      active_player: snap.active_player,
      at_end: sp.index === sp.snapshots.length - 1,
      winner: sp.winner,
    },
  };
  render(state.current);
  // Stage 12: push the projection Elm's SpectatorBar needs; it owns
  // the scrubber + readout + play/pause label render now.
  pushSpectatorState();
}

function pushSpectatorState() {
  const sp = state.spectate;
  if (!sp) {
    window.tsotPushSpectatorState({
      active: false,
      index: 0,
      total: 0,
      playing: false,
      msPerStep: 500,
      winner: null,
      snapshot: null,
    });
    return;
  }
  const snap = sp.snapshots[sp.index] || null;
  window.tsotPushSpectatorState({
    active: true,
    index: sp.index,
    total: sp.snapshots.length,
    playing: !!sp.playing,
    msPerStep: sp.msPerStep,
    winner: sp.winner || null,
    snapshot: snap
      ? { turn: snap.turn, phase: snap.phase, activePlayer: String(snap.active_player) }
      : null,
  });
}

function spectateSeek(i) {
  const sp = state.spectate;
  if (!sp) return;
  sp.index = Math.max(0, Math.min(sp.snapshots.length - 1, i));
  spectateRenderCurrent();
}

function spectateStep(delta) {
  const sp = state.spectate;
  if (!sp) return;
  spectateSeek(sp.index + delta);
}

function spectatePlay() {
  const sp = state.spectate;
  if (!sp || sp.playing) return;
  sp.playing = true;
  sp.intervalId = setInterval(() => {
    if (!state.spectate) return spectatePause();
    if (state.spectate.index >= state.spectate.snapshots.length - 1) {
      return spectatePause();
    }
    spectateStep(1);
  }, sp.msPerStep);
  spectateRenderCurrent();
}

function spectatePause() {
  const sp = state.spectate;
  if (!sp) return;
  if (sp.intervalId !== null) clearInterval(sp.intervalId);
  sp.intervalId = null;
  sp.playing = false;
  spectateRenderCurrent();
}

function spectateExit() {
  if (state.spectate) spectatePause();
  state.spectate = null;
  setPhase('deckbuilding');
  // Stage 12: Elm's SpectatorBar hides itself on the active=false push.
  pushSpectatorState();
  // Stage 11f: Elm's viewGameScreen hides itself on gamePhase=Deckbuilding.
  // Stage 10: Elm's viewDeckbuilder re-renders itself when gamePhase
  // transitions back to Deckbuilding. Stage 11c: the prompt copy
  // routes through setPrompt → Elm's viewPromptText.
  setPrompt('Pre-game — build your deck. Click cards on the left to add; click [-] to remove. Mirror match: your opponent uses the same deck.');
}

// Stage 12: Elm's SpectatorBar fires workerCmdOut envelopes
// (spec_seek / spec_step / spec_play / spec_pause / spec_fwd_end /
// spec_set_speed / spec_exit). js-bridge dispatches each to the
// shims below; these mutate state.spectate and push the updated
// projection back to Elm via pushSpectatorState. The previous
// wireSpectatorBar function + the eight #spec-* onclick handlers
// are gone — Elm owns every click surface in the bar now.
window.tsotSpecSeek = (i) => spectateSeek(i);
window.tsotSpecStep = (delta) => spectateStep(delta);
window.tsotSpecPlay = () => { if (state.spectate && !state.spectate.playing) spectatePlay(); };
window.tsotSpecPause = () => { if (state.spectate && state.spectate.playing) spectatePause(); };
window.tsotSpecFwdEnd = () => {
  if (state.spectate) spectateSeek(state.spectate.snapshots.length - 1);
};
window.tsotSpecSetSpeed = (ms) => {
  const sp = state.spectate;
  if (!sp) return;
  sp.msPerStep = parseInt(ms, 10) || 500;
  if (sp.playing) { spectatePause(); spectatePlay(); }
  pushSpectatorState();
};
window.tsotSpecExit = spectateExit;

// Chunk B/C Wave 1 — Elm's prompt-button clicks (Confirm Yes/No,
// ChoosePlayer A/B/Skip, ChooseInt Confirm) fire workerCmdOut
// {cmd:"apply_action", payload: action}; the bridge dispatches here.
// Action shape mirrors what sendAction already accepts — same FFI
// surface, just routed through Elm.
window.tsotApplyAction = async function (action) {
  await sendAction(action).then(render);
};

// Wave 3 — Elm's PickCard board-activation click fires
// workerCmdOut { cmd:"activate_ability", payload:{iid, ability_index,
// needs_x, text} }. JS handles the synchronous native prompt() for
// X-cost activations because Elm has no equivalent; cancelling the
// prompt aborts the action (matches the old fireActivation behaviour).
window.tsotActivateAbility = async function (payload) {
  let x = null;
  if (payload && payload.needs_x) {
    const v = parseInt(prompt(`Choose X for "${payload.text}" (>=1):`, '1'), 10);
    if (!Number.isFinite(v) || v < 1) return;
    x = v;
  }
  await sendAction({
    kind: 'Activate',
    iid: payload.iid,
    ability_index: payload.ability_index,
    x,
  }).then(render);
};

// ============================================

// Stage 10: Elm's Start-game button fires `workerCmdOut { cmd:
// "start_game", payload: { deckIds, oppAi } }`. js-bridge dispatches
// here. Payload mirrors into state.deck / state.oppAi so getStartArgs
// + the save flow keep working.
window.tsotStartGameFromDeckbuilder = async function (payload) {
  const deckIds = (payload && payload.deckIds) || [];
  if (deckIds.length === 0) return;
  state.deck = deckIds.slice();
  state.oppAi = (payload && payload.oppAi) || state.oppAi;
  setPhase('playing');
  state.gameId = freshGameId();
  state.gameOverRecorded = false;
  // Stage 11f: Elm's viewGameScreen shows itself on gamePhase=Playing.
  setPrompt('Starting game…');
  try {
    const initial = await fetchState();
    state.current = { state: initial.state, prompt: initial };
    render(state.current);
  } catch (e) {
    setPrompt('Engine error: ' + (e && e.message ? e.message : e));
    try { tsotPushError({
      stage: 'engine-start',
      surface: 'prompt',
      severity: 'error',
      title: 'Engine start failed',
      why: String(e && e.message || e),
    }); } catch (_) {}
  }
};

(async () => {
  // Each await sets a stage marker so a hang surfaces in the prompt
  // line (visible in the page) instead of staying as the inert
  // "Loading..." default. Wasm loads can take seconds on first paint;
  // a timeout watchdog flips the prompt to a diagnostic if the wait
  // exceeds a threshold so the developer doesn't read "Loading" as
  // "stuck forever."
  const setBootStage = (s) => {
    setPrompt(s);
    window.tsotLogPushText && window.tsotLogPushText('[bootstrap] ' + s);
  };

  // Stage 12: wireSpectatorBar gone — Elm's SpectatorBar owns every
  // click in the bar; this bootstrap step doesn't exist anymore.

  let bootWatchdog = null;
  const armWatchdog = (label, ms) => {
    if (bootWatchdog) clearTimeout(bootWatchdog);
    bootWatchdog = setTimeout(() => {
      const msg = '[bootstrap stuck > ' + ms + 'ms at: ' + label + ']';
      setPrompt(msg);
      window.tsotLogPushText && window.tsotLogPushText(msg);
    }, ms);
  };
  const disarmWatchdog = () => {
    if (bootWatchdog) clearTimeout(bootWatchdog);
    bootWatchdog = null;
  };

  try {
    setBootStage('Bootstrap: spawning worker');
    armWatchdog('await wasmReady', 8000);
    bootWorker();
    await wasmReady;
    disarmWatchdog();
    setBootStage('Bootstrap: worker ready, requesting card pool');
  } catch (e) {
    disarmWatchdog();
    setPrompt('Failed to load wasm worker: ' + (e && e.message ? e.message : e));
    try { tsotPushError({
      stage: 'wasm-worker-spawn',
      surface: 'prompt',
      severity: 'panic',
      title: 'Failed to load wasm worker',
      why: String(e && e.message || e),
    }); } catch (_) {}
    return;
  }
  try {
    armWatchdog('workerCall list_card_pool', 8000);
    const poolJson = await workerCall('list_card_pool', {});
    disarmWatchdog();
    const cardPool = JSON.parse(poolJson);
    setBootStage('Bootstrap: card pool received, requesting presets');
    armWatchdog('workerCall list_preset_decks', 8000);
    const presetsJson = await workerCall('list_preset_decks', {});
    disarmWatchdog();
    const presets = JSON.parse(presetsJson);
    state.cardPool = cardPool;
    state.presets = presets;
    const starter = presets.find(p => p.id === 'starter') || presets[0];
    state.deck = starter ? starter.cards.slice() : [];
    window.tsotBootData({ cardPool, presets });
    setPrompt('Pre-game — build your deck. Click cards on the left to add; click [-] to remove. Mirror match: your opponent uses the same deck.');
  } catch (e) {
    disarmWatchdog();
    setPrompt('Failed to load deckbuilder data: ' + (e && e.message ? e.message : e));
    try { tsotPushError({
      stage: 'deckbuilder-bootstrap',
      surface: 'deckbuilder',
      severity: 'error',
      title: 'Failed to load deckbuilder data',
      why: String(e && e.message || e),
    }); } catch (_) {}
  }
})();
</script>
</body>
</html>
