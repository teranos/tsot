<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>tsot — play</title>
<style>
  body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #111; color: #ddd; margin: 0; padding: 1rem; font-size: 0.8rem; }
  h1 { font-size: 0.9rem; margin: 0 0 0.5rem 0; color: #888; font-weight: normal; }
  .row { display: flex; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .zone { border: 1px solid #333; padding: 0.5rem; min-width: 8rem; flex: 1; }
  .zone h2 { font-size: 0.7rem; margin: 0 0 0.4rem 0; color: #888; font-weight: normal; text-transform: uppercase; letter-spacing: 0.05em; }
  .cards { display: flex; flex-wrap: wrap; gap: 0.25rem; }
  .card {
    display: flex; flex-direction: column;
    padding: 0.35rem 0.5rem;
    background: #1c1c20; border: 1px solid #444;
    border-radius: 4px;
    min-width: 8.5rem; max-width: 11rem;
    font-size: 0.7rem;
    position: relative;
  }
  .card.clickable { cursor: pointer; border-color: #4af; }
  .card.clickable:hover { background: #234; }
  .card.selected { background: #2a3a4f; border-color: #6cf; }
  .card.tapped { opacity: 0.5; transform: rotate(6deg); }
  .card.sick { border-style: dashed; }
  .opponent .card { background: #221818; border-color: #533; }
  .opponent .card.clickable { border-color: #f88; }
  .head { display: flex; justify-content: space-between; align-items: baseline; gap: 0.4rem; }
  .name { font-weight: bold; color: #eee; }
  .cost { color: #fc6; font-size: 0.65rem; }
  .meta-line { color: #888; font-size: 0.65rem; display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.1rem; }
  .symbol { color: #6cf; }
  .color-w { color: #ddd; }
  .color-u { color: #4af; }
  .color-b { color: #b6f; }
  .color-r { color: #f66; }
  .color-g { color: #6f6; }
  .color-c { color: #aaa; }
  .stats { color: #fc6; font-weight: bold; }
  .abilities { color: #bbb; font-size: 0.65rem; margin-top: 0.2rem; line-height: 1.25; max-height: 4rem; overflow: hidden; }
  .abilities li { margin-left: 0.7rem; }
  .counts { color: #888; font-size: 0.7rem; margin-left: 0.5rem; }
  #prompt { padding: 0.5rem; background: #1a2030; border: 1px solid #335; margin-bottom: 0.75rem; }
  #buttons { margin-top: 0.5rem; }
  button { background: #234; color: #ddd; border: 1px solid #4af; padding: 0.35rem 0.8rem; cursor: pointer; font-family: inherit; font-size: 0.75rem; margin-right: 0.5rem; }
  button:hover { background: #345; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.danger { border-color: #f66; }
  .game-over { color: #ff4; font-weight: bold; }
  .empty-note { color: #666; font-style: italic; font-size: 0.7rem; }
  .meta { color: #888; font-size: 0.75rem; margin-bottom: 0.5rem; }
  .deck-top { color: #6cf; }
  /* Deckbuilder layout — two-column grid: pool left, current deck right. */
  #deckbuilder { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; }
  #deckbuilder .pool, #deckbuilder .deck { border: 1px solid #333; padding: 0.5rem; }
  #deckbuilder h2 { font-size: 0.7rem; margin: 0 0 0.4rem 0; color: #888; font-weight: normal; text-transform: uppercase; letter-spacing: 0.05em; }
  #deckbuilder .filters { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
  #deckbuilder .filters select { background: #1c1c20; color: #ddd; border: 1px solid #444; padding: 0.2rem 0.4rem; font-family: inherit; font-size: 0.7rem; }
  #deckbuilder .pool-grid { display: flex; flex-wrap: wrap; gap: 0.3rem; max-height: 32rem; overflow-y: auto; }
  /* Pool cards: same look as in-game cards, with a + badge in the corner. */
  #deckbuilder .pool-card { position: relative; cursor: pointer; }
  #deckbuilder .pool-card:hover { background: #234; }
  #deckbuilder .pool-card::after { content: '+'; position: absolute; top: 2px; right: 4px; color: #6f9; font-size: 0.9rem; font-weight: bold; }
  #deckbuilder .deck-row { display: flex; align-items: center; justify-content: space-between; padding: 0.2rem 0.4rem; border-bottom: 1px solid #222; font-size: 0.75rem; }
  #deckbuilder .deck-row .qty { color: #fc6; min-width: 2.5rem; }
  #deckbuilder .deck-row .name { color: #eee; flex: 1; margin-left: 0.4rem; }
  #deckbuilder .deck-row button { padding: 0.1rem 0.4rem; font-size: 0.7rem; }
  #deckbuilder .deck-controls { margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem; }
  #deckbuilder .deck-controls label { color: #888; font-size: 0.7rem; display: flex; align-items: center; gap: 0.4rem; }
  #deckbuilder .deck-controls select { background: #1c1c20; color: #ddd; border: 1px solid #444; padding: 0.2rem 0.4rem; font-family: inherit; font-size: 0.7rem; flex: 1; }
  #deckbuilder .deck-summary { color: #888; font-size: 0.7rem; margin-bottom: 0.4rem; }
  #deckbuilder .start { margin-top: 0.8rem; padding: 0.5rem 1rem; font-size: 0.85rem; border-color: #6f9; }
</style>
</head>
<body>
<h1>tsot — play</h1>

<div id="prompt">Loading...</div>

<div class="meta" id="meta"></div>

<!-- Deckbuilder: shown pre-game while state.phase === 'deckbuilding'.
     Hidden once the user clicks Start; the game-screen below takes over. -->
<div id="deckbuilder" style="display:none;"></div>

<!-- Game screen: hidden until the user finishes the deckbuilder. The
     existing render() targets these IDs directly, so toggling the
     container's display preserves all interactions. -->
<div id="game-screen" style="display:none;">
  <div class="row">
    <div class="zone opponent" style="flex: 2;">
      <h2>Opponent <span class="counts" id="opp-counts"></span></h2>
      <div class="cards" id="opp-board-cards"></div>
    </div>
    <div class="zone" style="flex: 1;">
      <h2>Opp graveyard <span class="counts" id="opp-gy-count"></span></h2>
      <div class="cards" id="opp-graveyard-cards"></div>
    </div>
  </div>

  <div class="row">
    <div class="zone" style="flex: 2;">
      <h2>You</h2>
      <div class="cards" id="your-board-cards"></div>
    </div>
    <div class="zone" style="flex: 1;">
      <h2>Your graveyard <span class="counts" id="your-gy-count"></span></h2>
      <div class="cards" id="your-graveyard-cards"></div>
    </div>
  </div>

  <div class="row">
    <div class="zone">
      <h2>Your hand <span class="counts" id="your-hand-counts"></span></h2>
      <div class="cards" id="your-hand-cards"></div>
    </div>
  </div>

  <div class="row">
    <div class="zone" style="flex: 0 0 14rem;">
      <h2>Opp deck top</h2>
      <div class="cards" id="opp-deck-top"></div>
    </div>
    <div class="zone" style="flex: 0 0 14rem;">
      <h2>Your deck top</h2>
      <div class="cards" id="your-deck-top"></div>
    </div>
  </div>

  <div id="buttons"></div>
</div>

<div class="zone">
  <h2>Log</h2>
  <pre id="log" style="max-height: 24rem; overflow-y: auto; font-size: 0.75rem; color: #aaa; white-space: pre; margin: 0;"></pre>
</div>

<script>
const state = { current: null, selectedAttackers: new Set(), selectedBlocks: {}, blockerPickFor: null };

// Web Worker hosts the wasm engine. The worker spawns tsot_wasm.js,
// which is linked against assets/wasm-worker-lib.js — that JS lib
// resolves the `tsot_emit_iteration_event` Rust extern declared in
// src/sim/uct.rs. The extern is called inside the UCT iteration
// loop and postMessages a `{kind:'uct_iter'}` envelope to main
// scope. Those messages arrive WHILE the outer FFI call is still
// blocked in worker scope — that's how live progress lands on the
// UI thread without Asyncify.
let wasmWorker = null;
let wasmReady = null;       // Promise resolved on worker's `{kind:'ready'}`
let pendingFfi = null;      // { resolve, reject } — at most one inflight

function bootWorker() {
  wasmWorker = new Worker('tsot-worker.js');
  wasmReady = new Promise((resolve, reject) => {
    const initHandler = (ev) => {
      const m = ev.data;
      if (m.kind === 'ready') {
        wasmWorker.removeEventListener('message', initHandler);
        resolve();
      } else if (m.kind === 'error') {
        wasmWorker.removeEventListener('message', initHandler);
        reject(new Error(m.error));
      }
    };
    wasmWorker.addEventListener('message', initHandler);
  });
  wasmWorker.addEventListener('message', (ev) => {
    const m = ev.data;
    if (m.kind === 'uct_iter') {
      appendLiveUctIter(m.line);
    } else if (m.kind === 'envelope') {
      const p = pendingFfi;
      pendingFfi = null;
      if (p) p.resolve(m.json);
    } else if (m.kind === 'error') {
      const p = pendingFfi;
      pendingFfi = null;
      if (p) p.reject(new Error(m.error));
    }
  });
}

// Round-trip a command to the worker. The protocol is `{cmd, ...payload}`
// outbound, `{kind:'envelope', json}` inbound. The engine is single-
// threaded, so at most one FFI call is in flight at a time and we
// only need a single `pendingFfi` slot, not a queue.
function workerCall(cmd, payload) {
  if (pendingFfi) {
    return Promise.reject(new Error('FFI call already in flight; previous call did not resolve'));
  }
  return new Promise((resolve, reject) => {
    pendingFfi = { resolve, reject };
    wasmWorker.postMessage({ cmd, ...payload });
  });
}

// Mid-flight live UCT iteration event — arrives from worker's
// tsot_emit_iteration_event while the FFI call is still blocked.
// Rendered with a distinct `[live UctIter]` prefix so it's visually
// distinguishable from the post-envelope `[UctIter]` lines emitted
// by appendTrace once the call returns.
function appendLiveUctIter(line) {
  let formatted;
  try {
    const ev = JSON.parse(line);
    formatted = `[live UctIter] iter=${ev.iter}/${ev.total}  ${(ev.duration_us / 1000).toFixed(1)}ms  turns=${ev.rollout_turns} plays=${ev.rollout_plays} atks=${ev.rollout_attacks} deaths=${ev.rollout_deaths} fires=${ev.rollout_handler_fires}`;
  } catch (_) {
    formatted = `[live UctIter] ${line}`;
  }
  const logEl = document.getElementById('log');
  logEl.appendChild(document.createTextNode(formatted + '\n'));
  logEl.scrollTop = logEl.scrollHeight;
}

// Pre-game phase: the deckbuilder. The wasm returns the playable
// card pool + shipped preset decks via two one-shot FFI calls
// (tsot_list_card_pool / tsot_list_preset_decks); the user assembles
// a deck before the first `tsot_start_game` fires. Once the user
// clicks Start, `state.phase` flips to 'playing' and the existing
// game-render path takes over.
//
// Mirror always for v1: opponent uses the same deck the user built.
// Persistence is G1's job — decks live only in memory for now.
state.phase = 'deckbuilding';
state.cardPool = [];      // [{id, name, kind, cost_text, colors, symbols, subtypes, power, toughness, timing, abilities}, …]
state.presets = [];       // [{id, name, cards: [card_id, …]}, …] — starter + 7 gauntlet
state.deck = [];          // current working deck, flat array of card_ids with repetition
state.oppAi = 'uct';      // 'heuristic' | 'mcts' | 'uct'

// Filter state for the pool browser. Empty = no filter.
state.poolFilterColor = '';
state.poolFilterKind = '';

// Build the start_game args from the user's deckbuilder choices.
// Mirror always — opponent uses your deck.
function startArgsFromDeckbuilder() {
  return {
    seed: Math.floor(Math.random() * 0xFFFFFFFF),
    deck_a_ids: state.deck.slice(),
    deck_b_ids: state.deck.slice(),
    opp_ai: state.oppAi,
  };
}

// First call drives the engine through to its first NeedHuman /
// GameOver. Subsequent calls would re-run `tsot_start_game` and
// reset the game — so this is one-shot, guarded by `wasmStarted`.
let wasmStarted = false;
// Append a batch of log lines to the #log pane and scroll to bottom.
// The Rust side returns `engine.log` drained since the last yield;
// each line is rendered verbatim (multi-line strings — the UCT trace
// ASCII tree — are passed through unchanged so the indentation reads
// correctly inside the <pre>).
function appendLog(lines) {
  if (!lines || lines.length === 0) return;
  const logEl = document.getElementById('log');
  for (const line of lines) {
    logEl.appendChild(document.createTextNode(line + '\n'));
  }
  logEl.scrollTop = logEl.scrollHeight;
}

// O5: format one TraceEvent as a single rendered line. Δms is
// `at_us / 1000` from the bus's session origin (set in Rust by
// `trace::enable(true)` on the first FFI call). The category
// prefix lets the reader scan the stream; the payload after is
// formatted per-variant. Raw-stream rendering only — filters /
// click-to-expand land in Phase 5 (O13–O15).
function fmtTraceEvent(ev) {
  const t = (ev.at_us / 1000).toFixed(1).padStart(8);
  switch (ev.kind) {
    case 'Step':
      return `[${t}ms Step]      ${ev.from}  ->  ${ev.to}  (${(ev.duration_us / 1000).toFixed(2)}ms)  -> ${ev.result}`;
    case 'Cursor':
      return `[${t}ms Cursor]    ${ev.from}  ->  ${ev.to}`;
    case 'Phase':
      return `[${t}ms Phase]     turn=${ev.turn} ${ev.from}  ->  ${ev.to}`;
    case 'Mutation':
      return `[${t}ms Mutation]  ${JSON.stringify(ev.entry)}`;
    case 'Count':
      return `[${t}ms Count]     ${ev.key}[${ev.player}] ${ev.before}  ->  ${ev.after}`;
    case 'Oracle':
      return `[${t}ms Oracle]    ${ev.call}(asker=${ev.asker})  ->  ${ev.answer}  (${(ev.duration_us / 1000).toFixed(2)}ms)`;
    case 'Play':
      return `[${t}ms Play]      ${ev.iid}  ->  ${ev.outcome}  (${(ev.duration_us / 1000).toFixed(2)}ms)`;
    case 'Winner':
      return `[${t}ms Winner]    ${ev.who} wins  (cause: ${ev.cause})`;
    case 'Ffi':
      return `[${t}ms Ffi]       ${ev.span}  (${(ev.duration_us / 1000).toFixed(2)}ms)`;
    case 'AiPick': {
      const top = (ev.candidates || []).slice(0, 6)
        .map(c => `${c.iid}=${c.score}`)
        .join(', ');
      const more = (ev.candidates || []).length > 6 ? ` +${ev.candidates.length - 6} more` : '';
      return `[${t}ms AiPick]    ${ev.ai}  candidates=[${top}${more}]  -> ${ev.chosen || '(none)'}  (${(ev.duration_us / 1000).toFixed(2)}ms)`;
    }
    case 'AttackerSelection': {
      const elig = (ev.eligible || []).join(',');
      const chosen = (ev.chosen || []).join(',');
      return `[${t}ms Attackers] ${ev.player}: eligible=[${elig}]  chosen=[${chosen}]  (${(ev.duration_us / 1000).toFixed(2)}ms)`;
    }
    case 'BlockerSelection': {
      const atks = (ev.attackers || []).join(',');
      const pairs = (ev.assignments || []).map(p => `${p[0]}->${p[1]}`).join(', ');
      return `[${t}ms Blockers]  ${ev.defender}: attackers=[${atks}]  blocks=[${pairs}]  (${(ev.duration_us / 1000).toFixed(2)}ms)`;
    }
    case 'Handler': {
      const partner = ev.partner ? ` partner=${ev.partner}` : '';
      const err = ev.error ? `  ERR: ${ev.error}` : '';
      return `[${t}ms Handler]   ${ev.event}  source=${ev.source}${partner}  (${(ev.duration_us / 1000).toFixed(2)}ms)${err}`;
    }
    case 'UctIteration': {
      const path = (ev.path || []).join(' -> ');
      return `[${t}ms UctIter]   iter=${ev.iter}/${ev.total}  ${(ev.duration_us / 1000).toFixed(1)}ms  turns=${ev.rollout_turns} plays=${ev.rollout_plays} atks=${ev.rollout_attacks} deaths=${ev.rollout_deaths} fires=${ev.rollout_handler_fires}  winner=${ev.winner}  path=[${path}]`;
    }
    default:
      return `[${t}ms ${ev.kind || '?'}] ${JSON.stringify(ev)}`;
  }
}

// O5: append a TraceEvent array as formatted lines into the LOG
// panel. Trace + log share the panel for now; filter chips arrive
// in O13. Each event is one text node so future click-to-expand
// (O14) can swap in DOM elements without restructuring.
function appendTrace(events) {
  if (!events || events.length === 0) return;
  const logEl = document.getElementById('log');
  for (const ev of events) {
    logEl.appendChild(document.createTextNode(fmtTraceEvent(ev) + '\n'));
  }
  logEl.scrollTop = logEl.scrollHeight;
}

// O5+: JS-side observability. The wasm-side trace stops at FFI
// exit; everything between Rust returning + the next FFI call is
// JS / DOM / browser work. We bracket each phase with
// `performance.now()` and emit ONE summary line per click into the
// LOG panel so the previously-invisible gap is now itemized.
//
// Format mirrors the Rust trace lines for visual consistency. The
// summary is appended FIRST so even if subsequent rendering blocks
// the UI thread, the user still sees the previous click's
// breakdown.
function jsPushSummary(label, breakdown) {
  const logEl = document.getElementById('log');
  const parts = Object.entries(breakdown)
    .filter(([_, v]) => v !== undefined)
    .map(([k, v]) => `${k}=${typeof v === 'number' ? v.toFixed(1) + 'ms' : v}`)
    .join(' ');
  logEl.appendChild(
    document.createTextNode(`[js summary] ${label}: ${parts}\n`)
  );
}

// Parse the `{prompt, log, trace}` envelope the Rust FFI returns.
// Side effects: push `log` lines + `trace` events into the LOG
// panel. Returns the prompt object the rest of the UI consumes.
//
// O5+: returns measurement breakdown alongside the prompt so the
// caller can include parse + DOM-append times in its summary.
function parseEnvelope(out) {
  if (out.startsWith('error:')) throw new Error(out);
  const t0 = performance.now();
  const env = JSON.parse(out);
  const t_parse = performance.now();
  appendLog(env.log);
  const t_appendLog = performance.now();
  appendTrace(env.trace);
  const t_appendTrace = performance.now();
  return {
    prompt: env.prompt,
    measurements: {
      parse: t_parse - t0,
      appendLog: t_appendLog - t_parse,
      appendTrace: t_appendTrace - t_appendLog,
      trace_n: env.trace ? env.trace.length : 0,
      log_n: env.log ? env.log.length : 0,
    },
  };
}

async function fetchState() {
  if (!wasmStarted) {
    wasmStarted = true;
    const args = startArgsFromDeckbuilder();
    const prompt = await ffiCall('start_game', { args }, 'start_game');
    return { ...prompt, state: prompt.state };
  }
  // The HTTP shim used to support arbitrary GET /state polls; in the
  // wasm model the engine only advances via tsot_apply_action, so a
  // bare re-fetch isn't meaningful. Return the last known prompt the
  // caller has — render code stashes it in `state.current`.
  return state.current;
}

// O5+: every FFI call goes through here so the wall-clock
// breakdown lands in the LOG panel. `label` is the short name that
// appears in the summary line; pass something specific like
// `apply_action(Pass)` so different actions are distinguishable.
//
// Worker path: `cmd` is the worker protocol command ('start_game' /
// 'apply_action'), `payload` is the object spread into the postMessage
// envelope alongside `cmd`. Synchronous wasmCallString is gone — the
// engine lives in worker scope and we await a `{kind:'envelope'}`
// reply.
async function ffiCall(cmd, payload, label) {
  const t0 = performance.now();
  const raw = await workerCall(cmd, payload);
  const t_wasm = performance.now();
  const { prompt, measurements } = parseEnvelope(raw);
  const t_done = performance.now();
  jsPushSummary(label, {
    wasm: t_wasm - t0,
    parse: measurements.parse,
    appendLog: measurements.appendLog,
    appendTrace: measurements.appendTrace,
    total: t_done - t0,
    trace_n: measurements.trace_n,
    log_n: measurements.log_n,
  });
  return prompt;
}

const _send = async (action) => {
  return await ffiCall(
    'apply_action',
    { action },
    `apply_action(${action.kind})`,
  );
};
const sendAction = async (action) => {
  const next = await _send(action);
  // Server gave us a new prompt — reset all transient selection state
  // before rendering. Local click-only re-renders don't go through here,
  // so they keep the user's accumulating selection intact.
  state.selectedAttackers.clear();
  state.selectedBlocks = {};
  state.blockerPickFor = null;
  const view = { state: next.state, prompt: next };
  // Stash so a downstream `fetchState()` poll (no-op in the wasm
  // path, but the render code may surface state.current elsewhere)
  // reads the freshest prompt.
  state.current = view;
  return view;
};

function colorTag(c) {
  const code = (c || '').toLowerCase();
  return `<span class="color-${code}">${code}</span>`;
}

function symbolTag(s) {
  return `<span class="symbol">${s}</span>`;
}

function cardEl(card, opts = {}) {
  const { clickable = false, selected = false, onClick = null, dim = false } = opts;
  const div = document.createElement('div');
  let cls = 'card';
  if (clickable) cls += ' clickable';
  if (selected) cls += ' selected';
  if (card.tapped) cls += ' tapped';
  if (card.summoning_sick) cls += ' sick';
  div.className = cls;
  if (dim) div.style.opacity = '0.6';

  const head = document.createElement('div');
  head.className = 'head';
  // Show effective cost (post-reduction). When it differs from the
  // printed cost, show both: `1G ⟵ 2G` (effective ⟵ printed).
  const printed = card.cost || '';
  const effective = card.effective_cost || printed;
  const costHtml = (printed === effective)
    ? `<span class="cost">${printed}</span>`
    : `<span class="cost">${effective}</span><span class="cost" style="color:#666; text-decoration:line-through; margin-left:0.3rem;">${printed}</span>`;
  head.innerHTML = `<span class="name">${card.name}</span>${costHtml}`;
  div.appendChild(head);

  const metaParts = [];
  if (card.kind === 'Creature') metaParts.push(`<span class="stats">${card.power}/${card.toughness - (card.damage || 0)}${card.damage ? ` (-${card.damage})` : ''}</span>`);
  if (card.colors && card.colors.length) metaParts.push(card.colors.map(colorTag).join(''));
  if (card.symbols && card.symbols.length) metaParts.push(card.symbols.map(symbolTag).join(''));
  if (card.subtypes && card.subtypes.length) metaParts.push(`<span style="color:#888;">${card.subtypes.join('·')}</span>`);
  if (metaParts.length) {
    const m = document.createElement('div');
    m.className = 'meta-line';
    m.innerHTML = metaParts.join(' ');
    div.appendChild(m);
  }

  if (card.abilities && card.abilities.length) {
    const a = document.createElement('div');
    a.className = 'abilities';
    a.innerHTML = card.abilities.map(s => `<div>${s}</div>`).join('');
    div.appendChild(a);
  }

  div.title = card.iid + (card.summoning_sick ? '  (summoning sick)' : '');
  if (clickable && onClick) div.onclick = () => onClick(card.iid);
  return div;
}

function render(s) {
  // O5+: render() is the single per-click DOM-rebuild path. We
  // bracket it with `performance.now()` so the summary line lands
  // in the LOG panel alongside the ffi/parse/appendTrace
  // breakdown. The summary is appended AFTER render finishes — by
  // then the new prompt is already on screen, so emitting one
  // extra text node is amortized over the full update.
  const _render_t0 = performance.now();
  _renderInner(s);
  const _render_dt = performance.now() - _render_t0;
  jsPushSummary('render', { render: _render_dt });
}

function _renderInner(s) {
  state.current = s;
  const prompt = s.prompt || { kind: 'Loading' };
  const view = s.state;
  if (!view || !view.players) {
    document.getElementById('prompt').textContent = JSON.stringify(s);
    return;
  }
  // Remove any prior casting-banner before re-rendering.
  const oldBanner = document.getElementById('casting-banner');
  if (oldBanner) oldBanner.remove();

  const you = view.players.find(p => p.side === view.viewer);
  const opp = view.players.find(p => p.side !== view.viewer);

  document.getElementById('meta').textContent = `turn ${view.turn} · phase ${view.phase} · active ${view.active_player.toUpperCase()} · you are ${view.viewer.toUpperCase()}`;
  document.getElementById('opp-counts').textContent = `deck:${opp.deck_count} hand:${opp.hand_count} ex:${opp.exile_count}`;
  document.getElementById('opp-gy-count').textContent = opp.graveyard_count;
  document.getElementById('your-gy-count').textContent = you.graveyard_count;
  document.getElementById('your-hand-counts').textContent = `deck:${you.deck_count} ex:${you.exile_count}`;

  // Opponent board (rendered fresh each call so prompt-specific click handlers work).
  const oppBoard = document.getElementById('opp-board-cards');
  oppBoard.innerHTML = '';
  if (opp.board.length === 0) oppBoard.innerHTML = '<span class="empty-note">empty</span>';
  else opp.board.forEach(c => oppBoard.appendChild(cardEl(c)));

  // Opponent graveyard (always visible).
  const oppGy = document.getElementById('opp-graveyard-cards');
  oppGy.innerHTML = '';
  if (opp.graveyard.length === 0) oppGy.innerHTML = '<span class="empty-note">empty</span>';
  else opp.graveyard.forEach(c => oppGy.appendChild(cardEl(c, { dim: true })));

  // Your graveyard.
  const yourGy = document.getElementById('your-graveyard-cards');
  yourGy.innerHTML = '';
  if (you.graveyard.length === 0) yourGy.innerHTML = '<span class="empty-note">empty</span>';
  else you.graveyard.forEach(c => yourGy.appendChild(cardEl(c, { dim: true })));

  // Deck tops — public to both sides.
  renderDeckTop('your-deck-top', you.deck_top);
  renderDeckTop('opp-deck-top', opp.deck_top);

  const yourBoard = document.getElementById('your-board-cards');
  yourBoard.innerHTML = '';
  const yourHand = document.getElementById('your-hand-cards');
  yourHand.innerHTML = '';
  const buttons = document.getElementById('buttons');
  buttons.innerHTML = '';
  const promptEl = document.getElementById('prompt');

  if (prompt.kind === 'GameOver') {
    const w = prompt.winner ? prompt.winner.toLowerCase() : null;
    const youWon = w === view.viewer;
    promptEl.innerHTML = `<span class="game-over">Game over. Winner: ${w ? w.toUpperCase() : 'draw'} ${youWon ? '(you win)' : (w ? '(you lose)' : '')}</span>`;
    you.board.forEach(c => yourBoard.appendChild(cardEl(c)));
    you.hand.forEach(c => yourHand.appendChild(cardEl(c)));
    return;
  }

  if (prompt.kind === 'PickCard') {
    const acts = prompt.activations || [];
    const parts = [];
    parts.push(`${prompt.candidates.length} card(s) in hand affordable`);
    if (acts.length > 0) parts.push(`${acts.length} ability/abilities ready to activate`);
    promptEl.innerHTML = `Your main phase — ${parts.join(' · ')}. Click a hand card to play, click a board ability to activate, or pass.`;
    const candidateSet = new Set(prompt.candidates);
    you.hand.forEach(c => {
      yourHand.appendChild(cardEl(c, {
        clickable: candidateSet.has(c.iid),
        onClick: iid => sendAction({ kind: 'PlayCard', iid }).then(render),
      }));
    });
    // Board cards: group activations by iid. Each card with one or
    // more activatable abilities becomes a clickable group; clicking
    // shows the ability list (or fires directly if there's exactly
    // one).
    const actsByIid = {};
    acts.forEach(a => { (actsByIid[a.iid] = actsByIid[a.iid] || []).push(a); });
    you.board.forEach(c => {
      const cardActs = actsByIid[c.iid] || [];
      if (cardActs.length === 0) {
        yourBoard.appendChild(cardEl(c));
        return;
      }
      const el = cardEl(c, {
        clickable: true,
        onClick: () => activateAbility(c, cardActs),
      });
      // Inline ability list shown under the card.
      cardActs.forEach(a => {
        const row = document.createElement('div');
        row.style.cssText = 'color:#6cf; font-size:0.65rem; margin-top:0.2rem; padding:0.15rem 0.3rem; background:#1a2030; border:1px solid #234; cursor:pointer;';
        row.textContent = `▶ [${a.ability_index}] ${a.text.length > 60 ? a.text.slice(0, 57) + '…' : a.text}${a.needs_x ? ' (X)' : ''}`;
        row.onclick = (ev) => { ev.stopPropagation(); fireActivation(a); };
        el.appendChild(row);
      });
      yourBoard.appendChild(el);
    });
    const pass = document.createElement('button');
    pass.textContent = 'Pass';
    pass.onclick = () => sendAction({ kind: 'Pass' }).then(render);
    buttons.appendChild(pass);
  } else if (prompt.kind === 'PickAttackers') {
    const eligible = new Set(prompt.eligible);
    if (eligible.size === 0) {
      promptEl.innerHTML = `Combat — <span style="color:#888;">no creatures can attack this turn</span>.`;
    } else {
      promptEl.textContent = `Combat — click creatures to attack with (${eligible.size} eligible), then confirm.`;
    }
    you.board.forEach(c => {
      yourBoard.appendChild(cardEl(c, {
        clickable: eligible.has(c.iid),
        selected: state.selectedAttackers.has(c.iid),
        onClick: iid => {
          if (state.selectedAttackers.has(iid)) state.selectedAttackers.delete(iid);
          else state.selectedAttackers.add(iid);
          render(state.current);
        },
      }));
    });
    you.hand.forEach(c => yourHand.appendChild(cardEl(c)));
    if (eligible.size > 0) {
      const confirm = document.createElement('button');
      confirm.textContent = `Attack (${state.selectedAttackers.size})`;
      confirm.onclick = () => sendAction({ kind: 'Attackers', iids: [...state.selectedAttackers] }).then(render);
      buttons.appendChild(confirm);
    }
    const skip = document.createElement('button');
    skip.textContent = eligible.size === 0 ? 'End combat' : 'No attack';
    skip.className = 'danger';
    skip.onclick = () => sendAction({ kind: 'Attackers', iids: [] }).then(render);
    buttons.appendChild(skip);
  } else if (prompt.kind === 'PickBlocks') {
    const eligibleBlockers = new Set(prompt.eligible_blockers);
    if (eligibleBlockers.size === 0) {
      promptEl.innerHTML = `Combat — incoming: <b>${prompt.attackers.map(a => labelFor(view, a)).join(', ')}</b>. <span style="color:#f88;">No eligible blockers (your creatures are all tapped, sick-from-attack, or restricted).</span>`;
    } else if (state.blockerPickFor !== null) {
      const stagedName = labelFor(view, state.blockerPickFor);
      promptEl.innerHTML = `Combat — <b style="color:#6cf;">${stagedName}</b> staged as blocker. <span style="color:#fa4;">Now click an attacker (orange border) to assign.</span> Click the staged blocker again to cancel. Click an assigned blocker to unassign.`;
    } else {
      promptEl.innerHTML = `Combat — incoming: <b>${prompt.attackers.map(a => labelFor(view, a)).join(', ')}</b>. Click one of your highlighted creatures to stage as blocker; then click the attacker. Multiple blockers may share one attacker.`;
    }

    // Index assignments by attacker for the per-attacker labels.
    const blockersByAttacker = {};
    for (const [blkIid, atkIid] of Object.entries(state.selectedBlocks)) {
      if (!blockersByAttacker[atkIid]) blockersByAttacker[atkIid] = [];
      blockersByAttacker[atkIid].push(blkIid);
    }

    you.board.forEach(c => {
      const isBlocker = eligibleBlockers.has(c.iid);
      const assignedTo = state.selectedBlocks[c.iid];
      const isStaged = state.blockerPickFor === c.iid;
      const el = cardEl(c, {
        clickable: isBlocker,
        selected: !!assignedTo || isStaged,
        onClick: iid => {
          // Three click semantics:
          //   staged + click same  → unstage
          //   assigned + click     → unassign
          //   anything else        → stage this blocker
          if (state.blockerPickFor === iid) { state.blockerPickFor = null; render(state.current); return; }
          if (state.selectedBlocks[iid]) { delete state.selectedBlocks[iid]; render(state.current); return; }
          state.blockerPickFor = iid;
          render(state.current);
        },
      });
      if (assignedTo) {
        const label = document.createElement('div');
        label.style.cssText = 'color:#6cf; font-size:0.6rem; margin-top:0.2rem;';
        label.textContent = `→ blocks ${labelFor(view, assignedTo)}`;
        el.appendChild(label);
      } else if (isStaged) {
        const label = document.createElement('div');
        label.style.cssText = 'color:#fa4; font-size:0.6rem; margin-top:0.2rem;';
        label.textContent = '… click an attacker';
        el.appendChild(label);
      }
      yourBoard.appendChild(el);
    });
    you.hand.forEach(c => yourHand.appendChild(cardEl(c)));

    // Re-render opp board with click handlers on attackers + per-attacker block list.
    oppBoard.innerHTML = '';
    opp.board.forEach(c => {
      const isAtk = prompt.attackers.includes(c.iid);
      const isTarget = isAtk && state.blockerPickFor !== null;
      const el = cardEl(c, {
        clickable: isTarget,
        onClick: iid => {
          if (state.blockerPickFor) {
            state.selectedBlocks[state.blockerPickFor] = iid;
            state.blockerPickFor = null;
            render(state.current);
          }
        },
      });
      if (isAtk) el.style.borderColor = '#fa4';
      const blockers = blockersByAttacker[c.iid] || [];
      if (blockers.length > 0) {
        const label = document.createElement('div');
        label.style.cssText = 'color:#6cf; font-size:0.6rem; margin-top:0.2rem;';
        label.textContent = `← blocked by ${blockers.map(b => labelFor(view, b)).join(', ')}`;
        el.appendChild(label);
      }
      oppBoard.appendChild(el);
    });

    const pairs = Object.entries(state.selectedBlocks);
    const confirm = document.createElement('button');
    confirm.textContent = `Confirm blocks (${pairs.length})`;
    confirm.onclick = () => {
      sendAction({ kind: 'Blocks', pairs }).then(r => {
        state.selectedBlocks = {};
        state.blockerPickFor = null;
        render(r);
      });
    };
    buttons.appendChild(confirm);
    const skip = document.createElement('button');
    skip.textContent = 'No blocks';
    skip.className = 'danger';
    skip.onclick = () => {
      state.selectedBlocks = {};
      state.blockerPickFor = null;
      sendAction({ kind: 'Blocks', pairs: [] }).then(render);
    };
    buttons.appendChild(skip);
  } else if (prompt.kind === 'ChooseCard') {
    // Pool iids live in whatever zone the engine drew them from —
    // opp board for "kill target opposing creature", your hand for
    // hand-payment, your graveyard for recur, etc. Find each iid in
    // its actual zone and mark it clickable there; don't relocate
    // cards into yourHand.
    const poolSet = new Set(prompt.pool);
    const host = prompt.host;
    const hostCard = host ? findCardsByIids(view, [host])[0] : null;
    const isPayment = !!host;
    const rawText = prompt.prompt || '';
    let banner;
    if (isPayment) {
      const slot = (rawText.match(/slot (\d+)/i) || [])[1];
      banner = `<b style="color:#fa4;">CASTING ${hostCard ? hostCard.name : 'a card'}</b> — pick a hand card to pay${slot ? ` (slot ${slot})` : ''}.`;
    } else {
      banner = `<b style="color:#6cf;">Choose a target</b> — ${rawText}.`;
    }
    promptEl.innerHTML = banner + (prompt.optional ? ' <span style="color:#888;">— may skip</span>' : '');

    // Helper: render a card list into a zone container, marking
    // pool members clickable and dimming non-pool entries. The
    // currently-casting host card (if any) keeps its in-hand slot
    // with a "CASTING" marker badge — no duplicate banner.
    const onPick = iid => sendAction({ kind: 'ChoiceCard', iid }).then(render);
    const renderZoneWithPool = (containerEl, cards) => {
      containerEl.innerHTML = '';
      if (cards.length === 0) { containerEl.innerHTML = '<span class="empty-note">empty</span>'; return; }
      cards.forEach(c => {
        const isHost = host && c.iid === host;
        const inPool = poolSet.has(c.iid);
        const el = cardEl(c, {
          clickable: inPool,
          onClick: inPool ? onPick : null,
          dim: !inPool && !isHost,
        });
        if (isHost) {
          el.style.borderColor = '#fa4';
          el.style.borderStyle = 'dashed';
          const badge = document.createElement('div');
          badge.style.cssText = 'color:#fa4; font-size:0.6rem; text-transform:uppercase; letter-spacing:0.06em; margin-top:0.25rem;';
          badge.textContent = '◆ casting';
          el.appendChild(badge);
        }
        containerEl.appendChild(el);
      });
    };

    renderZoneWithPool(yourHand, you.hand);
    renderZoneWithPool(yourBoard, you.board);
    renderZoneWithPool(oppBoard, opp.board);
    renderZoneWithPool(document.getElementById('your-graveyard-cards'), you.graveyard);
    renderZoneWithPool(document.getElementById('opp-graveyard-cards'), opp.graveyard);

    if (prompt.optional) {
      const skip = document.createElement('button');
      skip.textContent = 'Skip';
      skip.onclick = () => sendAction({ kind: 'ChoiceCard', iid: null }).then(render);
      buttons.appendChild(skip);
    }
  } else if (prompt.kind === 'Confirm') {
    promptEl.innerHTML = `<b>${prompt.prompt || 'Confirm?'}</b>`;
    you.board.forEach(c => yourBoard.appendChild(cardEl(c)));
    you.hand.forEach(c => yourHand.appendChild(cardEl(c)));
    const yes = document.createElement('button');
    yes.textContent = 'Yes';
    yes.onclick = () => sendAction({ kind: 'ChoiceConfirm', yes: true }).then(render);
    buttons.appendChild(yes);
    const no = document.createElement('button');
    no.textContent = 'No';
    no.className = 'danger';
    no.onclick = () => sendAction({ kind: 'ChoiceConfirm', yes: false }).then(render);
    buttons.appendChild(no);
  } else if (prompt.kind === 'ChoosePlayer') {
    promptEl.innerHTML = `<b>${prompt.prompt || 'Choose a player.'}</b>`;
    you.board.forEach(c => yourBoard.appendChild(cardEl(c)));
    you.hand.forEach(c => yourHand.appendChild(cardEl(c)));
    prompt.candidates.forEach(pid => {
      const b = document.createElement('button');
      b.textContent = pid;
      b.onclick = () => sendAction({ kind: 'ChoicePlayer', player: pid }).then(render);
      buttons.appendChild(b);
    });
    if (prompt.optional) {
      const skip = document.createElement('button');
      skip.textContent = 'Skip';
      skip.onclick = () => sendAction({ kind: 'ChoicePlayer', player: null }).then(render);
      buttons.appendChild(skip);
    }
  } else if (prompt.kind === 'ChooseInt') {
    promptEl.innerHTML = `<b>${prompt.prompt || 'Choose a number.'}</b> (${prompt.min}–${prompt.max})`;
    you.board.forEach(c => yourBoard.appendChild(cardEl(c)));
    you.hand.forEach(c => yourHand.appendChild(cardEl(c)));
    const input = document.createElement('input');
    input.type = 'number';
    input.min = prompt.min;
    input.max = prompt.max;
    input.value = prompt.min;
    input.style.cssText = 'background:#234; color:#ddd; border:1px solid #4af; padding:0.3rem; font-family:inherit; width:5rem; margin-right:0.5rem;';
    buttons.appendChild(input);
    const confirm = document.createElement('button');
    confirm.textContent = 'Confirm';
    confirm.onclick = () => sendAction({ kind: 'ChoiceInt', value: parseInt(input.value, 10) || prompt.min }).then(render);
    buttons.appendChild(confirm);
  } else {
    promptEl.textContent = 'Unknown prompt: ' + JSON.stringify(prompt);
  }
}

function activateAbility(card, cardActs) {
  if (cardActs.length === 1) { fireActivation(cardActs[0]); return; }
  // Multiple activations on one card — for now, fire the first.
  // TODO: pop a chooser when more than one is ready.
  fireActivation(cardActs[0]);
}

function fireActivation(a) {
  let x = null;
  if (a.needs_x) {
    const v = parseInt(prompt(`Choose X for "${a.text}" (>=1):`, '1'), 10);
    if (!Number.isFinite(v) || v < 1) return;
    x = v;
  }
  sendAction({ kind: 'Activate', iid: a.iid, ability_index: a.ability_index, x }).then(render);
}

function findCardsByIids(view, iids) {
  const out = [];
  for (const iid of iids) {
    for (const p of view.players) {
      const candidates = [...p.board, ...(p.hand || []), ...(p.graveyard || []), ...(p.exile || [])];
      const found = candidates.find(c => c.iid === iid);
      if (found) { out.push(found); break; }
    }
  }
  return out;
}

function renderDeckTop(elementId, deckTop) {
  const el = document.getElementById(elementId);
  el.innerHTML = '';
  if (!deckTop) { el.innerHTML = '<span class="empty-note">empty</span>'; return; }
  // Per RULES: deck top is publicly visible but only as the BACK of the
  // card — color + symbol only, no name / cost / abilities / stats. The
  // identity stays unknown until drawn.
  const back = document.createElement('div');
  back.className = 'card';
  back.style.cssText = 'background:#0d0d12; border-color:#333; opacity:0.85;';
  const colorRow = (deckTop.colors || []).map(colorTag).join('');
  const symRow = (deckTop.symbols || []).map(symbolTag).join('');
  back.innerHTML = `<div style="color:#888; font-size:0.65rem;">(back)</div><div class="meta-line">${colorRow} ${symRow}</div>`;
  el.appendChild(back);
}

function labelFor(view, iid) {
  for (const p of view.players) {
    for (const c of p.board) if (c.iid === iid) return c.name;
    for (const c of (p.hand || [])) if (c.iid === iid) return c.name;
    for (const c of (p.graveyard || [])) if (c.iid === iid) return c.name;
  }
  return iid;
}

// ---------------- Deckbuilder ----------------

// Group state.deck (flat array w/ repetition) into {card_id → count}.
function deckCounts() {
  const counts = new Map();
  for (const id of state.deck) {
    counts.set(id, (counts.get(id) || 0) + 1);
  }
  return counts;
}

function poolCardEl(entry) {
  const div = document.createElement('div');
  div.className = 'card pool-card';
  // Same head/meta/abilities structure as the in-game cardEl, scaled
  // down a touch — keeps the visual language consistent so the user
  // recognizes cards from pool to hand.
  const head = document.createElement('div');
  head.className = 'head';
  head.innerHTML = `<span class="name">${entry.name}</span><span class="cost">${entry.cost_text || ''}</span>`;
  div.appendChild(head);

  const metaParts = [];
  if (entry.kind === 'Creature' && entry.power != null) {
    metaParts.push(`<span class="stats">${entry.power}/${entry.toughness}</span>`);
  }
  if (entry.colors && entry.colors.length) metaParts.push(entry.colors.map(colorTag).join(''));
  if (entry.symbols && entry.symbols.length) metaParts.push(entry.symbols.map(symbolTag).join(''));
  if (entry.subtypes && entry.subtypes.length) {
    metaParts.push(`<span style="color:#888;">${entry.subtypes.join('·')}</span>`);
  }
  if (metaParts.length) {
    const m = document.createElement('div');
    m.className = 'meta-line';
    m.innerHTML = metaParts.join(' ');
    div.appendChild(m);
  }
  if (entry.abilities && entry.abilities.length) {
    const a = document.createElement('div');
    a.className = 'abilities';
    a.innerHTML = entry.abilities.map(s => `<div>${s}</div>`).join('');
    div.appendChild(a);
  }
  div.title = entry.id;
  div.onclick = () => {
    state.deck.push(entry.id);
    renderDeckbuilder();
  };
  return div;
}

function poolMatchesFilters(entry) {
  if (state.poolFilterColor && !(entry.colors || []).includes(state.poolFilterColor)) {
    return false;
  }
  if (state.poolFilterKind && entry.kind !== state.poolFilterKind) {
    return false;
  }
  return true;
}

function renderDeckbuilder() {
  document.getElementById('prompt').textContent =
    'Pre-game — build your deck. Click cards on the left to add; click [-] to remove. Mirror match: your opponent uses the same deck.';
  document.getElementById('meta').textContent = '';
  document.getElementById('game-screen').style.display = 'none';
  const root = document.getElementById('deckbuilder');
  root.style.display = 'grid';
  root.innerHTML = '';

  // Pool side.
  const poolSide = document.createElement('div');
  poolSide.className = 'pool';
  poolSide.innerHTML = `<h2>Card pool (${state.cardPool.length})</h2>`;

  const filters = document.createElement('div');
  filters.className = 'filters';
  // Color filter — only show colors that actually appear in the pool.
  const allColors = new Set();
  for (const c of state.cardPool) for (const col of (c.colors || [])) allColors.add(col);
  const colorSel = document.createElement('select');
  colorSel.innerHTML = `<option value="">all colors</option>` +
    [...allColors].sort().map(c => `<option value="${c}">${c}</option>`).join('');
  colorSel.value = state.poolFilterColor;
  colorSel.onchange = () => { state.poolFilterColor = colorSel.value; renderDeckbuilder(); };
  filters.appendChild(colorSel);
  // Kind filter.
  const kindSel = document.createElement('select');
  kindSel.innerHTML = `
    <option value="">all kinds</option>
    <option value="Creature">Creatures</option>
    <option value="Spell">Spells</option>
    <option value="Artifact">Artifacts</option>
    <option value="Environment">Environments</option>
    <option value="Mutation">Mutations</option>
  `;
  kindSel.value = state.poolFilterKind;
  kindSel.onchange = () => { state.poolFilterKind = kindSel.value; renderDeckbuilder(); };
  filters.appendChild(kindSel);
  poolSide.appendChild(filters);

  const grid = document.createElement('div');
  grid.className = 'pool-grid';
  for (const entry of state.cardPool) {
    if (!poolMatchesFilters(entry)) continue;
    grid.appendChild(poolCardEl(entry));
  }
  poolSide.appendChild(grid);
  root.appendChild(poolSide);

  // Deck side.
  const deckSide = document.createElement('div');
  deckSide.className = 'deck';
  deckSide.innerHTML = `<h2>Your deck</h2>`;
  const summary = document.createElement('div');
  summary.className = 'deck-summary';
  summary.textContent = `${state.deck.length} cards`;
  deckSide.appendChild(summary);

  // Preset dropdown + clear.
  const controls = document.createElement('div');
  controls.className = 'deck-controls';
  const presetLabel = document.createElement('label');
  presetLabel.textContent = 'Load preset:';
  const presetSel = document.createElement('select');
  presetSel.innerHTML = `<option value="">(choose…)</option>` +
    state.presets.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  presetSel.onchange = () => {
    const choice = state.presets.find(p => p.id === presetSel.value);
    if (choice) {
      state.deck = choice.cards.slice();
      renderDeckbuilder();
    }
  };
  presetLabel.appendChild(presetSel);
  controls.appendChild(presetLabel);

  const clearBtn = document.createElement('button');
  clearBtn.className = 'danger';
  clearBtn.textContent = 'Clear deck';
  clearBtn.onclick = () => { state.deck = []; renderDeckbuilder(); };
  controls.appendChild(clearBtn);

  // Opponent AI.
  const oppLabel = document.createElement('label');
  oppLabel.textContent = 'Opponent AI:';
  const oppSel = document.createElement('select');
  oppSel.innerHTML = `
    <option value="heuristic">Heuristic (fast)</option>
    <option value="uct">UCT (search)</option>
    <option value="mcts">MCTS (search)</option>
  `;
  oppSel.value = state.oppAi;
  oppSel.onchange = () => { state.oppAi = oppSel.value; };
  oppLabel.appendChild(oppSel);
  controls.appendChild(oppLabel);

  deckSide.appendChild(controls);

  // Deck rows, grouped by id and sorted by count desc then name asc.
  const counts = deckCounts();
  const idToEntry = new Map(state.cardPool.map(e => [e.id, e]));
  const rows = [...counts.entries()].sort((a, b) => {
    if (b[1] !== a[1]) return b[1] - a[1];
    const an = (idToEntry.get(a[0])?.name) || a[0];
    const bn = (idToEntry.get(b[0])?.name) || b[0];
    return an.localeCompare(bn);
  });
  const list = document.createElement('div');
  for (const [id, qty] of rows) {
    const row = document.createElement('div');
    row.className = 'deck-row';
    const entry = idToEntry.get(id);
    const name = entry ? entry.name : id;
    row.innerHTML = `<span class="qty">${qty}×</span><span class="name">${name}</span>`;
    const rm = document.createElement('button');
    rm.textContent = '-';
    rm.onclick = () => {
      const idx = state.deck.indexOf(id);
      if (idx >= 0) state.deck.splice(idx, 1);
      renderDeckbuilder();
    };
    row.appendChild(rm);
    list.appendChild(row);
  }
  deckSide.appendChild(list);

  // Start button.
  const startBtn = document.createElement('button');
  startBtn.className = 'start';
  startBtn.textContent = 'Start game';
  startBtn.disabled = state.deck.length === 0;
  startBtn.onclick = startGameFromDeckbuilder;
  deckSide.appendChild(startBtn);

  root.appendChild(deckSide);
}

async function startGameFromDeckbuilder() {
  if (state.deck.length === 0) return;
  state.phase = 'playing';
  document.getElementById('deckbuilder').style.display = 'none';
  document.getElementById('game-screen').style.display = '';
  document.getElementById('prompt').textContent = 'Starting game…';
  try {
    const initial = await fetchState();
    state.current = { state: initial.state, prompt: initial };
    render(state.current);
  } catch (e) {
    document.getElementById('prompt').textContent =
      'Engine error: ' + (e && e.message ? e.message : e);
  }
}

(async () => {
  // Bootstrap: spawn the worker, await its `{kind:'ready'}`. The wasm
  // lives in worker scope from here on; the main thread only sees
  // postMessage envelopes. tsot_wasm.js is loaded by the worker via
  // importScripts (see assets/tsot-worker.js), not by a <script> tag
  // here — that keeps the heavy compile off the main thread.
  try {
    bootWorker();
    await wasmReady;
  } catch (e) {
    document.getElementById('prompt').textContent =
      'Failed to load wasm worker: ' + (e && e.message ? e.message : e);
    return;
  }
  try {
    // Deckbuilder pre-game: load the card pool + shipped preset decks
    // sequentially (the worker enforces one inflight FFI at a time via
    // `pendingFfi`), seed the working deck with the Starter preset,
    // and render the builder. start_game doesn't fire until the user
    // clicks Start.
    const poolJson = await workerCall('list_card_pool', {});
    state.cardPool = JSON.parse(poolJson);
    const presetsJson = await workerCall('list_preset_decks', {});
    state.presets = JSON.parse(presetsJson);
    const starter = state.presets.find(p => p.id === 'starter') || state.presets[0];
    state.deck = starter ? starter.cards.slice() : [];
    renderDeckbuilder();
  } catch (e) {
    document.getElementById('prompt').textContent =
      'Failed to load deckbuilder data: ' + (e && e.message ? e.message : e);
  }
})();
</script>
</body>
