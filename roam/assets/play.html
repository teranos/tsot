<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>roam</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; color: #ddd; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.8rem; }
  /* Layout: canvas (square, sized to fit) on the left, info panel on
     the right. `height: 100vh` clamps the wrap so the inner panels
     can scroll without growing the page; `box-sizing: border-box`
     so the 0.75rem padding stays inside the viewport bound. Below
     720px width the panel stacks under the canvas (mobile-friendly).
  */
  #wrap { display: flex; gap: 1rem; padding: 0.75rem; align-items: flex-start; height: 100vh; box-sizing: border-box; overflow: hidden; }
  #game { display: flex; flex-direction: column; gap: 0.5rem; position: relative; }
  canvas { background: #1a1a1f; border: 1px solid #333; display: block; }
  @media (max-width: 720px) {
    #wrap { flex-direction: column; overflow-y: auto; height: auto; }
    #info { min-width: 0 !important; max-width: 100% !important; width: 100% !important; }
  }
  /* #status is the legacy bottom-of-game text. It was duplicated by
     the `world-hud` canvas overlay added in 209eb08. Hide it; the
     bridge still writes to it (cheap, no need to also rip the
     writes), but the user shouldn't see two `me=…` lines. */
  #status { display: none; }
  /* Colored dot prepended to the world-hud overlay — at-a-glance
     network state without reading the text. Set via `net-*` classes
     below; the bridge updates the class on every state transition. */
  #world-hud { padding-left: 1.1em !important; position: relative; }
  #world-hud::before {
    content: '●'; position: absolute; left: 0.4em; top: 0.4em;
    color: #555; transition: color 0.25s ease;
  }
  #world-hud.net-idle::before  { color: #555; }       /* gray   — nothing happening yet */
  #world-hud.net-init::before  { color: #ff0; }       /* yellow — wasm/transport coming up */
  #world-hud.net-ready::before { color: #6cf; }       /* cyan   — substrate ready, no peers */
  #world-hud.net-peers::before { color: #6f9; }       /* green  — at least one peer in mesh */
  #world-hud.net-error::before { color: #f44; }       /* red    — substrate failed */
  #info { display: flex; flex-direction: column; gap: 0.5rem; flex: 1; min-width: 24em; max-width: 40em; }
  .panel { border: 1px solid #333; padding: 0.5rem; }
  .panel h2 { font-size: 0.7rem; margin: 0 0 0.4rem 0; color: #888; font-weight: normal; text-transform: uppercase; letter-spacing: 0.05em; }
  #self, #conns, #mesh { color: #ddd; font-size: 0.7rem; white-space: pre-wrap; word-break: break-all; line-height: 1.4; }
  /* Event log box. Was 24em (too small to read a startup sequence
     without scrolling). Now viewport-bound — claims most of the
     visible height, capped so it can't grow off-screen the way a
     `flex: 1` chain did when the ancestor `#wrap` had no anchored
     height. `min-height: 18em` keeps it readable on short windows. */
  #log { color: #bbb; font-size: 0.7rem; max-height: 70vh; min-height: 18em; overflow-y: auto; line-height: 1.3; margin: 0;
         /* Wrap long payloads to the next line instead of clipping at
            the panel's right edge — `provider_error PublishFailed {…}`
            messages and `peer_down reason=…` payloads carry the
            actually-useful diagnostic past 40em otherwise. */
         white-space: pre-wrap; word-break: break-all; }
  #log .ev-connect { color: #6f9; font-weight: bold; }
  /* Disconnects SCREAM. The axiom says errors land in front of the
     user — text-with-a-tint inside a sea of grey log lines is not
     "in front." A red block with white bold text, padding, and a
     left bar is. peer_down is the single most diagnostic event in
     the seam; it cannot be skimmable-past. */
  #log .ev-disconnect {
    color: #fff;
    background: #a00;
    border-left: 4px solid #f33;
    padding: 2px 6px;
    font-weight: bold;
    display: inline-block;
    box-shadow: 0 0 0 1px #f33 inset;
  }
  #log .ev-sub { color: #6cf; }
  /* provider_error / general errors — red text on a darker red
     background, less aggressive than disconnect because they can
     fire at high rate (publish failures during startup). Still
     unmistakably an error. */
  #log .ev-error {
    color: #fbb;
    background: #310;
    border-left: 3px solid #f44;
    padding: 1px 4px;
    display: inline-block;
  }
  #log .ev-info { color: #aaa; }
</style>
</head>
<body>
<div id="clock" style="position: fixed; top: 4px; right: 8px; font-family: ui-monospace, Menlo, monospace; color: #888; font-size: 0.7rem; pointer-events: none; z-index: 100;"></div>
<!-- Pre-egui teleport button removed v0.4.1; Spawn lives inside the
     right-click context menu on the world, rendered by egui in
     `roam::ui::mod::RoamApp`. -->
<div id="root"></div>
<script src="build-info.js"></script>
<script src="elm.js"></script>
<script src="tsot_wasm.js"></script>
<script>
  // TSOT runs alongside roam as a second wasm module. The emscripten
  // loader above defined `createTsotModule` globally; we kick its
  // init here and expose a global promise js-bridge can await before
  // calling into TSOT's FFI.
  window.tsotReady = createTsotModule({}).then((m) => {
    window.tsot = m;
    return m;
  });
</script>
<script>
  // Mount Elm BEFORE js-bridge loads so the DOM ids js-bridge queries
  // for (canvas#c, #status, #self, #conns, #mesh, #log) exist by the
  // time the module body runs. Elm renders synchronously during init.
  // Build watermark moved into the egui surface
  // (`roam::ui::mod::RoamApp` renders it bottom-right from compile-time
  // `option_env!("ROAM_BUILD_*")` constants). Elm's `buildLabel` flag
  // is force-nulled so the previous top-of-page strip stays empty —
  // one source of truth lives in Rust now. `window.__ROAM_BUILD__` is
  // still set by `build-info.js` because the error-overlay watermark
  // on the Elm side reads it independently.
  const app = Elm.Roam.Main.init({
    node: document.getElementById('root'),
    flags: {
      viewport: { w: window.innerWidth, h: window.innerHeight },
      buildLabel: null,
    },
  });
  // js-bridge can call this to push a typed Error envelope into Elm.
  window.roamPushError = function (envelope) {
    app.ports.errorIn.send(envelope);
  };
</script>
<script>
  // Enable libp2p debug logs BEFORE any ESM import resolves. weald
  // (libp2p's logger) reads from globalThis.process.env.DEBUG in
  // browser mode (NOT localStorage.debug — weald is its own port).
  try {
    globalThis.process = globalThis.process || { env: {} };
    globalThis.process.env = globalThis.process.env || {};
    globalThis.process.env.DEBUG = 'libp2p:*';
  } catch (e) {}

  // Capture console calls BEFORE the bundle loads. weald grabs a
  // direct reference: `const log = console.debug ?? console.log` at
  // module-init time, so any patching done from the module body is
  // ignored — weald keeps using the original. We pre-patch and push
  // into a global buffer; js-bridge drains it into the visible log.
  window.__roamConsoleBuf = [];
  for (const m of ['log', 'debug', 'info', 'warn', 'error']) {
    const orig = console[m].bind(console);
    console[m] = function () {
      orig.apply(null, arguments);
      try {
        window.__roamConsoleBuf.push({ m: m, t: Date.now(), args: Array.from(arguments) });
        if (window.__roamConsoleBuf.length > 10000) window.__roamConsoleBuf.shift();
      } catch (e) {}
    };
  }
</script>
<script type="module" src="js-bridge.js"></script>
</body>
</html>
