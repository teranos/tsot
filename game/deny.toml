# Bans wasm-bindgen and its ecosystem from game's dep tree.
# See game/CLAUDE.md for the axiom this enforces.
#
# Run: cd game && cargo deny check bans

[bans]
multiple-versions = "allow"
wildcards = "allow"

deny = [
  { name = "wasm-bindgen" },
  { name = "wasm-bindgen-futures" },
  { name = "js-sys" },
  { name = "web-sys" },
]

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-3-Clause", "BSD-2-Clause", "ISC", "Unicode-DFS-2016", "Unicode-3.0", "Zlib", "CC0-1.0", "0BSD", "MPL-2.0"]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
