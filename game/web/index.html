<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>game</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="game-loading">
      <div id="game-loading-text">loading game</div>
      <progress></progress>
      <div id="game-loading-build" class="muted">build: unknown</div>
    </div>
    <div id="game-bang">!</div>
    <div id="version-picker">
      <div id="version-picker-title">version — press 9 to close</div>
      <div id="version-picker-list">loading…</div>
    </div>
    <script type="module">
      // laye-p2p served same-origin from game.sbvh.nl (CI fetches
      // it from laye.sbvh.nl into game's dist). This is the
      // bevy-starter pattern — cross-origin wasm-bindgen streaming
      // instantiate was flaky; same-origin is reliable and lets
      // laye's DOM overlays (chat, error) actually render.
      window.__layeReadyPromise = (async () => {
        try {
          const laye = await import('./laye_p2p.js');
          await laye.default();
          return {
            init: laye.init,
            publish: laye.publish,
            pending_bytes: laye.pending_bytes,
            recv_bytes: laye.recv_bytes,
            self_peer_id: laye.self_peer_id,
          };
        } catch (e) {
          console.warn('[game] laye-p2p load failed:', e);
          return null;
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
