<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>game</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas id="game-canvas"></canvas>
    <div id="game-loading">
      <div id="game-loading-text">loading game</div>
      <progress></progress>
      <div id="game-loading-build" class="muted">build: unknown</div>
    </div>
    <div id="game-bang">!</div>
    <div id="mobile-dpad">
      <button data-key="w" aria-label="up">↑</button>
      <button data-key="a" aria-label="left">←</button>
      <button data-key="s" aria-label="down">↓</button>
      <button data-key="d" aria-label="right">→</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
