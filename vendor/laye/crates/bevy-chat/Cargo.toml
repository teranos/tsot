[package]
name = "bevy-chat"
version = "0.0.0"
edition = "2024"
description = "One-topic gossipsub chat plugin atop bevy-libp2p."
license = "MIT"

[dependencies]
bevy-libp2p = { path = "../bevy-libp2p" }
bevy_app = { version = "=0.19.0", default-features = false }
bevy_ecs = { version = "=0.19.0", default-features = false }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.143"

[target.'cfg(target_arch = "wasm32")'.dependencies]
js-sys = "=0.3.98"
